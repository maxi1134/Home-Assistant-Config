    # ========================================================================
    - id: no_wifi_page
      bg_color: 0x000000
      widgets:
        - image:
            align: CENTER
            src: error_no_wifi

    # ========================================================================
    # INTERCOM: IDLE PAGE
    # ========================================================================
    - id: ic_idle_page
      bg_color: 0x0000FF
      # Horizontal swipe = prev/next contact (visual hint via < > glyphs).
      # Vertical swipe down = back to VA mode (page transition).
      on_swipe_left:
        - button.press: next_contact_button
        - script.execute: update_ic_idle_labels
      on_swipe_right:
        - button.press: prev_contact_button
        - script.execute: update_ic_idle_labels
      on_swipe_down:
        - script.execute: swipe_to_va
      widgets:
        - label:
            align: TOP_MID
            y: 8%
            text: "${friendly_name}"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
        # State (static) + contacts row (dynamic) on two lines, centered.
        - label:
            id: ic_idle_status_label
            align: TOP_MID
            y: 17%
            text: "IDLE"
            text_color: 0x00FF00
            text_font: font_state
            text_align: CENTER
        - label:
            id: ic_idle_contacts_label
            align: TOP_MID
            y: ${ic_contacts_y}
            text: "\U000F06CB 0"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
        # Peer name: single line; long names ping-pong scroll horizontally.
        - label:
            id: ic_idle_peer_label
            align: CENTER
            text: "Home Assistant"
            text_color: 0xFFFFFF
            text_font: font_title
            width: ${ic_peer_width}
            text_align: CENTER
            long_mode: SCROLL
        # Prev/next contact swipe hints: decorative only. The < > glyphs frame
        # the peer name to suggest a horizontal swipe gesture on the text;
        # actual nav is handled by the page on_swipe_left/right triggers.
        - label:
            floating: true
            align: LEFT_MID
            x: 0
            text: "<"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
        - label:
            floating: true
            align: RIGHT_MID
            x: 0
            text: ">"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
        # Green call button below the peer name (idle screen only calls).
        - button:
            floating: true
            align: CENTER
            y: ${ic_btn_below_center}
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F2"
                  align: CENTER
                  text_color: 0x00FF00
                  text_font: ic_icons
            on_short_click:
              - button.press: call_button

    # ========================================================================
    # INTERCOM: RINGING IN PAGE
    # ========================================================================
    - id: ic_ringing_in_page
      bg_color: 0xFF0000
      widgets:
        - label:
            align: TOP_MID
            y: 8%
            text: "${friendly_name}"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
        - label:
            align: TOP_MID
            y: 17%
            text: "RINGING"
            text_color: 0xFFFF00
            text_font: font_state
            text_align: CENTER
        - label:
            id: ic_ringing_in_peer_label
            align: CENTER
            text: ""
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            long_mode: SCROLL
            width: ${ic_peer_width}
        # Answer (green left) / Decline (red right) at sides like idle
        - button:
            floating: true
            align: LEFT_MID
            x: ${ic_btn_offset}
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F2"
                  align: CENTER
                  text_color: 0x00FF00
                  text_font: ic_icons
            on_short_click:
              - button.press: call_button
        - button:
            floating: true
            align: RIGHT_MID
            x: -5
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F5"
                  align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ic_icons
            on_short_click:
              - button.press: decline_button

    # ========================================================================
    # INTERCOM: RINGING OUT PAGE
    # ========================================================================
    - id: ic_ringing_out_page
      bg_color: 0xFF9900
      widgets:
        - label:
            align: TOP_MID
            y: 8%
            text: "${friendly_name}"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
        - label:
            align: TOP_MID
            y: 17%
            text: "CALLING"
            text_color: 0x000000
            text_font: font_state
            text_align: CENTER
        - label:
            id: ic_ringing_out_peer_label
            align: CENTER
            text: ""
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            long_mode: SCROLL
            width: ${ic_peer_width}
        # Hangup below center
        - button:
            floating: true
            align: CENTER
            y: ${ic_btn_below_center}
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F5"
                  align: CENTER
                  text_color: 0xFF0000
                  text_font: ic_icons
            on_short_click:
              - button.press: decline_button

    # ========================================================================
    # INTERCOM: IN CALL PAGE
    # ========================================================================
    - id: ic_in_call_page
      bg_color: 0x008800
      widgets:
        - label:
            align: TOP_MID
            y: 8%
            text: "${friendly_name}"
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
        - label:
            align: TOP_MID
            y: 17%
            text: "IN CALL"
            text_color: 0x0000FF
            text_font: font_state
            text_align: CENTER
        - label:
            id: ic_in_call_peer_label
            align: CENTER
            text: ""
            text_color: 0xFFFFFF
            text_font: font_title
            text_align: CENTER
            long_mode: SCROLL
            width: ${ic_peer_width}
        # Hangup below center
        - button:
            floating: true
            align: CENTER
            y: ${ic_btn_below_center}
            width: ${ic_btn_size}
            height: ${ic_btn_size}
            bg_opa: TRANSP
            shadow_opa: TRANSP
            widgets:
              - label:
                  text: "\U000F03F5"
                  align: CENTER
                  text_color: 0xFF0000
                  text_font: ic_icons
            on_short_click:
              - button.press: call_button

# =============================================================================
# PERIODIC UPDATES
# =============================================================================
interval:
  - interval: 30s
    then:
      - script.execute: update_idle_labels


