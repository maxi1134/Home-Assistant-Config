# =============================================================================
# GENERIC ESP32-S3 INTERCOM + VA (DUPLEX) - Single I2S bus, no hardware codec
# =============================================================================
# Full-featured config: Intercom + Media Player + mixer (VA/MWW ready).
# For ESP32 boards where mic and speaker share the SAME I2S bus.
#
# Audio pipeline:
#   MEMS mic → i2s_audio_duplex (48kHz) → FIR x3 → esp_aec (AEC SR linear) → mic_main → VA / Intercom TX / MWW
#
#   Media       → media_speaker (resampler) ───────────┐
#   VA TTS      → tts_speaker (resampler) ─────────────┼── mixer (48kHz) → hw_speaker → class-D amp
#   Intercom RX → intercom_speaker (resampler) ────────┘
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM
#   - Microphone: Any I2S MEMS mic on DIN pin
#   - Speaker: Any I2S class-D amp on DOUT pin
#   - Mic and speaker SHARE BCLK + LRCLK (same I2S bus, full-duplex)
#   - LED: SK6812/WS2812 RGB (optional)
#
# GPIO PINOUT (example, change to match your wiring):
#   Shared I2S:  BCLK=GPIO36, LRCLK=GPIO37, DIN=GPIO35 (mic), DOUT=GPIO7 (speaker)
#   LED:         DATA=GPIO33
#
# =============================================================================

substitutions:
  # Hardware-shared identity: dropping firmware-variant suffix keeps build cache
  # and HA device entity stable across rebuilds.
  name: generic-s3
  friendly_name: Generic S3

  ext_components_source: "github://n-IA-hane/esphome-intercom@main"

  assets_base: "https://github.com/n-IA-hane/esphome-intercom/raw/main/"

  # Wake word sensitivity
  wake_word_probability_cutoff: "0.60"
  wake_word_sliding_window_size: "6"

  # Microphone ID for package mute switch
  mic_id: mic_main

# =============================================================================
# Package: shared VA + Intercom state machine
# =============================================================================
packages:
  core: github://n-IA-hane/esphome-intercom/packages/va_intercom.yaml@main
  s3_base: github://n-IA-hane/esphome-intercom/packages/platform/esp32s3_base.yaml@main
  audio_mem: github://n-IA-hane/esphome-intercom/packages/profile/audio_memory.yaml@main

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      # Allow mbedtls to allocate its working buffers in PSRAM.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Route ESP-IDF stdout (and ESPHome logger when hardware_uart=USB_SERIAL_JTAG)
      # to the built-in USB-Serial-JTAG peripheral. Required on boards where the
      # USB-C connector is wired to the S3's native USB-Serial-JTAG (e.g. Freenove,
      # bare ESP32-S3-DevKitC-1) rather than to an external USB-UART chip.
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: quad
  speed: 80MHz

preferences:
  flash_write_interval: 5min

api:

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    # Silence high-volume tags to keep the console readable during normal use
    i2s_duplex: INFO
    esp_aec: INFO
    component: INFO
    api: INFO
    api.connection: INFO
    api.service: INFO
    sensor: INFO
    light: INFO
    switch: INFO
    number: INFO
    select: INFO
    binary_sensor: INFO
    text_sensor: INFO
    speaker: INFO
    audio: INFO
    micro_wake_word: INFO
    voice_assistant: INFO
    media_player: INFO
    resampler: INFO
    mixer_speaker: INFO
    mdns: INFO
    wifi: INFO
    json: INFO
    intercom_api: INFO
    audio_processor: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, i2s_audio_duplex, esp_aec, audio_processor]

# =============================================================================
# AEC
# =============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 4
  mode: sr_low_cost

# =============================================================================
# I2S Audio Duplex
# =============================================================================
i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO37
  i2s_bclk_pin: GPIO36
  i2s_din_pin: GPIO35
  i2s_dout_pin: GPIO7
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 32
  correct_dc_offset: true
  processor_id: aec_processor
  buffers_in_psram: true

# =============================================================================
# Microphone
# =============================================================================
microphone:
  - platform: i2s_audio_duplex
    id: mic_main
    i2s_audio_duplex_id: i2s_duplex

# =============================================================================
# Speaker Pipeline
# =============================================================================
speaker:
  - platform: i2s_audio_duplex
    id: hw_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 48000

  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    task_stack_in_psram: true
    source_speakers:
      - id: media_speaker_mix
        timeout: 10s
        buffer_duration: 100ms
      - id: tts_speaker_mix
        timeout: 10s
        buffer_duration: 100ms
      - id: intercom_speaker_mix
        timeout: 10s
        buffer_duration: 100ms

  - platform: resampler
    id: media_speaker
    output_speaker: media_speaker_mix
    task_stack_in_psram: true

  - platform: resampler
    id: tts_speaker
    output_speaker: tts_speaker_mix
    task_stack_in_psram: true

  - platform: resampler
    id: intercom_speaker
    output_speaker: intercom_speaker_mix
    task_stack_in_psram: true

# =============================================================================
# Media Player
# =============================================================================
media_player:
  - platform: speaker
    id: speaker_media_player
    name: None
    internal: false
    task_stack_in_psram: true
    media_pipeline:
      speaker: media_speaker
      sample_rate: 48000
      format: FLAC
    announcement_pipeline:
      speaker: tts_speaker
      sample_rate: 48000
      format: FLAC
    files:
      - id: timer_finished_sound
        file: ${assets_base}assets/sounds/timer_finished.flac
      - id: intercom_ringing_sound
        file: ${assets_base}assets/sounds/ringtone.flac
    on_announcement:
      - script.execute: update_status
    on_play:
      - script.execute: update_status
    on_pause:
      # Must stop (paused pipeline blocks audio). Display handled here (on_idle won't fire).
      - media_player.stop:
      - delay: 500ms
      - script.execute: update_status
    on_idle:
      - delay: 200ms
      - script.execute: update_status

# =============================================================================
# Micro Wake Word: Device part
# =============================================================================
micro_wake_word:
  microphone: mic_main
  models:
    - model: alexa
    - model: "${assets_base}assets/wakewords/hey_trowyayoh.json"
      probability_cutoff: ${wake_word_probability_cutoff}
      sliding_window_size: ${wake_word_sliding_window_size}

# =============================================================================
# Voice Assistant: Device part
# =============================================================================
voice_assistant:
  microphone: mic_main
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

# =============================================================================
# Intercom API: Device part
# =============================================================================
intercom_api:
  tasks_stack_in_psram: true   # save ~28KB internal heap on S3 by placing task stacks in PSRAM
  frame_buffers_in_psram: true # Processor frame buffers (mic/ref/out, ~3 KB) in PSRAM
  mode: full
  microphone: mic_main
  speaker: intercom_speaker
  ringing_timeout: 30s

# =============================================================================
# Switches (device-specific)
# =============================================================================
switch:
  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: Auto Answer
      icon: mdi:phone-in-talk
      restore_mode: RESTORE_DEFAULT_OFF

  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON

# =============================================================================
# AEC Mode Select
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    # Full-experience standard: stay inside the esp_aec3 engine. MWW
    # requires SR modes (the VOIP residual echo suppressor distorts the
    # spectral features, dropping wake-word detection from 10/10 to 2/10).
    # Both SR options share the same engine, so a runtime switch never
    # triggers a dios_ssp tail-buffer alloc.
    options:
      - "sr_low_cost"
      - "sr_high_perf"
    initial_option: "sr_low_cost"
    # Non-optimistic: HA reflects the live component mode, not the value the
    # user clicked. If the switch is rejected (e.g. internal RAM fragmented)
    # or the component falls back to the previous mode, the select shows the
    # actual mode rather than a fictitious one.
    optimistic: false
    restore_value: false
    set_action:
      - if:
          condition:
            lambda: 'return id(init_in_progress);'
          then:
            - logger.log: "AEC mode select: skipping during boot"
          else:
            - if:
                condition:
                  or:
                    - voice_assistant.is_running:
                    - not:
                        intercom_api.is_idle: intercom
                then:
                  - logger.log:
                      level: WARN
                      format: "Cannot switch AEC mode during active VA/intercom"
                else:
                  - logger.log:
                      format: "Switching AEC mode to %s"
                      args: ['x.c_str()']
                  - micro_wake_word.stop:
                  - i2s_audio_duplex.stop: i2s_duplex
                  - esp_aec.set_mode:
                      id: aec_processor
                      mode: !lambda 'return x;'
                  - i2s_audio_duplex.start: i2s_duplex
                  - delay: 300ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start:
      # Reflect actual live mode (covers rejection and silent fallback).
      - lambda: |-
          id(aec_mode_select).publish_state(id(aec_processor).get_mode_name());

# =============================================================================
# Numbers
# =============================================================================
number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    speaker_volume:
      name: Speaker Volume
    mic_gain:
      name: Mic Gain
    mic_gain_pre_aec:
      name: Mic Gain Pre-AEC
      pre_aec: true

# =============================================================================
# Status LED (SK6812 on GPIO33)
# =============================================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: Status LED
    icon: mdi:led-on
    pin: GPIO33
    chipset: SK6812
    num_leds: 1
    rgb_order: GRB
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - strobe:
          name: "Ringing"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
            - state: false
              duration: 250ms
      - strobe:
          name: "Calling"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 50%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms

# =============================================================================
# LED logic (extends package placeholder)
# =============================================================================
script:
  - id: !extend update_led
    then:
      - lambda: |-
          static int last = -2;
          int t = id(g_applied_led);
          if (t == last) return;
          last = t;
          auto *led = id(status_led);
          switch (t) {
            case 1:  // Both muted: red slow pulse
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.4f).set_effect("Slow Pulse").perform();
              break;
            case 2:  // Mic muted: red dim
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.3f).set_effect("None").perform();
              break;
            case 3:  // Speaker muted: orange dim
              led->turn_on().set_rgb(1.0f, 0.5f, 0.0f).set_brightness(0.3f).set_effect("None").perform();
              break;
            case 4:  // MWW recent / barge-in
            case 5:  // VA Listening: red solid
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.7f).set_effect("None").perform();
              break;
            case 6:  // VA Thinking: yellow solid (pure, max contrast vs red)
              led->turn_on().set_rgb(1.0f, 1.0f, 0.0f).set_brightness(1.0f).set_effect("None").perform();
              break;
            case 7:  // VA Speaking: blue solid
              led->turn_on().set_rgb(0.3f, 0.3f, 0.7f).set_brightness(0.6f).set_effect("None").perform();
              break;
            case 8:  // IC Ringing: red strobe
              led->turn_on().set_effect("Ringing").perform();
              break;
            case 9:  // IC Outgoing: orange strobe
              led->turn_on().set_effect("Calling").perform();
              break;
            case 10: // IC Streaming: green solid
              led->turn_on().set_rgb(0.0f, 1.0f, 0.0f).set_brightness(1.0f).set_effect("None").perform();
              break;
            case 11: // VA Error: red solid
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.7f).set_effect("None").perform();
              break;
            case 12: // Media playing: green solid
              led->turn_on().set_rgb(0.0f, 1.0f, 0.0f).set_brightness(1.0f).set_effect("None").perform();
              break;
            default: // Off
              led->turn_off().perform();
              break;
          }

# =============================================================================
# Diagnostics
# =============================================================================
sensor:
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: Uptime
    update_interval: 60s
    entity_category: diagnostic

  - platform: internal_temperature
    name: CPU Temperature
    update_interval: 60s
    entity_category: diagnostic

binary_sensor:
  - platform: status
    name: Status

  # BOOT button (GPIO0), multi-click
  - platform: gpio
    name: Boot Button
    id: boot_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      # Single click: call toggle if intercom active, otherwise VA start/stop
      - timing:
          - ON for at most 500ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                not:
                  - intercom_api.is_idle: intercom
              then:
                - intercom_api.call_toggle: intercom
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      - voice_assistant.stop:
                    else:
                      - voice_assistant.start:
      # Double click: next contact
      - timing:
          - ON for 50ms to 500ms
          - OFF for at most 300ms
          - ON for 50ms to 500ms
          - OFF for at least 400ms
        then:
          - intercom_api.next_contact: intercom
      # Long press (1-3s): toggle mute
      - timing:
          - ON for 1s to 3s
          - OFF for at least 300ms
        then:
          - switch.toggle: mute
