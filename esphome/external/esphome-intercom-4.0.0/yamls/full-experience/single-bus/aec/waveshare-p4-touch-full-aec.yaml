# =============================================================================
# LVGL DISPLAY ENGINE
# =============================================================================
lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  color_depth: 16
  buffer_size: 25%
  byte_order: little_endian
  log_level: WARN
  rotation: 180         # USB connector at top in portrait → flip so cable exits bottom

  # Timer overlay (always visible on top, hidden by default)
  top_layer:
    widgets:
      - obj:
          id: timer_overlay
          align: TOP_MID
          width: 400
          height: 50
          y: 5
          bg_color: 0xFFFFFF
          border_color: 0x000000
          border_width: 1
          radius: 8
          hidden: true
          widgets:
            - bar:
                id: timer_bar
                align: CENTER
                width: 390
                height: 40
                min_value: 0
                max_value: 100
                value: 100
                indicator:
                  bg_color: 0x26ED3A
            - label:
                id: timer_label
                align: CENTER
                text: ""
                text_color: 0x000000
                text_font: font_timer

  pages:
    # ==================================================================
    # INITIALIZING
    # ==================================================================
    - id: initializing_page
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            text: "Initializing..."
            text_color: 0x888888
            text_font: font_state

    # ==================================================================
    # NO WIFI
    # ==================================================================
    - id: no_wifi_page
      bg_color: 0x000000
      widgets:
        - label:
            align: TOP_MID
            y: 60
            text: "No WiFi"
            text_color: 0xE74C3C
            text_font: font_state
        - label:
            align: TOP_MID
            y: 120
            text: "In attesa di connessione..."
            text_color: 0x888888
            text_font: font_body
        - image:
            align: CENTER
            y: 40
            src: error_no_wifi

    # ==================================================================
    # NO HOME ASSISTANT
    # ==================================================================
    - id: no_ha_page
      bg_color: 0x000000
      widgets:
        - label:
            align: TOP_MID
            y: 60
            text: "No Home Assistant"
            text_color: 0xF39C12
            text_font: font_state
        - label:
            align: TOP_MID
            y: 120
            text: "In attesa di connessione API..."
            text_color: 0x888888
            text_font: font_body
        - image:
            align: CENTER
            y: 40
            src: error_no_ha

    # ==================================================================
    # VA: TIMER FINISHED
    # ==================================================================
    - id: timer_finished_page
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            y: -40
            text: "Timer!"
            text_color: 0xF39C12
            text_font: font_state
        - button:
            align: CENTER
            y: 60
            width: 200
            height: 60
            bg_color: 0xE74C3C
            radius: 10
            on_click:
              - switch.turn_off: timer_ringing
            widgets:
              - label:
                  align: CENTER
                  text: "Stop"
                  text_color: 0xFFFFFF
                  text_font: font_button

    # ==================================================================
    # MAIN PAGE: Split-screen (weather/intercom + VA)
    # ==================================================================
    - id: main_page
      bg_color: 0x000000
      widgets:
        # === TOP HALF: TILEVIEW (meteo + intercom) ===
        - tileview:
            id: top_tileview
            width: 780
            height: 630
            align: TOP_MID
            y: 5
            bg_opa: TRANSP
            border_color: 0x333355
            border_width: 1
            radius: 12
            tiles:
              # --- TILE 0: WEATHER ---
              - row: 0
                column: 0
                dir: HOR
                id: weather_tile
                widgets:
                  # Header: day + date
                  - label:
                      id: weather_date_label
                      align: TOP_LEFT
                      x: 30
                      y: 15
                      text: ""
                      text_color: 0x888888
                      text_font: font_title
                  # Header: WiFi status
                  - label:
                      id: wifi_status_icon
                      align: TOP_RIGHT
                      x: -170
                      y: 15
                      text: "\U000F05A9"
                      text_font: font_status_icon
                      text_color: 0x888888
                  # Header: clock
                  - label:
                      id: weather_clock_label
                      align: TOP_RIGHT
                      x: -30
                      y: 12
                      text: ""
                      text_color: 0x888888
                      text_font: font_title
                  # Weather icon (MDI glyph)
                  - label:
                      id: weather_icon_label
                      align: TOP_MID
                      y: 80
                      text: "\U000F0599"
                      text_font: font_weather_icon
                      text_color: 0xFFD700
                  # Temperature
                  - label:
                      id: weather_temp_label
                      align: TOP_MID
                      y: 180
                      text: "--°"
                      text_font: font_state
                      text_color: 0xFFFFFF
                  # Location
                  - label:
                      id: weather_location_label
                      align: TOP_MID
                      y: 240
                      text: ""
                      text_font: font_body
                      text_color: 0x888888
                  # Condition text (Italian)
                  - label:
                      id: weather_condition_label
                      align: TOP_MID
