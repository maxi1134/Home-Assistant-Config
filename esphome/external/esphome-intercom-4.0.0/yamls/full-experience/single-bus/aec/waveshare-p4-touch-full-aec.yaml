# =============================================================================
# Waveshare ESP32-P4 WiFi6 Touch LCD: VA + Intercom + MWW (LVGL)
# =============================================================================
#
# Hardware:
#   - ESP32-P4 RISC-V dual-core (32MB Flash, 32MB PSRAM hex)
#   - WiFi via ESP32-C6 co-processor (SDIO, esp32_hosted)
#   - MIPI DSI display: 10.1" 800x1280 (JD9365), portrait mode
#   - GT9271 capacitive touch (GT911 driver compatible, I2C 0x14)
#   - ES8311 Audio DAC (speaker, I2C 0x18)
#   - ES7210 Audio ADC (dual mic array, I2C 0x40)
#   - NS4150B 3W mono Class-D speaker amp (GPIO53)
#   - BOOT button (GPIO0)
#
# Pin Map:
#   I2S:   MCLK=GPIO13 BCLK=GPIO12 LRCLK=GPIO10 DIN=GPIO9 DOUT=GPIO11
#   I2C:   SDA=GPIO7 SCL=GPIO8 (ES8311@0x18, ES7210@0x40, GT9271@0x14)
#   Touch: INT=GPIO22 RST=GPIO23
#   Backlight: GPIO32 (7B) or GPIO26 (7/8/10.1)
#   Speaker amp: GPIO53
#   C6 SDIO: RST=GPIO54 CMD=GPIO19 CLK=GPIO18 D0-D3=GPIO14-17
#
# Display variant selection:
#   7B:  model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B  (1024x600, backlight GPIO32)
#   7":  model: CUSTOM + ILI9881C init_sequence          (720x1280, backlight GPIO26)
#   8":  model: CUSTOM + JD9365 init_sequence             (800x1280, backlight GPIO26)
#   10.1": model: WAVESHARE-P4-NANO-10.1                  (800x1280, backlight GPIO26)
#
# Audio pipeline (i2s_audio_duplex at 48kHz, TDM + FIR decimation to 16kHz):
#
#   ES7210 TDM [mic1, mic2, ref, nc] → FIR x3 ──┐
#                                               └── AEC (SR linear) → mic_aec → VA / Intercom TX / MWW
#
#   Music/radio → media_speaker (resampler) ───────────┐
#   VA TTS      → tts_speaker (resampler) ─────────────┼── mixer (48kHz) → hw_speaker → ES8311
#   Intercom RX → intercom_speaker (resampler) ────────┘
#
# Touch UI:
#   VA pages:      Status display (idle, listening, thinking, replying, error)
#   Intercom pages: Touch buttons for call/answer/decline/hangup/next/prev
#   Mode switch:   Long press GPIO0 or touch "Mode" button
#
# =============================================================================

substitutions:
  name: waveshare-p4-touch
  friendly_name: Waveshare P4 Touch
  mic_id: mic_aec

  # Toggled by scripts/yaml_paths.sh between local (../../../../...) and remote
  # (github://n-IA-hane/esphome-intercom@<branch>) modes.
  ext_components_source: "github://n-IA-hane/esphome-intercom@main"
  assets_base: "https://github.com/n-IA-hane/esphome-intercom/raw/main/"

  # Display dimensions (portrait)
  display_width: "800"
  display_height: "1280"

  # AI avatar folder (${assets_base}assets/images/assistant/<ai_avatar>/)
  ai_avatar: troiaio

  # Wake word sensitivity (per-device tuning)
  wake_word_probability_cutoff: "0.60"
  wake_word_sliding_window_size: "6"

  voice_assist_idle_phase_id: "1"
  voice_assist_listening_phase_id: "2"
  voice_assist_thinking_phase_id: "3"
  voice_assist_replying_phase_id: "4"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  voice_assist_muted_phase_id: "12"
  voice_assist_timer_finished_phase_id: "20"

packages:
  core: github://n-IA-hane/esphome-intercom/packages/va_intercom.yaml@main
  es7210_tdm: github://n-IA-hane/esphome-intercom/packages/codec/es7210_tdm.yaml@main

# =============================================================================
# ESP32-P4 BASE CONFIGURATION
# =============================================================================
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 600
      then:
        - output.turn_on: speaker_enable
    - priority: 200
      then:
        # ES7210 TDM configuration (shared with waveshare-s3 via
        # packages/codec/es7210_tdm.yaml).
        - script.execute: es7210_tdm_init
        # Restore ES8311 volume and sync intercom peer name
        - lambda: |-
            float vol = 0.15 + (id(speaker_volume).state / 100.0) * 0.60;
            id(es8311_dac).set_volume(vol);
            id(peer_name) = id(intercom).get_current_destination();
    - priority: -100
      then:
        - logger.log: "Boot: late init start"
        - delay: 500ms
        - light.turn_on:
            id: display_backlight
            brightness: 100%
        - lvgl.page.show: initializing_page
        - script.execute: draw_display
        - micro_wake_word.stop:
        - delay: 1s
        - micro_wake_word.start:

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 32MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
      # -O2 codegen on our audio components: 5-15 % throughput on tight loops
      # (deinterleave, FIR, gain/scale, RMS) at the cost of +30-80 KB flash.
      # Validated on xiaozhi-afe (commit d94b649); same component stack here.
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_CACHE_L2_CACHE_256KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # SDIO stability: larger queues prevent overflow during concurrent WiFi traffic
      # (music streaming + VA API). Default 20 is too small. See esp-hosted#597.
      CONFIG_ESP_HOSTED_SDIO_RX_Q_SIZE: "50"
      CONFIG_ESP_HOSTED_SDIO_TX_Q_SIZE: "50"
      # Reserve 64KB internal DRAM for DMA-only allocations (WiFi/SDIO buffers)
      # Prevents heap fragmentation from starving SDIO copy_payload alloc.
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"

psram:
  mode: hex
  speed: 200MHz

# MIPI DSI PHY requires 2.5V from internal LDO channel 3
esp_ldo:
  - channel: 3
    voltage: 2.5V

# =============================================================================
# CONNECTIVITY
# =============================================================================
# WiFi via ESP32-C6 co-processor (SDIO)
# Known stability issues: see https://github.com/esphome/esphome/issues/10956
esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 10min
  fast_connect: false
  on_connect:
    - logger.log: "WiFi connected"
    - script.execute: draw_display
  on_disconnect:
    - logger.log: "WiFi disconnected"
    - script.execute: draw_display

api:
  on_client_connected:
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
    - delay: 5s
    - script.execute: fetch_forecast
  on_client_disconnected:
    - script.execute: draw_display

ota:
  - platform: esphome

logger:
  hardware_uart: UART0
  level: INFO

debug:
  update_interval: 60s

network:
  enable_high_performance: true

time:
  - platform: sntp
    id: my_time
    timezone: Europe/Rome
    servers:
      - 0.pool.ntp.org

# =============================================================================
# EXTERNAL COMPONENTS
# =============================================================================
external_components:
  - source: ${ext_components_source}
    components: [intercom_api, i2s_audio_duplex, esp_aec, audio_processor]

# =============================================================================
# I2C Bus (shared: ES8311, ES7210, GT9271)
# =============================================================================
i2c:
  - id: internal_i2c
    sda: GPIO7
    scl: GPIO8
    frequency: 400kHz
    scan: false

# =============================================================================
# Audio: i2s_audio_duplex (48kHz bus, FIR decimation to 16kHz for mic/AEC/VA)
# =============================================================================
# ES8311 (DAC) and ES7210 (ADC) share BCLK/LRCLK/MCLK with separate data pins.
# ES8311 DAC output wired to ES7210 MIC3, providing TDM hardware AEC reference (slot 2).

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: internal_i2c
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 48000           # Match I2S bus rate
    use_mclk: true
    mic_gain: 24DB       # ES8311 ADC gain (unused; ES7210 handles mic)

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: internal_i2c
    address: 0x40
    bits_per_sample: 16bit
    sample_rate: 48000           # Match I2S bus rate
    mic_gain: 24dB       # 0-37.5dB. Increase if too quiet.

esp_aec:
  id: aec_processor
  sample_rate: 16000       # AEC always at 16kHz (= output_sample_rate)
  mode: sr_low_cost        # Linear AEC, preserves spectral features for MWW
  filter_length: 4         # 64ms tail, sufficient for integrated codec path

i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO10
  i2s_bclk_pin: GPIO12
  i2s_mclk_pin: GPIO13
  i2s_din_pin: GPIO11          # From ES7210 ADC (BSP_I2S_DSIN)
  i2s_dout_pin: GPIO9          # To ES8311 DAC (BSP_I2S_DOUT)
  sample_rate: 48000           # I2S bus at ES8311/ES7210 native rate
  output_sample_rate: 16000    # Mic/AEC/MWW/VA decimated to 16kHz via FIR x3
  processor_id: aec_processor
  fir_decimator: custom        # P4: bypassa dsps_fird_s16 SIMD (esp-dsp #117/#102 RISC-V)
  use_tdm_reference: true
  tdm_total_slots: 4
  tdm_mic_slot: 0              # ES7210 TDM slot 0 = ADC1 (MIC1, voice)
  tdm_ref_slot: 1              # ES7210 TDM slot 1 = ADC3 (MIC3, ES8311 DAC feedback)
  buffers_in_psram: true       # All audio buffers in PSRAM; required for sr_low_cost

# mic_aec: post-AEC for VA STT, intercom TX, AND MWW
# SR linear AEC preserves spectral features for neural wake word detection.
microphone:
  - platform: i2s_audio_duplex
    id: mic_aec
    i2s_audio_duplex_id: i2s_duplex

# Speaker pipeline: i2s_audio_duplex → resampler → mixer (all at 48kHz)
speaker:
  # Hardware output: writes 48kHz PCM to I2S bus
  - platform: i2s_audio_duplex
    id: hw_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 48000

  # 3-source mixer: media (duckable) + TTS (never ducked) + intercom
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    task_stack_in_psram: true
    source_speakers:
      - id: media_speaker_mix       # Music/radio streams (duckable)
        timeout: 10s
        buffer_duration: 100ms
      - id: tts_speaker_mix         # VA TTS announcements (never ducked)
        timeout: 10s
        buffer_duration: 100ms
      - id: intercom_speaker_mix    # Intercom audio
        timeout: 10s
        buffer_duration: 100ms

  # ResamplerSpeakers: convert any input rate to 48kHz before the mixer
  - platform: resampler
    id: media_speaker              # Music/radio to 48kHz
    output_speaker: media_speaker_mix
    task_stack_in_psram: true

  - platform: resampler
    id: tts_speaker                # VA TTS to 48kHz
    output_speaker: tts_speaker_mix
    task_stack_in_psram: true

  - platform: resampler
    id: intercom_speaker           # Intercom RX (16kHz) to 48kHz
    output_speaker: intercom_speaker_mix
    task_stack_in_psram: true

# =============================================================================
# Media Player (TTS via VA speaker)
# =============================================================================
media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    internal: false
    task_stack_in_psram: true
    media_pipeline:
      speaker: media_speaker
      sample_rate: 48000
      format: FLAC
    announcement_pipeline:
      speaker: tts_speaker
      format: FLAC
      sample_rate: 48000
    files:
      - id: timer_finished_sound
        file: ${assets_base}assets/sounds/timer_finished.flac
      - id: intercom_ringing_sound
        file: ${assets_base}assets/sounds/ringtone.flac
    on_announcement:
      - script.execute: update_status
      - if:
          condition:
            intercom_api.is_idle: intercom
          then:
            - script.execute: backlight_timer
      # Set replying phase for non-VA announcements (e.g., timer sound)
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - globals.set:
                id: voice_assistant_phase
                value: '${voice_assist_replying_phase_id}'
            - script.execute: draw_display
    on_play:
      - script.execute: update_status
      - script.execute: backlight_timer
      # Show neutral mood image during media playback
      - if:
          condition:
            and:
              - intercom_api.is_idle: intercom
              - not:
                  voice_assistant.is_running:
          then:
            - lambda: |-
                lv_img_set_src(id(mood_bg), id(mood_neutral));
            - globals.set:
                id: voice_assistant_phase
                value: '${voice_assist_replying_phase_id}'
            - script.execute: draw_display
    on_pause:
      # Must stop (paused pipeline blocks all audio including TTS).
      # on_idle won't fire (is_paused_ stuck bug), so handle display here.
      - media_player.stop:
      - delay: 500ms
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_idle_phase_id}'
      - script.execute: update_status
      - script.execute: draw_display
      - script.execute: backlight_timer
    on_idle:
      - delay: 200ms
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_idle_phase_id}'
      - script.execute: update_status
      - script.execute: draw_display
      - script.execute: backlight_timer

# =============================================================================
# Micro Wake Word
# =============================================================================
micro_wake_word:
  id: mww
  microphone: mic_aec
  stop_after_detection: false
  models:
    - model: "${assets_base}assets/wakewords/hey_trowyayoh.json"
      probability_cutoff: ${wake_word_probability_cutoff}
      sliding_window_size: ${wake_word_sliding_window_size}
    - model: alexa

# =============================================================================
# Voice Assistant
# =============================================================================
voice_assistant:
  id: va
  microphone: mic_aec
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_timer_started:
    - script.execute: update_timer_state
  on_timer_cancelled:
    - script.execute: update_timer_state
  on_timer_updated:
    - script.execute: update_timer_state
  on_timer_tick:
    - script.execute: update_timer_state
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - wait_until:
        condition:
          media_player.is_announcing:
    - globals.set:
        id: voice_assistant_phase
        value: '${voice_assist_timer_finished_phase_id}'
    - script.execute: draw_display

# =============================================================================
# Intercom API
# =============================================================================
intercom_api:
  id: intercom
  mode: full
  microphone: mic_aec          # Post-AEC: no echo in transmitted audio
  speaker: intercom_speaker
  ringing_timeout: 30s



# =============================================================================
# DISPLAY (MIPI DSI)
# =============================================================================
# Using 7B model. For other sizes, change model and backlight pin:
#   7B:   WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B  (1024x600, GPIO32)
#   10.1: WAVESHARE-P4-NANO-10.1                  (800x1280, GPIO26)
#   For 7"/8": model: CUSTOM + init_sequence from Waveshare BSP
display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-P4-NANO-10.1
    reset_pin: 27                 # GPIO27, X-series BSP hardware reset (BSP_LCD_RST)
    lane_bit_rate: 1500Mbps       # Per BSP: 1500 Mbps for 10.1" JD9365
    vsync_back_porch: 10          # Per Waveshare driver (ESPHome default is 12)
    dimensions:
      width: 800
      height: 1280
    update_interval: never
    auto_clear_enabled: false

# =============================================================================
# TOUCHSCREEN (GT911 / GT9271)
# =============================================================================
touchscreen:
  - platform: gt911
    id: main_touch
    i2c_id: internal_i2c
    # On this hardware revision GT9271 is detected on 0x5D.
    address: 0x5D
    display: main_display
    update_interval: 50ms
    on_touch:
      - light.turn_on:
          id: display_backlight
          brightness: 100%
      - script.execute: backlight_timer

# =============================================================================
# BACKLIGHT + SPEAKER AMP
# =============================================================================
output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO26          # GPIO32 for 7B variant only
    inverted: false       # X-series BSP: non-inverted (higher duty = brighter)
    frequency: 1000Hz

  - platform: gpio
    id: speaker_enable
    pin: GPIO53

light:
  - platform: monochromatic
    id: display_backlight
    name: "Display Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

# =============================================================================
# FONTS
# =============================================================================
font:
  - file:
      type: gfonts
      family: Noto Sans
      weight: 700
    id: font_title
    size: 32
    glyphsets: [GF_Latin_Core]

  - file:
      type: gfonts
      family: Noto Sans
      weight: 700
    id: font_state
    size: 48
    glyphsets: [GF_Latin_Core]

  - file:
      type: gfonts
      family: Noto Sans
      weight: 400
    id: font_body
    size: 22
    glyphsets: [GF_Latin_Core]

  - file:
      type: gfonts
      family: Noto Sans
      weight: 400
    id: font_small
    size: 16
    glyphsets: [GF_Latin_Core]

  - file:
      type: gfonts
      family: Noto Sans
      weight: 500
    id: font_button
    size: 24
    glyphsets: [GF_Latin_Core]

  - file:
      type: gfonts
      family: Noto Sans
      weight: 400
    id: font_response
    size: 20
    glyphsets: [GF_Latin_Core]

  - file:
      type: gfonts
      family: Roboto Mono
      weight: 400
    id: font_timer
    size: 36
    glyphs: "0123456789:"

  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_weather_icon
    size: 100
    glyphs:
      - "\U000F0590"  # weather-cloudy
      - "\U000F0591"  # weather-fog
      - "\U000F0592"  # weather-hail
      - "\U000F0593"  # weather-lightning
