                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  hidden: true
                  on_click:
                    - voice_assistant.stop:
                  widgets:
                    - label:
                        align: TOP_MID
                        y: 80
                        text: "Listening..."
                        text_color: 0x2ECC71
                        text_font: font_state
                    - image:
                        align: BOTTOM_MID
                        y: -10
                        src: img_listening

              # --- VA THINKING group ---
              - obj:
                  id: va_thinking_group
                  width: 780
                  height: 630
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  hidden: true
                  on_click:
                    - voice_assistant.stop:
                  widgets:
                    - label:
                        id: thinking_text_label
                        align: TOP_MID
                        y: 10
                        width: 720
                        text: ""
                        text_color: 0xFFFFFF
                        text_font: font_body
                        long_mode: WRAP
                        text_align: CENTER
                    - label:
                        align: TOP_MID
                        y: 140
                        text: "Thinking..."
                        text_color: 0xF39C12
                        text_font: font_state
                    - image:
                        align: BOTTOM_MID
                        y: -10
                        src: img_thinking

              # --- VA REPLYING group ---
              - obj:
                  id: va_replying_group
                  width: 780
                  height: 630
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  scrollbar_mode: "off"
                  hidden: true
                  on_click:
                    - voice_assistant.stop:
                  widgets:
                    - label:
                        id: replying_text_label
                        align: TOP_MID
                        y: 10
                        width: 720
                        text: ""
                        text_color: 0xFFFFFF
                        text_font: font_response
                        long_mode: WRAP
                        text_align: CENTER
                    - image:
                        id: mood_bg
                        align: BOTTOM_MID
                        y: -10
                        src: mood_neutral

              # --- VA ERROR group ---
              - obj:
                  id: va_error_group
                  width: 780
                  height: 630
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  hidden: true
                  on_click:
                    - voice_assistant.stop:
                  widgets:
                    - label:
                        align: TOP_MID
                        y: 80
                        text: "Error"
                        text_color: 0xE74C3C
                        text_font: font_state
                    - image:
                        align: BOTTOM_MID
                        y: -10
                        src: img_error

              # --- VA MUTED group ---
              - obj:
                  id: va_muted_group
                  width: 780
                  height: 630
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  hidden: true
                  widgets:
                    - label:
                        align: CENTER
                        y: -40
                        text: "Muted"
                        text_color: 0xE74C3C
                        text_font: font_state
                    - label:
                        align: CENTER
                        y: 20
                        text: "Touch to unmute"
                        text_color: 0x888888
                        text_font: font_body
                    - button:
                        align: CENTER
                        y: 100
                        width: 200
                        height: 60
                        bg_color: 0x2ECC71
                        radius: 10
                        on_click:
                          - switch.turn_off: mute
                        widgets:
                          - label:
                              align: CENTER
                              text: "Unmute"
                              text_color: 0xFFFFFF
                              text_font: font_button

# =============================================================================
# GLOBALS
# =============================================================================
globals:
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}

  - id: current_mode
    type: int
    restore_value: no
    initial_value: "0"

  - id: previous_mode
    type: int
    restore_value: no
    initial_value: "0"

  - id: peer_name
    type: std::string
    restore_value: no
    initial_value: '"Home Assistant"'

  # Forecast arrays (5-day)
  - id: forecast_condition
    type: std::array<std::string, 5>
  - id: forecast_temp_max
    type: float[5]
  - id: forecast_temp_min
    type: float[5]
  - id: forecast_dow
    type: int[5]

# =============================================================================
# SCRIPTS
# =============================================================================
script:
  # Remove package's LED-based update_led (P4 has no status_led, uses LVGL display)
  - id: !remove update_led
  - id: update_led
    mode: restart
    then:
      - script.execute: draw_display

  # Display cleanup after VA ends (extends package placeholder)
  - id: !extend va_end_cleanup
    then:
      - script.execute: backlight_timer
      - text_sensor.template.publish:
          id: text_request
          state: ""
      - text_sensor.template.publish:
          id: text_response
          state: ""
      - script.execute: set_idle_or_mute_phase
      - script.execute: draw_display

  # Display state routing (extends package placeholder)
  # Maps g_applied_led to voice_assistant_phase and calls draw_display.
  - id: !extend ui_state_changed
    then:
      - lambda: |-
          int led = id(g_applied_led);
          // Intercom idle: restore previous mode after call ends
          if (led == 0 && id(current_mode) == 1 && id(intercom).get_state_str() == "Idle") {
            id(peer_name) = id(intercom).get_current_destination();
            if (id(previous_mode) == 0) {
              id(current_mode) = 0;
            }
          }
          // Map LED state to voice_assistant_phase
          switch (led) {
            case 0:  // Idle
              if (!api::global_api_server->is_connected()) {
                id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
              } else if (id(mute).state) {
                id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
              } else if (id(speaker_media_player).state == media_player::MEDIA_PLAYER_STATE_PLAYING) {
                lv_img_set_src(id(mood_bg), id(mood_neutral));
                id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              } else {
                id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              }
              break;
            case 1:  // Both muted
            case 2:  // Mic muted
              id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
              break;
            case 4:  // MWW recent / barge-in
            case 5:  // VA Listening
              id(current_mode) = 0;
              id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
              break;
            case 6:  // VA Thinking
              id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
              break;
            case 7:  // VA Speaking (text set by ui_tts_started)
              id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              break;
            case 11: // VA Error
              id(voice_assistant_phase) = ${voice_assist_error_phase_id};
              break;
            case 12: // Media playing
              if (id(mute).state) {
                id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
              } else {
                lv_img_set_src(id(mood_bg), id(mood_neutral));
                id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              }
              break;
            default:
              break;
          }
      - script.execute: backlight_timer
      # Reset text on listening start
      - if:
          condition:
            lambda: 'return id(g_applied_led) == 5;'
          then:
            - text_sensor.template.publish:
                id: text_request
                state: "..."
            - text_sensor.template.publish:
                id: text_response
                state: "..."
      # Intercom idle: update labels if staying in IC mode
      - if:
          condition:
            lambda: |-
              return id(g_applied_led) == 0 && id(current_mode) == 1
                     && id(intercom).get_state_str() == "Idle";
          then:
            - script.execute: update_ic_idle_labels
      - script.execute: draw_display

  # TTS text display (extends package placeholder)
  - id: !extend ui_tts_started
    then:
      # Parse emoticon prefix, set mood background, strip from displayed text
      - lambda: |-
          std::string t = text;
          esphome::image::Image *mood = id(mood_neutral);
          if (t.size() >= 3) {
            std::string prefix = t.substr(0, 3);
            if (prefix == ":-)") {
              mood = id(mood_happy);
            } else if (prefix == ":-(") {
              mood = id(mood_angry);
            } else if (prefix == ":-|") {
              // neutral (default)
            }
            if (prefix == ":-)" || prefix == ":-(" || prefix == ":-|") {
              t = t.substr(3);
              if (!t.empty() && t[0] == ' ') t = t.substr(1);
            }
          }
          lv_img_set_src(id(mood_bg), mood);
          id(text_response).publish_state(t);
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_replying_phase_id}'
      - script.stop: backlight_timer
      - light.turn_on:
          id: display_backlight
          brightness: 100%
      - script.execute: draw_display

  # STT text display (extends package placeholder)
  - id: !extend ui_stt_ended
    then:
      - text_sensor.template.publish:
          id: text_request
          state: !lambda 'return text;'
      - script.execute: draw_display

  # Intercom call display (extends package placeholder)
  - id: !extend ui_ic_call
    then:
      - lambda: |-
          id(peer_name) = peer;
          id(previous_mode) = id(current_mode);
          id(current_mode) = 1;
      - script.execute: backlight_timer
      - script.execute: draw_display

  # Main display rendering: split-screen layout
  - id: draw_display
    mode: restart
    then:
      - lambda: |-
          lv_obj_t* active_scr = lv_disp_get_scr_act(nullptr);

          // Stop idle animation when leaving main page (prevents LVGL memory leak)
          auto stop_anim = [&]() {
            id(ai_animation_loop).stop();
            lv_anim_del(id(idle_animation), nullptr);
          };

          // Overlay pages (full-screen, cover everything)
          if (!wifi::global_wifi_component->is_connected()) {
            stop_anim();
            if (active_scr != id(no_wifi_page)->obj)
              lv_disp_load_scr(id(no_wifi_page)->obj);
            return;
          }
          if (!api::global_api_server->is_connected()) {
            stop_anim();
            if (active_scr != id(no_ha_page)->obj)
              lv_disp_load_scr(id(no_ha_page)->obj);
            return;
          }
          int phase = id(voice_assistant_phase);
          if (phase == ${voice_assist_not_ready_phase_id}) {
            stop_anim();
            if (active_scr != id(no_ha_page)->obj)
              lv_disp_load_scr(id(no_ha_page)->obj);
            return;
          }
          if (phase == ${voice_assist_timer_finished_phase_id}) {
            stop_anim();
            if (active_scr != id(timer_finished_page)->obj)
              lv_disp_load_scr(id(timer_finished_page)->obj);
            return;
          }

          // Normal: show main split-screen page
          if (active_scr != id(main_page)->obj) {
            lv_disp_load_scr(id(main_page)->obj);
            // Disable scrolling on tileview tiles (content must not scroll within tiles)
            lv_obj_clear_flag(id(weather_tile), LV_OBJ_FLAG_SCROLLABLE);
            lv_obj_clear_flag(id(intercom_tile), LV_OBJ_FLAG_SCROLLABLE);
          }

          // === Update VA container (bottom half) ===
          bool va_idle = (phase == ${voice_assist_idle_phase_id});

          // Hide all VA groups
          lv_obj_add_flag(id(va_idle_group), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(va_listening_group), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(va_thinking_group), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(va_replying_group), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(va_error_group), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(va_muted_group), LV_OBJ_FLAG_HIDDEN);

          if (va_idle) {
            lv_obj_clear_flag(id(va_idle_group), LV_OBJ_FLAG_HIDDEN);
          } else if (phase == ${voice_assist_listening_phase_id}) {
            lv_obj_clear_flag(id(va_listening_group), LV_OBJ_FLAG_HIDDEN);
          } else if (phase == ${voice_assist_thinking_phase_id}) {
            lv_label_set_text(id(thinking_text_label), id(text_request).state.c_str());
            lv_obj_clear_flag(id(va_thinking_group), LV_OBJ_FLAG_HIDDEN);
          } else if (phase == ${voice_assist_replying_phase_id}) {
            lv_label_set_text(id(replying_text_label), id(text_response).state.c_str());
            lv_obj_clear_flag(id(va_replying_group), LV_OBJ_FLAG_HIDDEN);
          } else if (phase == ${voice_assist_error_phase_id}) {
            lv_obj_clear_flag(id(va_error_group), LV_OBJ_FLAG_HIDDEN);
          } else if (phase == ${voice_assist_muted_phase_id}) {
            lv_obj_clear_flag(id(va_muted_group), LV_OBJ_FLAG_HIDDEN);
          }

          // === Update intercom tile (top right) ===
          auto ic_state = id(intercom).get_state_str();

          lv_obj_add_flag(id(ic_idle_group), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ic_ringing_in_group), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ic_ringing_out_group), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(ic_in_call_group), LV_OBJ_FLAG_HIDDEN);

          if (ic_state == "Ringing" || ic_state == "Incoming") {
            lv_label_set_text(id(ic_ringing_in_peer_label), id(peer_name).c_str());
            lv_obj_clear_flag(id(ic_ringing_in_group), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_tile_id(id(top_tileview), 1, 0, LV_ANIM_ON);
          } else if (ic_state == "Calling" || ic_state == "Outgoing") {
            lv_label_set_text(id(ic_ringing_out_peer_label), id(peer_name).c_str());
            lv_obj_clear_flag(id(ic_ringing_out_group), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_tile_id(id(top_tileview), 1, 0, LV_ANIM_ON);
          } else if (ic_state == "Streaming" || ic_state == "Answering") {
            lv_label_set_text(id(ic_in_call_peer_label), id(peer_name).c_str());
            lv_obj_clear_flag(id(ic_in_call_group), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_tile_id(id(top_tileview), 1, 0, LV_ANIM_ON);
          } else {
            lv_label_set_text(id(ic_idle_peer_label), id(peer_name).c_str());
            auto csv = id(intercom).get_contacts_csv();
            int count = csv.empty() ? 0 : (int)std::count(csv.begin(), csv.end(), ',') + 1;
            char buf[32];
            snprintf(buf, sizeof(buf), "Contacts: %d", count);
            lv_label_set_text(id(ic_idle_contacts_label), buf);
            lv_obj_clear_flag(id(ic_idle_group), LV_OBJ_FLAG_HIDDEN);
          }

      # Animation lifecycle
      - if:
          condition:
            lambda: |-
              return id(current_mode) == 0 && id(voice_assistant_phase) == ${voice_assist_idle_phase_id} && !id(init_in_progress);
          then:
            - if:
                condition:
                  lambda: return !id(ai_animation_loop).is_running();
                then:
                  - script.execute: ai_animation_loop
          else:
            - script.stop: ai_animation_loop
            - lambda: lv_anim_del(id(idle_animation), nullptr);
      # Self-heal: ensure MWW is active when idle
      - if:
          condition:
            and:
              - lambda: |-
                  return id(voice_assistant_phase) == ${voice_assist_idle_phase_id} &&
                         !id(init_in_progress);
              - switch.is_off: mute
              - not:
                  micro_wake_word.is_running:
              - not:
                  media_player.is_announcing:
          then:
            - micro_wake_word.start:
      - script.execute: update_timer_state

  # Idle animation loop (play once + long pause)
  - id: ai_animation_loop
    mode: single
    then:
      - lambda: |-
          lv_animimg_set_repeat_count(id(idle_animation), 0);
          lv_animimg_start(id(idle_animation));
          lv_anim_del(id(idle_animation), nullptr);
      - while:
          condition:
            lambda: return true;
          then:
            - lambda: lv_animimg_start(id(idle_animation));
            - delay: 25s

  # Weather display update
  - id: update_weather_display
    mode: restart
    then:
      - lambda: |-
          // Condition → MDI icon mapping
          auto icon_for = [](const std::string& c) -> const char* {
            if (c == "sunny") return "\U000F0599";
            if (c == "clear-night") return "\U000F0594";
            if (c == "cloudy") return "\U000F0590";
            if (c == "partlycloudy") return "\U000F0595";
            if (c == "fog") return "\U000F0591";
            if (c == "rainy") return "\U000F0597";
            if (c == "snowy") return "\U000F0598";
            if (c == "lightning") return "\U000F0593";
            if (c == "hail") return "\U000F0592";
            if (c == "windy") return "\U000F059D";
            if (c == "pouring") return "\U000F0596";
            if (c == "snowy-rainy") return "\U000F067F";
            if (c == "windy-variant") return "\U000F059E";
            if (c == "lightning-rainy") return "\U000F067E";
            if (c == "exceptional") return "\U000F0F37";
            return "\U000F0590";
          };
          // Condition → English text
          auto text_for = [](const std::string& c) -> const char* {
            if (c == "sunny") return "Sunny";
            if (c == "clear-night") return "Clear";
            if (c == "cloudy") return "Cloudy";
            if (c == "partlycloudy") return "Partly Cloudy";
            if (c == "fog") return "Fog";
            if (c == "rainy") return "Rain";
            if (c == "snowy") return "Snow";
            if (c == "lightning") return "Thunderstorm";
            if (c == "hail") return "Hail";
            if (c == "windy") return "Windy";
            if (c == "pouring") return "Heavy Rain";
            if (c == "snowy-rainy") return "Sleet";
            if (c == "windy-variant") return "Windy";
            if (c == "lightning-rainy") return "Thunderstorm";
            if (c == "exceptional") return "Exceptional";
            return "";
          };
          static const char* day_full[] = {"Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"};
          static const char* day_short[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
          static const char* month_names[] = {"January","February","March","April","May","June",
                                              "July","August","September","October","November","December"};

          // --- Header: date + clock + wifi + battery ---
          auto now = id(my_time).now();
          if (now.is_valid()) {
            char date_buf[48];
            snprintf(date_buf, sizeof(date_buf), "%s %d %s",
                     day_full[now.day_of_week - 1], now.day_of_month,
                     month_names[now.month - 1]);
            lv_label_set_text(id(weather_date_label), date_buf);

            char clk[8];
            snprintf(clk, sizeof(clk), "%02d:%02d", now.hour, now.minute);
            lv_label_set_text(id(weather_clock_label), clk);
          }

          // WiFi status icon
          if (wifi::global_wifi_component->is_connected()) {
            lv_label_set_text(id(wifi_status_icon), "\U000F05A9");  // mdi:wifi
            lv_obj_set_style_text_color(id(wifi_status_icon), lv_color_hex(0x2ECC71), 0);
          } else {
            lv_label_set_text(id(wifi_status_icon), "\U000F05AA");  // mdi:wifi-off
            lv_obj_set_style_text_color(id(wifi_status_icon), lv_color_hex(0xE74C3C), 0);
          }


          // --- Current weather ---
          auto cond = id(weather_condition).state;
          if (!cond.empty()) {
            lv_label_set_text(id(weather_icon_label), icon_for(cond));
            lv_label_set_text(id(weather_condition_label), text_for(cond));
          }

          if (!std::isnan(id(weather_temperature).state)) {
            char temp[16];
            snprintf(temp, sizeof(temp), "%.0f\u00B0", id(weather_temperature).state);
            lv_label_set_text(id(weather_temp_label), temp);
          }

          auto loc = id(weather_location).state;
          if (!loc.empty()) {
            lv_label_set_text(id(weather_location_label), loc.c_str());
          }

          // Humidity + wind
          char details[64];
          float hum = id(weather_humidity).state;
          float wind = id(weather_wind_speed).state;
          if (!std::isnan(hum) && !std::isnan(wind))
            snprintf(details, sizeof(details), "Humidity: %.0f%%  |  Wind: %.0f km/h", hum, wind);
          else if (!std::isnan(hum))
            snprintf(details, sizeof(details), "Humidity: %.0f%%", hum);
          else
            details[0] = '\0';
          lv_label_set_text(id(weather_details_label), details);

          // --- Forecast 5 days ---
          lv_obj_t* fc_day_labels[] = {id(fc0_day_label), id(fc1_day_label), id(fc2_day_label), id(fc3_day_label), id(fc4_day_label)};
          lv_obj_t* fc_icon_labels[] = {id(fc0_icon_label), id(fc1_icon_label), id(fc2_icon_label), id(fc3_icon_label), id(fc4_icon_label)};
          lv_obj_t* fc_max_labels[] = {id(fc0_max_label), id(fc1_max_label), id(fc2_max_label), id(fc3_max_label), id(fc4_max_label)};
          lv_obj_t* fc_min_labels[] = {id(fc0_min_label), id(fc1_min_label), id(fc2_min_label), id(fc3_min_label), id(fc4_min_label)};
          for (int i = 0; i < 5; i++) {
            int dow = id(forecast_dow)[i];
            if (dow >= 0 && dow <= 6)
              lv_label_set_text(fc_day_labels[i], day_full[dow]);
            auto& fc = id(forecast_condition)[i];
            if (!fc.empty())
              lv_label_set_text(fc_icon_labels[i], icon_for(fc));
            char t[16];
            snprintf(t, sizeof(t), "Max: %.0f\u00B0", id(forecast_temp_max)[i]);
            lv_label_set_text(fc_max_labels[i], t);
            snprintf(t, sizeof(t), "Min: %.0f\u00B0", id(forecast_temp_min)[i]);
            lv_label_set_text(fc_min_labels[i], t);
          }

  # Fetch 5-day forecast from HA
  - id: fetch_forecast
    mode: single
    then:
      - homeassistant.action:
          action: weather.get_forecasts
          data:
            entity_id: weather.casa
            type: daily
          capture_response: true
          on_success:
            - lambda: |-
                JsonObjectConst resp = response["response"];
                JsonObjectConst data = resp["weather.casa"];
                JsonArrayConst forecast = data["forecast"];
                for (int i = 0; i < 5 && i < (int)forecast.size(); i++) {
                  JsonObjectConst day = forecast[i];
                  id(forecast_condition)[i] = day["condition"].as<std::string>();
                  id(forecast_temp_max)[i]  = day["temperature"]   | 0.0f;
                  id(forecast_temp_min)[i]  = day["templow"]       | 0.0f;
                  // Extract day of week from datetime
                  std::string dt = day["datetime"].as<std::string>();
                  int y, m, d;
                  sscanf(dt.c_str(), "%d-%d-%d", &y, &m, &d);
                  struct tm tm = {};
                  tm.tm_year = y - 1900;
                  tm.tm_mon = m - 1;
                  tm.tm_mday = d;
                  mktime(&tm);
                  id(forecast_dow)[i] = tm.tm_wday;
                }
            - script.execute: update_weather_display

  # Timer state update
  - id: update_timer_state
    then:
      - lambda: |-
          const auto &timers = id(va).get_timers();
          bool any_active = false;
          voice_assistant::Timer first_active{};
          for (const auto &t : timers) {
            if (t.is_active && (!any_active || t.seconds_left < first_active.seconds_left)) {
              first_active = t;
              any_active = true;
            }
          }
          int phase = id(voice_assistant_phase);
          bool on_supported_page = (
            phase == ${voice_assist_idle_phase_id} ||
            phase == ${voice_assist_listening_phase_id} ||
            phase == ${voice_assist_thinking_phase_id} ||
            phase == ${voice_assist_muted_phase_id}
          );
          if (!on_supported_page || !any_active) {
            lv_obj_add_flag(id(timer_overlay), LV_OBJ_FLAG_HIDDEN);
            return;
          }
          uint32_t sec = first_active.seconds_left;
          lv_bar_set_value(id(timer_bar), 100, LV_ANIM_OFF);
          char buf[8];
          int h = sec / 3600;
          int m = (sec / 60) % 60;
          int s = sec % 60;
          if (h > 0) snprintf(buf, sizeof(buf), "%02d:%02d", h, m);
          else       snprintf(buf, sizeof(buf), "%02d:%02d", m, s);
          lv_label_set_text(id(timer_label), buf);
          lv_obj_clear_flag(id(timer_overlay), LV_OBJ_FLAG_HIDDEN);

  # Update peer name + contacts count on the intercom idle group.
  # Used by next/prev_contact_button and by ui_state_changed when staying idle.
  - id: update_ic_idle_labels
    then:
      - lambda: id(peer_name) = id(intercom).get_current_destination();
      - lvgl.label.update:
          id: ic_idle_peer_label
          text: !lambda 'return id(peer_name);'
      - lvgl.label.update:
          id: ic_idle_contacts_label
          text: !lambda |-
            auto csv = id(intercom).get_contacts_csv();
            int count = csv.empty() ? 0 : (int)std::count(csv.begin(), csv.end(), ',') + 1;
            char buf[32];
            snprintf(buf, sizeof(buf), "Contacts: %d", count);
            return std::string(buf);

  # VA end handler (mode: restart ensures barge-in cancels previous on_end)
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_on: mute
          then:
            - globals.set:
                id: voice_assistant_phase
                value: '${voice_assist_muted_phase_id}'
          else:
            - if:
                condition:
                  media_player.is_playing:
                then:
                  # Music playing: show neutral mood screen instead of idle animation
                  - lambda: |-
                      lv_img_set_src(id(mood_bg), id(mood_neutral));
                  - globals.set:
                      id: voice_assistant_phase
                      value: '${voice_assist_replying_phase_id}'
                else:
                  - globals.set:
                      id: voice_assistant_phase
                      value: '${voice_assist_idle_phase_id}'

  # Timer alarm loop
  - id: timer_alarm_loop
    mode: single
    then:
      - while:
          condition:
            switch.is_on: timer_ringing
          then:
            - media_player.speaker.play_on_device_media_file:
                media_file: timer_finished_sound
                announcement: true
            - delay: 6s

  # Backlight auto-off timer
  - id: backlight_timer
    mode: restart
    then:
      - light.turn_on:
          id: display_backlight
          brightness: 100%
      - delay: 60s
      - light.turn_on:
          id: display_backlight
          brightness: 60%
      - delay: 120s
      - light.turn_on:
          id: display_backlight
          brightness: 20%

# =============================================================================
# TEMPLATE BUTTONS (exposed to HA card)
# =============================================================================
button:
  - id: !extend next_contact_button
    on_press:
      - script.execute: update_ic_idle_labels
      - script.execute: draw_display

  - id: !extend prev_contact_button
    on_press:
      - script.execute: update_ic_idle_labels
      - script.execute: draw_display

# =============================================================================
# PHYSICAL BUTTON (GPIO0)
# =============================================================================
binary_sensor:
  - platform: status
    name: Status

  - platform: gpio
    name: Boot Button
    id: boot_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      # Single click: toggle VA or stop timer
      - timing:
          - ON for at most 500ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      - voice_assistant.stop:
                    else:
                      - voice_assistant.start:
      # Long press: toggle mute
      - timing:
          - ON for 1s to 3s
          - OFF for at least 300ms
        then:
          - switch.toggle: mute

# =============================================================================
# SWITCHES
# =============================================================================
switch:
  # Remove package-provided mute and speaker_mute (device needs mic_aec + amp control)
  - id: !remove mute
  - id: !remove speaker_mute

  # Mic Mute (device override): uses mic_aec, adds display updates
  - platform: template
    name: Mic Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: ALWAYS_OFF
    entity_category: config
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute ON: microphone silenced, MWW stopped"
      - voice_assistant.stop:
      - micro_wake_word.stop:
      - microphone.mute: mic_aec
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_muted_phase_id}'
      - script.execute: draw_display
      - script.execute: update_status
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute OFF: microphone active, MWW started"
      - microphone.unmute: mic_aec
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_idle_phase_id}'
      - if:
          condition:
            not:
              micro_wake_word.is_running:
          then:
            - micro_wake_word.start:
      - script.execute: draw_display
      - script.execute: update_status

  # Speaker Mute (device override): adds amp enable/disable
  - platform: template
    name: Speaker Mute
    id: speaker_mute
    icon: mdi:volume-off
    entity_category: config
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute ON: DAC muted, amplifier off"
      - speaker.mute_on: hw_speaker
      - delay: 50ms
      - output.turn_off: speaker_enable
      - script.execute: update_status
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute OFF: amplifier on, DAC unmuted"
      - output.turn_on: speaker_enable
      - delay: 50ms
      - speaker.mute_off: hw_speaker
      - script.execute: update_status

  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - script.stop: timer_alarm_loop
      - media_player.stop:
          announcement: true
    on_turn_on:
      - media_player.stop:
          announcement: true
      - script.execute: timer_alarm_loop
      - delay: 15min
      - switch.turn_off: timer_ringing

  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: Auto Answer
      icon: mdi:phone-in-talk
      restore_mode: RESTORE_DEFAULT_OFF

  # AEC switch via i2s_audio_duplex (avoids double-processing with mic_aec)
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON

# =============================================================================
# NUMBERS
# =============================================================================
number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    mic_gain:
      name: Mic Gain

  - platform: template
    id: speaker_volume
    name: "Speaker Volume"
    icon: "mdi:volume-high"
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 50
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    set_action:
      - lambda: |-
          float es8311_vol = 0.15 + (x / 100.0) * 0.60;
          id(es8311_dac).set_volume(es8311_vol);

# =============================================================================
# Select Entities
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    options:
      - "sr_low_cost"
      - "sr_high_perf"
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "sr_low_cost"
    optimistic: true
    restore_value: true
    set_action:
      - if:
          condition:
            lambda: 'return id(init_in_progress);'
          then:
            - logger.log: "AEC mode select: skipping during boot"
          else:
            - if:
                condition:
                  or:
                    - voice_assistant.is_running:
                    - not:
                        intercom_api.is_idle: intercom
                then:
                  - logger.log:
                      level: WARN
                      format: "Cannot switch AEC mode during active VA/intercom"
                else:
                  - logger.log:
                      format: "Switching AEC mode to %s"
                      args: ['x.c_str()']
                  - micro_wake_word.stop:
                  - i2s_audio_duplex.stop: i2s_duplex
                  - esp_aec.set_mode:
                      id: aec_processor
                      mode: !lambda 'return x;'
                  - i2s_audio_duplex.start: i2s_duplex
                  - delay: 300ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start:

# =============================================================================
# TEXT SENSORS
# =============================================================================
text_sensor:
  # Extend package ha_active_devices with display updates
  - id: !extend ha_active_devices
    on_value:
      - lambda: 'id(peer_name) = id(intercom).get_current_destination();'
      - script.execute: draw_display

  - platform: debug
    device:
      name: Device Info
      entity_category: diagnostic
    reset_reason:
      name: Reset Reason
      entity_category: diagnostic

  - id: text_request
    platform: template

  - id: text_response
    platform: template

  - platform: homeassistant
    id: weather_condition
    entity_id: weather.casa
    internal: true
    on_value:
      - script.execute: update_weather_display

  - platform: homeassistant
    id: weather_location
    entity_id: weather.casa
    attribute: friendly_name
    internal: true

# =============================================================================
# SENSORS
# =============================================================================
sensor:
  - platform: wifi_signal
    name: WiFi Signal
    id: wifi_rssi
    update_interval: 60s
    entity_category: diagnostic


  - platform: uptime
    name: Uptime
    update_interval: 60s
    entity_category: diagnostic

  - platform: internal_temperature
    name: CPU Temperature
    update_interval: 60s
    entity_category: diagnostic

  # Debug component: kept for P4-only fields (CPU Frequency, PSRAM Free,
  # Main Loop Max Time). Heap fields moved to template sensors below to
  # match the S3 yamls (KB unit instead of raw bytes).
  - platform: debug
    loop_time:
      name: Main Loop Max Time
      entity_category: diagnostic
    psram:
      name: PSRAM Free
      entity_category: diagnostic
    cpu_frequency:
      name: CPU Frequency
      entity_category: diagnostic

  # Heap diagnostics in KB (aligned with xiaozhi / waveshare-s3 yamls)
  - platform: template
    name: Free Heap
    update_interval: 10s
    unit_of_measurement: KB
    entity_category: diagnostic
    lambda: 'return esp_get_free_heap_size() / 1024.0f;'

  - platform: template
    name: Free Internal
    update_interval: 10s
    unit_of_measurement: KB
    entity_category: diagnostic
    lambda: 'return heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024.0f;'

  - platform: template
    name: Internal Heap Minimum
    update_interval: 10s
    unit_of_measurement: KB
    entity_category: diagnostic
    lambda: 'return heap_caps_get_minimum_free_size(MALLOC_CAP_INTERNAL) / 1024.0f;'

  - platform: template
    name: Internal Largest Block
    update_interval: 10s
    unit_of_measurement: KB
    entity_category: diagnostic
    lambda: 'return heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL) / 1024.0f;'

  - platform: homeassistant
    id: weather_temperature
    entity_id: weather.casa
    attribute: temperature
    internal: true
    on_value:
      - script.execute: update_weather_display

  - platform: homeassistant
    id: weather_humidity
    entity_id: weather.casa
    attribute: humidity
    internal: true

  - platform: homeassistant
    id: weather_wind_speed
    entity_id: weather.casa
    attribute: wind_speed
    internal: true

# =============================================================================
# PERIODIC UPDATES
# =============================================================================
interval:
  # Update weather display + clocks every 30s
  - interval: 30s
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - script.execute: update_weather_display

  # Fetch forecast every 5 min
  - interval: 5min
    then:
      - if:
          condition:
            api.connected:
          then:
            - script.execute: fetch_forecast
