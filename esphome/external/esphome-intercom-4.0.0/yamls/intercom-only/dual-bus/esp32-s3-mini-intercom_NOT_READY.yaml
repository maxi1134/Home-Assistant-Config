# ==============================================================================
# ESP32-S3 INTERCOM MINI - New TCP-based API
# ==============================================================================
#
# Uses the new intercom_api component with TCP streaming on port 6054.
# Clean YAML syntax with native platform entities (no lambdas!)
#
# HARDWARE:
#   - Board: ESP32-S3 Mini (4MB Flash, Quad PSRAM)
#   - Microphone: SPH0645 I2S MEMS (I2S_NUM_0) - has DC offset
#   - Speaker: MAX98357A I2S amplifier (I2S_NUM_1)
#   - LED: WS2812 RGB (GPIO21)
#
# GPIO PINOUT:
#   Microphone (SPH0645):
#     - WS/LRCLK: GPIO3
#     - SCK/BCLK: GPIO2
#     - SD/DIN:   GPIO4
#
#   Speaker (MAX98357A):
#     - LRC/LRCLK: GPIO6
#     - BCLK:      GPIO7
#     - DIN:       GPIO8
#
#   LED (WS2812):
#     - DATA: GPIO21
#
# ==============================================================================

substitutions:
  # Hardware-shared identity: dropping firmware-variant suffix keeps build cache
  # and HA device entity stable across rebuilds.
  name: esp32-s3-mini
  friendly_name: ESP32-S3 Mini

  # ---- External components: Remote (release / users without local clone) ----
  # ext_components_source: "github://n-IA-hane/esphome-intercom@main"
  # ---- External components: Local (dev, clone repo first; toggle by swapping the comment) ----
  ext_components_source: "../../../esphome/components"

# ==============================================================================
# Package: shared intercom state machine
# ==============================================================================
packages:
  # ---- Remote (release / users without local clone) ----
  # core: github://n-IA-hane/esphome-intercom/packages/intercom_only.yaml@main
  # s3_base: github://n-IA-hane/esphome-intercom/packages/platform/esp32s3_base.yaml@main
  # ---- Local (dev, clone repo first; toggle: comment the remote block above and uncomment the block below) ----
  core: !include ../../../packages/intercom_only.yaml
  s3_base: !include ../../../packages/platform/esp32s3_base.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      # Allow mbedtls to allocate its working buffers in PSRAM.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: quad    # Mini has quad PSRAM
  speed: 80MHz

# ==============================================================================
# CONNECTIVITY
# ==============================================================================
api:
  on_client_connected:
    - lambda: |-
        static bool published = false;
        if (!published) {
          published = true;
          id(intercom).publish_entity_states();
        }

ota:
  - platform: esphome

logger:
  hardware_uart: UART0
  level: INFO
  logs:
    intercom_api: INFO
    component: INFO

network:
  enable_high_performance: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# ==============================================================================
# EXTERNAL COMPONENTS
# ==============================================================================
external_components:
  - source: ${ext_components_source}
    components: [intercom_api, esp_aec, audio_processor]

# ==============================================================================
# I2S AUDIO BUSES
# ==============================================================================
i2s_audio:
  # I2S Bus 0: SPH0645 Microphone
  - id: i2s_mic_bus
    i2s_lrclk_pin: GPIO3
    i2s_bclk_pin: GPIO2

  # I2S Bus 1: MAX98357A Speaker
  - id: i2s_spk_bus
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO7

# ==============================================================================
# MICROPHONE (SPH0645)
# ==============================================================================
microphone:
  - platform: i2s_audio
    id: mic_main
    i2s_audio_id: i2s_mic_bus
    i2s_din_pin: GPIO4
    adc_type: external
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    channel: left

# ==============================================================================
# SPEAKER (MAX98357A)
# ==============================================================================
speaker:
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_spk_bus
    i2s_dout_pin: GPIO8
    dac_type: external
    i2s_mode: primary
    sample_rate: 16000
    bits_per_sample: 16bit
    timeout: never        # Keep I2S running (avoids clicks on resume)
    buffer_duration: 100ms  # Low latency buffer for real-time intercom

# ==============================================================================
# AEC (Acoustic Echo Cancellation)
# ==============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 8     # 8 = 128ms tail (max value, covers most latency scenarios)
  mode: voip_high_perf # High performance AEC for better echo cancellation

# ==============================================================================
# Intercom API: Device part (merged with package callbacks)
# ==============================================================================
intercom_api:
  id: intercom
  mode: full
  microphone: mic_main
  speaker: hw_speaker
  dc_offset_removal: true
  processor_id: aec_processor
  ringing_timeout: 30s

# ==============================================================================
# Switches (device-specific)
# ==============================================================================
switch:
  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: "Auto Answer"
      restore_mode: RESTORE_DEFAULT_OFF
    aec:
      id: aec_switch
      name: "Echo Cancellation"
      restore_mode: RESTORE_DEFAULT_ON

# ==============================================================================
# NUMBERS (native platform with restore_value)
# ==============================================================================
number:
  - platform: intercom_api
    intercom_api_id: intercom
    speaker_volume:
      id: speaker_volume
      name: "Speaker Volume"
    mic_gain:
      id: mic_gain
      name: "Mic Gain"

# ==============================================================================
# STATUS LED (WS2812 RGB on GPIO21)
# ==============================================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    icon: "mdi:led-on"
    pin: GPIO21
    chipset: WS2812
    num_leds: 1
    rgb_order: RGB
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Streaming"
          min_brightness: 20%
          max_brightness: 100%
      - strobe:
          name: "Ringing"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
            - state: false
              duration: 250ms
      - strobe:
          name: "Calling"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 50%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms

# ==============================================================================
# DIAGNOSTICS
# ==============================================================================
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: internal_temperature
    name: "CPU Temperature"
    update_interval: 60s
