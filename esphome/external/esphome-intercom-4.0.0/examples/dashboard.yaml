# Example Lovelace Dashboard for Intercom
#
# Each device section includes the intercom card plus all available controls:
# volume, mic gain, AEC on/off, AEC mode select, auto answer, wake word,
# mic mute, and speaker mute.

title: Intercom
views:
  - title: Intercom
    icon: mdi:phone-voip
    cards: []
    type: sections
    max_columns: 2
    sections:
      # --- VA + Intercom device (with AEC mode select) ---
      - type: grid
        cards:
          - type: custom:intercom-card
            entity_id: <your_device_id>
            name: My Device
            mode: full
          - type: entities
            entities:
              - entity: number.<your_device>_speaker_volume
                name: Volume
              - entity: number.<your_device>_mic_gain
                name: Mic gain
              - entity: switch.<your_device>_echo_cancellation
              - entity: select.<your_device>_aec_mode
              - entity: switch.<your_device>_auto_answer
              - entity: button.<your_device>_restart
              - entity: sensor.<your_device>_contacts
              - entity: select.<your_device>_wake_word
              - entity: switch.<your_device>_wake_word
              - entity: switch.<your_device>_mic_mute
              - entity: switch.<your_device>_speaker_mute
      # --- Intercom-only device (no VA, no wake word) ---
      - type: grid
        cards:
          - type: custom:intercom-card
            entity_id: <your_device_id>
            name: My Intercom
            mode: full
          - type: entities
            entities:
              - entity: number.<your_device>_speaker_volume
                name: Volume
              - entity: number.<your_device>_mic_gain
                name: Mic gain
              - entity: switch.<your_device>_echo_cancellation
              - entity: switch.<your_device>_auto_answer
              - entity: button.<your_device>_restart
              - entity: switch.<your_device>_mic_mute
              - entity: switch.<your_device>_speaker_mute
