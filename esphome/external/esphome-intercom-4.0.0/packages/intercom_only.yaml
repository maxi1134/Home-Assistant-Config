# =============================================================================
# Intercom-Only Package (no VA, no MWW)
# =============================================================================
#
# Subset of va_intercom.yaml for intercom-only devices.
# Provides: intercom callbacks, buttons, mute switches, LED reducer, contacts.
# Does NOT provide: voice_assistant, micro_wake_word, VA-related globals/scripts.
#
# Required IDs (defined by device):
#   mic_main              - Microphone
#   hw_speaker            - Hardware speaker output (or spk_component for direct)
#   status_led            - LED/light entity
#   intercom_ringing_sound - Media file for ringtone (if using ringtone loop)
#
# Required substitutions:
#   ${friendly_name}      - Used in intercom doorbell event
#
# g_applied_led values (intercom subset):
#   0=off, 1=both_muted, 2=mic_muted, 3=spk_muted,
#   8=ic_ringing, 9=ic_outgoing, 10=ic_streaming
# =============================================================================

# =============================================================================
# Globals
# =============================================================================
globals:
  - id: g_applied_led
    type: int
    restore_value: false
    initial_value: "-1"

# =============================================================================
# Intercom API: Callbacks (hardware config provided by device)
# =============================================================================
intercom_api:
  id: intercom

  on_outgoing_call:
    - script.execute: update_status
    - script.execute:
        id: ui_ic_call
        peer: !lambda 'return id(intercom).get_current_destination();'
    - if:
        condition:
          intercom_api.is_ha_destination: intercom
        then:
          - homeassistant.event:
              event: esphome.intercom_call
              data:
                caller: "${friendly_name}"
                destination: "Home Assistant"
                type: "doorbell"

  on_ringing:
    - script.execute: update_status
    - script.execute:
        id: ui_ic_call
        peer: !lambda 'return id(intercom).get_caller();'

  on_streaming:
    - script.execute: update_status
    - script.execute:
        id: ui_ic_call
        peer: !lambda |-
          auto c = id(intercom).get_caller();
          return c.empty() ? id(intercom).get_current_destination() : c;

  on_idle:
    - script.execute: update_status

  on_hangup:
    - script.execute: update_status
    - logger.log:
        format: "Hangup: %s"
        args: ['reason.c_str()']

  on_call_failed:
    - script.execute: update_status
    - logger.log:
        format: "Call failed: %s"
        args: ['reason.c_str()']

# =============================================================================
# Scripts
# =============================================================================
script:
  # Central reducer (intercom-only subset)
  - id: update_status
    mode: restart
    then:
      - lambda: |-
          int target = 0;
          if (id(mute).state && id(speaker_mute).state) target = 1;
          else if (id(mute).state) target = 2;
          else if (id(speaker_mute).state) target = 3;
          else if (id(intercom).is_ringing()) target = 8;
          else if (id(intercom).is_outgoing()) target = 9;
          else if (id(intercom).is_streaming()) target = 10;
          id(g_applied_led) = target;
      - script.execute: update_led

  # LED state from g_applied_led (intercom subset)
  # Display devices override with !extend.
  - id: update_led
    mode: restart
    then:
      - lambda: |-
          static int last = -2;
          int t = id(g_applied_led);
          if (t == last) return;
          last = t;
          auto *led = id(status_led);
          switch (t) {
            case 1:  // Both muted: red slow pulse
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.4f).set_effect("Slow Pulse").perform();
              break;
            case 2:  // Mic muted: red dim solid
              led->turn_on().set_rgb(1.0f, 0.0f, 0.0f).set_brightness(0.3f).set_effect("None").perform();
              break;
            case 3:  // Speaker muted: orange dim solid
              led->turn_on().set_rgb(1.0f, 0.5f, 0.0f).set_brightness(0.3f).set_effect("None").perform();
              break;
            case 8:  // IC Ringing: red strobe
              led->turn_on().set_effect("Ringing").perform();
              break;
            case 9:  // IC Outgoing: orange strobe
              led->turn_on().set_effect("Calling").perform();
              break;
            case 10: // IC Streaming: green solid
              led->turn_on().set_rgb(0.3f, 0.69f, 0.31f).set_brightness(1.0f).set_effect("None").perform();
              break;
            default: // Off
              led->turn_off().perform();
              break;
          }

  # Hook placeholder: devices with a display can !extend to update intercom UI
  # widgets (peer name, page transitions, etc.) when a call starts/changes.
  - id: ui_ic_call
    parameters:
      peer: string
    then: []

# =============================================================================
# Buttons
# =============================================================================
button:
  - platform: template
    name: Call
    id: call_button
    icon: mdi:phone
    on_press:
      - intercom_api.call_toggle: intercom

  - platform: template
    name: Next Contact
    id: next_contact_button
    icon: mdi:skip-next
    on_press:
      - intercom_api.next_contact: intercom

  - platform: template
    name: Previous Contact
    id: prev_contact_button
    icon: mdi:skip-previous
    on_press:
      - intercom_api.prev_contact: intercom

  - platform: template
    name: Decline
    id: decline_button
    icon: mdi:phone-hangup
    on_press:
      - intercom_api.decline_call: intercom

  - platform: restart
    name: Restart
    entity_category: config

# =============================================================================
# Switches
# =============================================================================
switch:
  - platform: template
    name: Mic Mute
    id: mute
    icon: mdi:microphone-off
    entity_category: config
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute ON"
      - microphone.mute: mic_main
      - script.execute: update_status
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute OFF"
      - microphone.unmute: mic_main
      - script.execute: update_status

  - platform: template
    name: Speaker Mute
    id: speaker_mute
    icon: mdi:volume-off
    entity_category: config
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute ON"
      - speaker.mute_on: hw_speaker
      - script.execute: update_status
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute OFF"
      - speaker.mute_off: hw_speaker
      - script.execute: update_status

# =============================================================================
# Text Sensors
# =============================================================================
text_sensor:
  - platform: homeassistant
    id: ha_active_devices
    entity_id: sensor.intercom_active_devices
    # ESPHome's TextSensor::publish_state always fires on_value, even when the
    # value is identical to the previous one. HA also re-emits the current state
    # on every reconnect/subscribe. Drop unchanged CSV here so set_contacts() and
    # any device-side on_value extensions only fire on real change.
    filters:
      - lambda: |-
          static std::string last;
          if (x == last) return optional<std::string>{};
          last = x;
          return optional<std::string>(x);
    on_value:
      - intercom_api.set_contacts:
          id: intercom
          contacts_csv: !lambda 'return x;'

# No CONFIG_LWIP_MAX_SOCKETS override: intercom_api reserves its socket
# quota through socket.consume_sockets() in its Python validation path,
# so ESPHome sizes the setting automatically.
