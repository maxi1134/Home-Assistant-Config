# =============================================================================
# JTAG debug profile (opt-in, development only)
# =============================================================================
#
# Include this package when attaching JTAG (OpenOCD + GDB) for live
# debugging. It enables the FreeRTOS task table that OpenOCD needs for
# thread-aware "info threads" to work correctly when tasks have their
# stacks in PSRAM.
#
# Do NOT include this package in production YAMLs published to users:
# OCD_AWARE has no runtime benefit but costs a small amount of flash.
#
# Usage:
#   packages:
#     jtag:
#       url: https://github.com/n-IA-hane/esphome-intercom
#       file: packages/debug/jtag.yaml
#       ref: audio-core-v2
# =============================================================================

esp32:
  framework:
    type: esp-idf
    sdkconfig_options:
      # Emit the FreeRTOS task table so OpenOCD's thread-aware debugging
      # reads accurate TCBs when stacks live in PSRAM.
      CONFIG_ESP_DEBUG_OCDAWARE: "y"
