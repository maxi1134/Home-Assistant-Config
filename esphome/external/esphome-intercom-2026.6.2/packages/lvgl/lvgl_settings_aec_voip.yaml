# =============================================================================
# Settings page: AEC switch + AEC mode dropdown (VoIP variant).
# =============================================================================
id: settings_aec_page
bg_color: 0x202020
on_swipe_left:
  - script.execute:
      id: ic_settings_navigate
      delta: 1
on_swipe_right:
  - script.execute:
      id: ic_settings_navigate
      delta: -1
on_swipe_down:
  - script.execute: ic_settings_close
widgets:
  - label:
      align: TOP_MID
      y: 48
      width: ${ic_settings_mid_width}
      text: "AEC"
      text_color: 0xFFFFFF
      text_font: ${ic_settings_label_font}
      text_align: CENTER
  - switch:
      id: ui_aec_sw
      align: TOP_MID
      y: 74
      width: ${ic_settings_switch_width}
      height: ${ic_settings_switch_height}
      state:
        checked: !lambda 'return id(aec_switch).state;'
      on_value:
        - lambda: |-
            if (x == id(aec_switch).state) return;
            if (x) id(aec_switch).turn_on();
            else id(aec_switch).turn_off();
  - label:
      align: TOP_MID
      y: 112
      width: ${ic_settings_wide_width}
      text: "AEC mode"
      text_color: 0xFFFFFF
      text_font: ${ic_settings_label_font}
      text_align: CENTER
  - dropdown:
      id: ui_aec_mode_dd
      align: TOP_MID
      y: 140
      width: ${ic_settings_dropdown_width}
      height: 28
      selected_text: !lambda 'return id(aec_mode_select).current_option();'
      options:
        - "voip_low_cost"
        - "voip_high_perf"
      on_value:
        - select.set_index:
            id: aec_mode_select
            index: !lambda 'return x;'
