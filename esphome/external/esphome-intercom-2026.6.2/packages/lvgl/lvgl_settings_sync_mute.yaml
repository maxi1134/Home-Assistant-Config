# =============================================================================
# LVGL settings runtime sync: mute / answer / DND controls.
# =============================================================================

script:
  - id: settings_sync_mute_widgets
    mode: restart
    then:
      - lvgl.switch.update:
          id: ui_speaker_mute_sw
          state:
            checked: !lambda 'return id(speaker_mute).state;'
      - lvgl.switch.update:
          id: ui_mic_mute_sw
          state:
            checked: !lambda 'return id(mute).state;'
      - lvgl.switch.update:
          id: ui_auto_answer_sw
          state:
            checked: !lambda 'return id(auto_answer_switch).state;'
      - lvgl.switch.update:
          id: ui_dnd_sw
          state:
            checked: !lambda 'return id(dnd_switch).state;'

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(ic_settings_active);'
          then:
            - script.execute: settings_sync_mute_widgets
