# =============================================================================
# LVGL settings runtime sync: voice assistant controls.
# =============================================================================

script:
  - id: settings_sync_va_widgets
    mode: restart
    then:
      - lvgl.switch.update:
          id: ui_wake_word_sw
          state:
            checked: !lambda 'return id(wake_word_switch).state;'

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(ic_settings_active);'
          then:
            - script.execute: settings_sync_va_widgets
