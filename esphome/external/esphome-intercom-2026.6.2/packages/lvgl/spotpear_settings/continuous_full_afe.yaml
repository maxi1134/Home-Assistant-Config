# Spotpear round-display settings surface for full AFE builds.
# The page is one vertical scroll view: swipe down exits to Intercom only when
# the scroll position is already at the top. Widget IDs intentionally match the
# generic settings sync packages.
id: settings_continuous_page
bg_color: 0x202020
scrollable: true
scroll_elastic: true
scroll_dir: VER
scrollbar_mode: AUTO
on_scroll:
  - lambda: |-
      if (!id(ic_settings_active)) return;
      if (lv_obj_get_scroll_y(id(settings_continuous_page)->obj) < -28) {
        id(ic_settings_close).execute();
      }
widgets:
  - label:
      text: "Audio"
      align: TOP_MID
      y: 18
      width: ${ic_settings_mid_width}
      text_align: CENTER
      text_font: montserrat_16
      text_color: 0xFFFFFF
  - label:
      text: "Master volume"
      align: TOP_MID
      y: 48
      width: ${ic_settings_mid_width}
      text_align: CENTER
      text_font: montserrat_14
      text_color: 0xB0B0B0
  - slider:
      id: ui_speaker_vol_slider
      align: TOP_MID
      y: 74
      width: ${ic_settings_row_width}
      height: 14
      min_value: 0
      max_value: 100
      value: !lambda 'return id(master_volume).state;'
      adv_hittest: true
      gesture_bubble: true
      on_release:
        - number.set:
            id: master_volume
            value: !lambda 'return x;'
  - label:
      text: "Microphone gain"
      align: TOP_MID
      y: 106
      width: ${ic_settings_mid_width}
      text_align: CENTER
      text_font: montserrat_14
      text_color: 0xB0B0B0
  - slider:
      id: ui_mic_vol_slider
      align: TOP_MID
      y: 132
      width: ${ic_settings_row_width}
      height: 14
      min_value: -20
      max_value: 30
      value: !lambda 'return id(mic_gain).state;'
      adv_hittest: true
      gesture_bubble: true
      on_release:
        - number.set:
            id: mic_gain
            value: !lambda 'return x;'
  - label:
      text: "Call"
      align: TOP_MID
      y: 178
      width: ${ic_settings_mid_width}
      text_align: CENTER
      text_font: montserrat_16
      text_color: 0xFFFFFF
  - obj:
      align: TOP_MID
      y: 210
      width: ${ic_settings_mid_width}
      height: 38
      bg_opa: TRANSP
      border_width: 0
      pad_all: 0
      widgets:
        - label:
            text: "Speaker mute"
            align: LEFT_MID
            x: 0
            width: 120
            text_font: montserrat_14
            text_color: 0xB0B0B0
        - switch:
            id: ui_speaker_mute_sw
            align: RIGHT_MID
            width: 44
            height: 24
            state:
              checked: !lambda 'return id(speaker_mute).state;'
            on_value:
              - lambda: |-
                  if (x == id(speaker_mute).state) return;
                  if (x) id(speaker_mute).turn_on();
                  else id(speaker_mute).turn_off();
  - obj:
