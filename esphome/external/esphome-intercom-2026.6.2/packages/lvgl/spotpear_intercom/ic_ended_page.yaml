id: ic_ended_page
bg_color: 0x202020
# Tap anywhere on the page = skip the 4 s auto-return countdown.
on_click:
  - lambda: 'id(ic_ended_active) = false;'
  - script.execute: draw_display
widgets:
  - label:
      align: TOP_MID
      y: 8%
      text: "${friendly_name}"
      text_color: 0xFFFFFF
      text_font: font_title
      text_align: CENTER
      width: ${ic_title_width}
      long_mode: SCROLL
  - label:
      align: CENTER
      y: -22%
      text: "Call ended"
      text_color: 0xFFFFFF
      text_font: font_title
      text_align: CENTER
      width: ${ic_ended_text_width}
  - label:
      id: ic_ended_peer_label
      align: CENTER
      text: ""
      text_color: 0xFFFFFF
      # font_title carries the full GF_Latin_Core glyph set so
      # the free-form peer name renders correctly.
      text_font: font_title
      text_align: CENTER
      long_mode: SCROLL
      width: ${ic_peer_width}
  - label:
      align: CENTER
      y: 13%
      text: "Reason:"
      text_color: 0xFFFFFF
      text_font: font_info
      text_align: CENTER
      width: ${ic_ended_text_width}
  - label:
      id: ic_ended_reason_label
      align: CENTER
      y: 25%
      text: "-"
      text_color: 0xFFCC66
      text_font: font_info
      text_align: CENTER
      long_mode: SCROLL
      width: ${ic_ended_reason_text_width}
