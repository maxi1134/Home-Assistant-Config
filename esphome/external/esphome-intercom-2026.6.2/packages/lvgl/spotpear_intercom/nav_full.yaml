# Spotpear full-experience intercom navigation.
#
# Vertical stack:
#   VA screen --swipe up--> Intercom --swipe up--> Settings
#   Settings --swipe down--> Intercom --swipe down--> VA screen
#
# Requires the full-experience scripts/globals:
#   swipe_to_va, ic_settings_open, nav_anim, nav_anim_ms.

script:
  - id: !extend ic_settings_open_transition
    then:
      - lambda: |-
          id(nav_anim) = LV_SCR_LOAD_ANIM_MOVE_TOP;
          id(nav_anim_ms) = 300;

  - id: !extend ic_settings_close_transition
    then:
      - lambda: |-
          id(nav_anim) = LV_SCR_LOAD_ANIM_MOVE_BOTTOM;
          id(nav_anim_ms) = 300;

  - id: ic_intercom_to_settings
    then:
      - script.execute: ic_settings_open

  - id: ic_intercom_to_va
    then:
      - script.execute: swipe_to_va
