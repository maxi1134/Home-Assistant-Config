id: ic_ringing_in_page
bg_color: 0xFF0000
widgets:
  - label:
      align: TOP_MID
      y: 8%
      text: "${friendly_name}"
      text_color: 0xFFFFFF
      text_font: font_title
      text_align: CENTER
      width: ${ic_title_width}
      long_mode: SCROLL
  - label:
      align: TOP_MID
      y: 17%
      text: "RINGING"
      text_color: 0xFFFF00
      text_font: font_state
      text_align: CENTER
  - label:
      id: ic_ringing_in_peer_label
      align: CENTER
      text: ""
      text_color: 0xFFFFFF
      text_font: font_title
      text_align: CENTER
      long_mode: SCROLL
      width: ${ic_ringing_in_peer_width}
  # Answer (green left) / Decline (red right)
  - button:
      floating: true
      align: LEFT_MID
      x: ${ic_btn_offset}
      width: ${ic_btn_size}
      height: ${ic_btn_size}
      bg_opa: TRANSP
      shadow_opa: TRANSP
      widgets:
        - label:
            text: "\U000F03F2"
            align: CENTER
            text_color: 0x00FF00
            text_font: ic_icons
      on_short_click:
        - intercom_api.call_toggle: intercom
  - button:
      floating: true
      align: RIGHT_MID
      x: -5
      width: ${ic_btn_size}
      height: ${ic_btn_size}
      bg_opa: TRANSP
      shadow_opa: TRANSP
      widgets:
        - label:
            text: "\U000F03F5"
            align: CENTER
            text_color: 0xFFFFFF
            text_font: ic_icons
      on_short_click:
        - intercom_api.decline_call: intercom

# ========================================================================
# INTERCOM: RINGING OUT PAGE
# ========================================================================
