id: ic_idle_page
bg_color: 0x0000FF
# Horizontal swipe = prev/next contact. Vertical navigation is supplied by
# the including firmware variant: full-experience goes VA <-> intercom <->
# settings, intercom-only keeps the intercom/settings stack.
on_swipe_left:
  - intercom_api.next_contact: intercom
  - script.execute: update_ic_idle_labels
on_swipe_right:
  - intercom_api.prev_contact: intercom
  - script.execute: update_ic_idle_labels
on_swipe_up:
  - script.execute: ic_intercom_to_settings
on_swipe_down:
  - script.execute: ic_intercom_to_va
widgets:
  - label:
      align: TOP_MID
      y: 8%
      text: "${friendly_name}"
      text_color: 0xFFFFFF
      text_font: font_title
      text_align: CENTER
      width: ${ic_title_width}
      long_mode: SCROLL
  # State (static) + contacts row (dynamic) on two lines, centered.
  - label:
      id: ic_idle_status_label
      align: TOP_MID
      y: 17%
      text: "IDLE"
      text_color: 0x00FF00
      text_font: font_state
      text_align: CENTER
  - label:
      id: ic_idle_contacts_label
      align: TOP_MID
      y: ${ic_contacts_y}
      text: "\U000F06CB 0"
      text_color: 0xFFFFFF
      text_font: font_title
      text_align: CENTER
  # Peer name: single line; long names ping-pong scroll horizontally.
  - label:
      id: ic_idle_peer_label
      align: CENTER
      text: "-"
      text_color: 0xFFFFFF
      text_font: font_title
      width: ${ic_peer_width}
      text_align: CENTER
      long_mode: SCROLL
  # Prev/next contact buttons: explicit chevron taps next to the peer
  # name. Page on_swipe_left/right keeps the gesture path alive too.
  - button:
      id: ic_idle_prev_contact_btn
      align: CENTER
      x: -60
      y: -34
      width: 60
      height: 60
      bg_opa: TRANSP
      shadow_opa: TRANSP
      widgets:
        - label:
            text: "\U000F0731"
            align: CENTER
            text_color: 0xFFFFFF
            text_font: ic_icons
      on_short_click:
        - intercom_api.prev_contact: intercom
        - script.execute: update_ic_idle_labels
  - button:
      id: ic_idle_next_contact_btn
      align: CENTER
      x: 60
      y: -34
      width: 60
      height: 60
      bg_opa: TRANSP
      shadow_opa: TRANSP
      widgets:
        - label:
            text: "\U000F0734"
            align: CENTER
            text_color: 0xFFFFFF
            text_font: ic_icons
      on_short_click:
        - intercom_api.next_contact: intercom
        - script.execute: update_ic_idle_labels
  # Green call button below the peer name (idle screen only calls).
  - button:
      floating: true
      align: CENTER
      y: ${ic_btn_below_center}
      width: ${ic_btn_size}
      height: ${ic_btn_size}
      bg_opa: TRANSP
      shadow_opa: TRANSP
      widgets:
        - label:
            text: "\U000F03F2"
            align: CENTER
            text_color: 0x00FF00
            text_font: ic_icons
      on_short_click:
        - intercom_api.call_toggle: intercom

