# =============================================================================
# Settings page: Master volume + Mic gain sliders.
# Widths are chosen by the including device. On round displays they should be
# chord-safe widths for the y positions below.
# =============================================================================
id: settings_volumes_page
bg_color: 0x202020
on_swipe_left:
  - script.execute:
      id: ic_settings_navigate
      delta: 1
on_swipe_right:
  - script.execute:
      id: ic_settings_navigate
      delta: -1
on_swipe_down:
  - script.execute: ic_settings_close
widgets:
  - label:
      align: TOP_MID
      y: 50
      width: ${ic_settings_mid_width}
      text: "Master volume"
      text_color: 0xFFFFFF
      text_font: ${ic_settings_label_font}
      text_align: CENTER
  - slider:
      id: ui_speaker_vol_slider
      align: TOP_MID
      y: 78
      width: ${ic_settings_wide_width}
      height: ${ic_settings_slider_height}
      adv_hittest: true
      gesture_bubble: true
      min_value: 0
      max_value: 100
      value: !lambda 'return id(master_volume).state;'
      on_release:
        - number.set:
            id: master_volume
            value: !lambda 'return x;'
  - label:
      align: TOP_MID
      y: 112
      width: ${ic_settings_wide_width}
      text: "Mic gain"
      text_color: 0xFFFFFF
      text_font: ${ic_settings_label_font}
      text_align: CENTER
  - slider:
      id: ui_mic_vol_slider
      align: TOP_MID
      y: 140
      width: ${ic_settings_wide_width}
      height: ${ic_settings_slider_height}
      adv_hittest: true
      gesture_bubble: true
      min_value: -20
      max_value: 30
      value: !lambda 'return id(mic_gain).state;'
      on_release:
        - number.set:
            id: mic_gain
            value: !lambda 'return x;'
