# =============================================================================
# LVGL settings runtime sync: AEC controls.
# =============================================================================

script:
  - id: settings_sync_aec_widgets
    mode: restart
    then:
      - lvgl.switch.update:
          id: ui_aec_sw
          state:
            checked: !lambda 'return id(aec_switch).state;'
      - lvgl.dropdown.update:
          id: ui_aec_mode_dd
          selected_text: !lambda 'return id(aec_mode_select).current_option();'

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(ic_settings_active);'
          then:
            - script.execute: settings_sync_aec_widgets
