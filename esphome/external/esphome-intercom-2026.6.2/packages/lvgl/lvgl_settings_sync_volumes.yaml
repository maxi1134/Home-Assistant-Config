# =============================================================================
# LVGL settings runtime sync: volume controls.
# =============================================================================

script:
  - id: settings_sync_volumes_widgets
    mode: restart
    then:
      - lvgl.slider.update:
          id: ui_speaker_vol_slider
          value: !lambda 'return id(master_volume).state;'
      - lvgl.slider.update:
          id: ui_mic_vol_slider
          value: !lambda 'return id(mic_gain).state;'

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(ic_settings_active);'
          then:
            - script.execute: settings_sync_volumes_widgets
