# =============================================================================
# LVGL settings runtime sync: single-mic AFE controls.
# =============================================================================

script:
  - id: settings_sync_afe_single_mic_widgets
    mode: restart
    then:
      - lvgl.switch.update:
          id: ui_ns_sw
          state:
            checked: !lambda 'return id(ns_switch).state;'
      - lvgl.switch.update:
          id: ui_agc_sw
          state:
            checked: !lambda 'return id(agc_switch).state;'
      - lvgl.switch.update:
          id: ui_vad_sw
          state:
            checked: !lambda 'return id(vad_switch).state;'

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(ic_settings_active);'
          then:
            - script.execute: settings_sync_afe_single_mic_widgets
