# =============================================================================
# Intercom-Only meta-package.
# Bundles the four sub-packages that make up an intercom-only device:
#   - intercom/state_machine.yaml      LED reducer + g_applied_led
#   - intercom/callbacks.yaml          intercom_api on_* + ui_ic_* hooks
#   - intercom/buttons_switches.yaml   call/next/prev/decline buttons + mic mute switch
#   - intercom/call_settings.yaml      auto-answer + DND switches
#   - intercom/ha_api.yaml             HA-callable call-control services
#
# Drop-in replacement for the previous monolithic intercom_only.yaml. Existing
# device YAMLs that include `core: !include packages/intercom_only.yaml`
# continue to work unchanged.
#
# For LVGL devices that want a settings carousel, ALSO include:
#   `lvgl/settings_navigation.yaml`   carousel state + navigation scripts
#   `lvgl/lvgl_settings_*.yaml`       individual settings pages
#
# Required IDs (defined by device):
#   mic_main                - Microphone
#   hw_speaker              - Hardware speaker
#   speaker_mute            - Speaker mute switch supplied by the device YAML
#                             or packages/intercom/speaker_mute.yaml
#   status_led              - LED/light entity
#   intercom_ringing_sound  - Media file for ringtone (if device runs one)
#
# Required substitutions:
#   ${friendly_name}        - used in homeassistant.event payload
# =============================================================================

packages:
  state_machine: !include intercom/state_machine.yaml
  callbacks: !include intercom/callbacks.yaml
  buttons_switches: !include intercom/buttons_switches.yaml
  call_settings: !include intercom/call_settings.yaml
  ha_api: !include intercom/ha_api.yaml

# No CONFIG_LWIP_MAX_SOCKETS override: intercom_api reserves its socket
# quota through socket.consume_sockets() in its Python validation path,
# so ESPHome sizes the setting automatically.
