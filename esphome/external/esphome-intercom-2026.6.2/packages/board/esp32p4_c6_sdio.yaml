# =============================================================================
# ESP32-P4 + ESP32-C6 hosted Wi-Fi over SDIO
# =============================================================================
#
# Board-level transport profile for Waveshare ESP32-P4 devices with the onboard
# ESP32-C6 coprocessor. Keep this separate from platform/base config: it is not
# generic ESP32-P4 setup, diagnostics, or runtime debug.
# =============================================================================

esp32:
  framework:
    type: esp-idf
    sdkconfig_options:
      # The on-board C6 network_adapter advertises streaming transport. Keeping
      # the host in packet mode triggers an SDIO mode mismatch at boot.
      CONFIG_ESP_HOSTED_SDIO_OPTIMIZATION_RX_STREAMING_MODE: "y"
      # Hosted creates several default tasks. Their stacks are not DMA buffers;
      # move them to PSRAM and keep internal memory for SDIO/I2S/MIPI DMA.
      CONFIG_ESP_HOSTED_DFLT_TASK_FROM_SPIRAM: "y"
      # SDIO transport preallocates a DMA mempool from the RX queue size. The
      # default 20/20 queue is throughput-oriented; 10/10 is Espressif's lighter
      # OpenThread profile and leaves more internal heap for display + audio.
      CONFIG_ESP_HOSTED_SDIO_TX_Q_SIZE: "10"
      CONFIG_ESP_HOSTED_SDIO_RX_Q_SIZE: "10"

# Native ESPHome coprocessor update path. Once the C6 runs current
# ESP-Hosted network_adapter firmware, this keeps it current without opening
# the device again.
http_request:

update:
  - platform: esp32_hosted
    id: esp32_c6_coprocessor_update
    name: ESP32-C6 Coprocessor Firmware
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 6h
