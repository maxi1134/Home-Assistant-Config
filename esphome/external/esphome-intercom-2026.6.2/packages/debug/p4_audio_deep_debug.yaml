# ESP32-P4 audio deep-debug package.
#
# Include from the P4 YAML only while investigating audio clicks. This enables
# IDF facilities needed for task/heap snapshots. The old custom PCM dump is
# intentionally not part of esp_audio_stack; use the stack telemetry and
# ESP-IDF tracing/task stats instead:
#
#   esp_audio_stack:
#     telemetry: true
#     telemetry_log_interval_frames: 64
#
# Keep this out of production builds.

esp32:
  framework:
    sdkconfig_options:
      CONFIG_FREERTOS_USE_TRACE_FACILITY: "y"
      CONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS: "y"
      CONFIG_FREERTOS_GENERATE_RUN_TIME_STATS: "y"
      CONFIG_HEAP_TRACING_STANDALONE: "y"
      CONFIG_ESP_GDBSTUB_SUPPORT_TASKS: "y"

logger:
  level: DEBUG
  logs:
    audio_stack: DEBUG
    audio_stack.mic: DEBUG
    audio_stack.spk: DEBUG
    esp_afe: DEBUG
    esp_aec: DEBUG
    intercom_api: DEBUG
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
