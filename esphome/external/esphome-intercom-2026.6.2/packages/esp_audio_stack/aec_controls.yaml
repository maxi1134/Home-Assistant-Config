# =============================================================================
# ESP Audio Stack AEC user controls
# =============================================================================
# Use on esp_aec / standalone AEC builds. Full esp_afe builds should include
# packages/esp_afe/*_entities.yaml instead, because AEC is controlled by AFE.
# =============================================================================

switch:
  - platform: esp_audio_stack
    esp_audio_stack_id: audio_stack
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON

