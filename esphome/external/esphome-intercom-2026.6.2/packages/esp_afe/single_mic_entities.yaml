# =============================================================================
# ESP AFE single-mic entities
# =============================================================================
# Shared runtime controls for single-microphone esp_afe pipelines.
#
# `Voice Detected` is a binary sensor emitted by AFE voice-activity analysis.
# `Voice Activity Detector` is the runtime switch that enables/disables
# that analysis. It is useful outside wake-word builds too, so it lives with
# esp_afe rather than in intercom or voice_assistant YAMLs.
# =============================================================================

substitutions:
  afe_aec_restore_mode: ALWAYS_ON
  afe_ns_restore_mode: RESTORE_DEFAULT_ON
  afe_agc_restore_mode: RESTORE_DEFAULT_ON
  afe_vad_restore_mode: ALWAYS_ON

binary_sensor:
  - platform: esp_afe
    esp_afe_id: afe_processor
    vad:
      name: Voice Detected
      id: voice_presence

switch:
  - platform: esp_afe
    esp_afe_id: afe_processor
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: ${afe_aec_restore_mode}
    ns:
      id: ns_switch
      name: Noise Suppression
      icon: mdi:volume-off
      restore_mode: ${afe_ns_restore_mode}
    agc:
      id: agc_switch
      name: Auto Gain Control
      icon: mdi:tune-vertical
      restore_mode: ${afe_agc_restore_mode}
    vad:
      id: vad_switch
      name: Voice Activity Detector
      icon: mdi:account-voice
      restore_mode: ${afe_vad_restore_mode}
