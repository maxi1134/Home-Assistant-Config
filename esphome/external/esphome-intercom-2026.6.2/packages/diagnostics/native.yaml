# =============================================================================
# Native ESPHome diagnostics.
#
# Production diagnostics exposed to Home Assistant as diagnostic entities.
# This package uses ESPHome's native `debug` component internally for heap,
# reset reason and device info; it is not the runtime debug package.
# =============================================================================

substitutions:
  diagnostics_update_interval: "60s"
  diagnostics_wifi_update_interval: "30s"

debug:
  update_interval: ${diagnostics_update_interval}

sensor:
  - platform: wifi_signal
    id: wifi_signal_db
    name: "WiFi Signal dBm"
    icon: "mdi:wifi"
    update_interval: ${diagnostics_wifi_update_interval}
    entity_category: diagnostic

  - platform: template
    id: wifi_pct
    name: "WiFi Signal %"
    icon: "mdi:wifi"
    unit_of_measurement: "%"
    update_interval: ${diagnostics_wifi_update_interval}
    entity_category: diagnostic
    lambda: |-
      if (!id(wifi_signal_db).has_state()) return 0.0f;
      float dbm = id(wifi_signal_db).state;
      if (dbm >= -50) return 100.0f;
      if (dbm <= -100) return 0.0f;
      return 2.0f * (dbm + 100.0f);

  - platform: uptime
    name: Uptime
    update_interval: ${diagnostics_update_interval}
    entity_category: diagnostic

  - platform: internal_temperature
    name: CPU Temperature
    update_interval: ${diagnostics_update_interval}
    entity_category: diagnostic

  - platform: debug
    free:
      name: Free Heap
      entity_category: diagnostic
    block:
      name: Largest Free Block
      entity_category: diagnostic
    min_free:
      name: Minimum Free Heap
      entity_category: diagnostic
    fragmentation:
      name: Heap Fragmentation
      entity_category: diagnostic
    loop_time:
      name: Main Loop Max Time
      entity_category: diagnostic
    psram:
      name: PSRAM Free
      entity_category: diagnostic
    cpu_frequency:
      name: CPU Frequency
      entity_category: diagnostic

text_sensor:
  - platform: debug
    device:
      name: Device Info
      entity_category: diagnostic
    reset_reason:
      name: Reset Reason
      entity_category: diagnostic

binary_sensor:
  - platform: status
    id: node_status
    name: Status
    entity_category: diagnostic
