# =============================================================================
# Common intercom call-control buttons.
#
# Provides:
#   buttons: call_button, next_contact_button, prev_contact_button,
#            decline_button, restart
#
# Prerequisites:
#   - id `intercom` : intercom_api component
# =============================================================================

button:
  - platform: template
    name: Call
    id: call_button
    icon: mdi:phone
    on_press:
      - intercom_api.call_toggle: intercom

  - platform: template
    name: Next Contact
    id: next_contact_button
    icon: mdi:skip-next
    on_press:
      - intercom_api.next_contact: intercom

  - platform: template
    name: Previous Contact
    id: prev_contact_button
    icon: mdi:skip-previous
    on_press:
      - intercom_api.prev_contact: intercom

  - platform: template
    name: Decline
    id: decline_button
    icon: mdi:phone-hangup
    on_press:
      - intercom_api.decline_call: intercom

  - platform: restart
    name: Restart
    entity_category: config
