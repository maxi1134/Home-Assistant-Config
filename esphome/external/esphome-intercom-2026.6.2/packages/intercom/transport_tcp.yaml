# =============================================================================
# Intercom TCP transport
# =============================================================================
#
# Configures intercom_api for TCP only. Peer announcement/discovery is opt-in via
# packages/intercom/mdns_discovery.yaml for ESP-only deployments without HA.
# =============================================================================

substitutions:
  intercom_tcp_port: "6054"

intercom_api:
  id: intercom
  protocol: tcp
  tcp_port: ${intercom_tcp_port}
