# =============================================================================
# Intercom UDP transport
# =============================================================================
#
# Configures intercom_api for UDP only. Peer announcement/discovery is opt-in via
# packages/intercom/mdns_discovery.yaml for ESP-only deployments without HA.
# =============================================================================

substitutions:
  intercom_udp_audio_port: "6054"
  intercom_udp_control_port: "6055"

intercom_api:
  id: intercom
  protocol: udp
  listen_port: ${intercom_udp_audio_port}
  remote_port: ${intercom_udp_audio_port}
  control_port: ${intercom_udp_control_port}
