# =============================================================================
# Intercom call settings
# =============================================================================
# Shared intercom_api switches exposed by every intercom device.
#
# `Auto Answer` controls whether incoming calls are answered immediately.
# `Do Not Disturb` rejects incoming START with DECLINE("DND"), so the caller,
# HA bridge, and card can show the real terminal reason.
#
# Required IDs:
#   intercom - intercom_api component
# =============================================================================

switch:
  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: Auto Answer
      icon: mdi:phone-in-talk
      restore_mode: RESTORE_DEFAULT_OFF
    dnd:
      id: dnd_switch
      name: Do Not Disturb
      icon: mdi:minus-circle
      restore_mode: RESTORE_DEFAULT_OFF
    ha_pbx_mode:
      id: ha_pbx_mode_switch
      name: HA PBX Mode
      icon: mdi:phone-forward
      restore_mode: RESTORE_DEFAULT_OFF
