# =============================================================================
# Intercom ESP-side mDNS announce + discovery (opt-in)
# =============================================================================
#
# Lightweight peer announce/discovery for ESP<->ESP deployments without Home Assistant.
# Do not include this package in HA-managed builds: HA already owns
# sensor.intercom_phonebook from ESPHome API endpoint entities, and adding
# ESP-side queries on top of HA API/intercom sockets increases lwIP/socket
# pressure during HA disconnect/restart windows. intercom_api publishes
# endpoint=<Name|protocol|ip|ports> via ESP-IDF mDNS at runtime, scans only
# _intercom-tcp/_intercom-udp, then merges matching peers into the normal
# phonebook.
# =============================================================================

intercom_api:
  id: intercom
  announce: true
  discovery:
    mdns:
      protocols: [tcp, udp]
