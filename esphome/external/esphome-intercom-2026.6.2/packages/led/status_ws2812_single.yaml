# =============================================================================
# Single WS2812/SK6812 status LED.
#
# Hardware/effects package for generic devices with one addressable status LED.
# State mapping stays in a separate package or the active intercom state machine.
# =============================================================================

substitutions:
  status_led_name: Status LED
  status_led_pin: GPIO33
  status_led_chipset: SK6812
  status_led_rgb_order: GRB

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: ${status_led_name}
    icon: mdi:led-on
    pin: ${status_led_pin}
    chipset: ${status_led_chipset}
    num_leds: 1
    rgb_order: ${status_led_rgb_order}
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - strobe:
          name: "Ringing"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
            - state: false
              duration: 250ms
      - strobe:
          name: "Calling"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 50%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms
