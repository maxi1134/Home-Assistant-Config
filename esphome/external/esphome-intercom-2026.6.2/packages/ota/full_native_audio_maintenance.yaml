# =============================================================================
# OTA maintenance mode for full-experience audio devices that use native
# ESPHome microphone/speaker components instead of esp_audio_stack.
#
# ESPHome emits ota.on_begin before esp_ota_begin(), so this hook quiesces the
# high-level audio users before flash erase/write preparation starts.
#
# Required IDs:
#   - intercom
#   - mww
#   - speaker_media_player
#   - script: start_mww_when_ready
# =============================================================================

ota:
  - platform: esphome
    on_begin:
      - logger.log:
          level: INFO
          tag: ota
          format: "OTA begin: pausing native full audio runtime"
      - globals.set:
          id: g_ota_in_progress
          value: "true"
      - media_player.stop:
          id: speaker_media_player
          announcement: true
      - voice_assistant.stop:
      - micro_wake_word.stop:
      - intercom_api.stop: intercom
    on_abort:
      - script.execute: ota_full_native_audio_restore
    on_error:
      - script.execute: ota_full_native_audio_restore

script:
  - id: ota_full_native_audio_restore
    mode: restart
    then:
      - logger.log:
          level: WARN
          tag: ota
          format: "OTA aborted/failed: restoring native full audio runtime"
      - globals.set:
          id: g_ota_in_progress
          value: "false"
      - intercom_api.start: intercom
      - script.execute: start_mww_when_ready
