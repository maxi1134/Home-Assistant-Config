text_sensor:
  # Day/night state from HA ("above_horizon" / "below_horizon"). Unknown/empty
  # (HA not yet connected) falls back to the day illustrations in draw_display.
  - platform: homeassistant
    id: sun_state
    entity_id: sun.sun
    internal: true
    on_value:
      - script.execute: draw_display
  - platform: template
    name: "Current Time"
    id: ha_time
    lambda: |-
      return id(ha_time_og).now().strftime("%H:%M");
    update_interval: never    
    on_value:
      - if:
          condition:
            - lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id} || id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
          then:
            - script.execute: draw_display

  - platform: template
    id: time_display_format
    update_interval: never
  - id: text_request
    platform: template
    on_value:
      lambda: |-
        if(id(text_request).state.length()>32) {
          std::string name = id(text_request).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_request).state = (truncated+"...").c_str();
        }

  - id: text_response
    platform: template
    on_value:
      lambda: |-
        // The replying page scrolls the answer in a circular marquee now
        // (response_label long_mode: SCROLL_CIRCULAR), so keep the full text
        // for long answers — bounded so a runaway LLM response can't bloat
        // the label buffer. (Was 32 chars when the label truncated with DOT.)
        if(id(text_response).state.length()>600) {
          std::string name = id(text_response).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),597);
          id(text_response).state = (truncated+"...").c_str();
        }
  # Forensic trail of barge-in decisions — see the barge_log script.
  - platform: template
    name: "Barge Trail"
    id: barge_trail
    entity_category: diagnostic
    update_interval: never
  # ── Fleet diagnostics (repo packages/diagnostics/native.yaml) ──────────────
  - platform: debug
    device:
      name: Device Info
      entity_category: diagnostic
    reset_reason:
      name: Reset Reason
      entity_category: diagnostic

