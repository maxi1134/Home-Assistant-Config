                                                                condition:
                                                                  lambda: return id(voice_assistant_phase) == ${voice_assist_timer_finished_phase_id};
                                                                then:
                                                                  - lvgl.page.show: timer_finished_page
                                                                else:
                                                                  - lvgl.page.show: idle_page
                      else:
                        - lvgl.page.show: no_ha_page
                else:
                  - lvgl.page.show: no_wifi_page
          else:
            - lvgl.page.show: initializing_page

  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_active_timer) = output_timer;
  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer_active) = output;
  - id: fetch_first_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_timer) = output_timer;
  - id: check_if_timers
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          id(global_is_timer) = !timers.empty();

  # Starts either mWW or the streaming wake word, depending on the configured location
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
            # The 'stop' model is internal=true (hidden from HA so HA can't disable it),
            # which means it boots DISABLED on EVERY boot — internal models never save
            # their enable state to flash — and only runs after an explicit enable_model.
            # Re-enabling here ensures Stop is active on every boot and HA reconnect.
            - micro_wake_word.enable_model: stop
            # Same deal for the activation words (both internal since the Zylox
            # toggle was added): enforce the 'Wake word' select on every pass.
            - script.execute: apply_wake_word_selection
            - script.execute: boost_mww_priority
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  # Stops either mWW or the streaming wake word, depending on the configured location
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:
  # Enables the activation model chosen by the 'Wake word' select and disables
  # the other one. Safe to run at any time, including while mWW is listening —
  # enable/disable just flip per-model flags (persisted to flash). The VAD and
  # the internal 'stop' halt-word are not touched by this script.
  - id: apply_wake_word_selection
    then:
      - if:
          condition:
            # current_option() — .state is deprecated and slated for removal in ESPHome 2026.7
            lambda: return id(wake_word_select).current_option() == "Zylox";
          then:
            - micro_wake_word.enable_model: zylox_model
            - micro_wake_word.disable_model: okay_nabu_model
          else:
            # Default branch (also covers an unset/blank select state):
            # fall back to the original Okay Nabu behavior.
            - micro_wake_word.enable_model: okay_nabu_model
            - micro_wake_word.disable_model: zylox_model
  # Hold the answer still (DOTS-truncated, the ellipsis signals more text) for
  # 1 s so the start of the answer is readable, THEN begin the circular
  # marquee. mode: restart — each new answer restarts the hold.
  - id: response_scroll_delay
    mode: restart
    then:
      - lambda: lv_label_set_long_mode(id(response_label), LV_LABEL_LONG_MODE_DOTS);
      - delay: 1s
      - lambda: lv_label_set_long_mode(id(response_label), LV_LABEL_LONG_MODE_SCROLL_CIRCULAR);
  # On-device forensic trail for the barge-in machinery: appends short event
  # tokens to the 'Barge Trail' diagnostic text sensor so failures can be
  # diagnosed AFTER the fact via the API — no live log stream needed.
  - id: barge_log
    parameters:
      msg: string
    then:
      - lambda: |-
          std::string s = id(barge_trail).has_state() ? id(barge_trail).state : "";
          if (s.length() > 170) s = s.substr(s.length() - 170);
          if (!s.empty()) s += " | ";
          s += msg;
          id(barge_trail).publish_state(s);
  # Boost the micro_wake_word inference task from ESPHome's default priority 3
  # to 8 — the repo-tested value for reliable wake/'Stop' detection during loud
  # TTS playback (esp_audio_stack README: "Boost MWW priority to 8 via on_boot
  # lambda"; pattern from packages/intercom/state_machine_full.yaml). The task
  # (FreeRTOS name "mww") is created by micro_wake_word.start, so wait 1 s for
  # it to exist. mode: restart — rapid re-calls just restart the settle timer.
  - id: boost_mww_priority
    mode: restart
    then:
      - delay: 1s
      - lambda: |-
          TaskHandle_t mww_task = xTaskGetHandle("mww");
          if (mww_task) {
            vTaskPrioritySet(mww_task, 8);
          }
  # Codec-mode Speaker Gain: esp_codec_dev owns ES8311 reg 0x32 (DAC volume,
  # 0.5 dB/step, rewritten on every Master Volume change and stack reopen) and
  # its curve caps at 0 dB. We layer the boost ON TOP: read the register, and
  # if it differs from what WE last wrote, the codec rewrote it — treat that
  # value as the new base and re-add the boost. Idempotent; enforced by a 5 s
  # interval and at every announcement start.
  - id: apply_speaker_gain
    mode: queued
    max_runs: 2
    then:
      - lambda: |-
          float db = id(speaker_gain).state;
          if (isnan(db)) db = 6.0f;
          db = std::max(0.0f, std::min(12.0f, db));
          const int delta = (int) lroundf(db * 2.0f);
          uint8_t reg = 0;
          if (!id(es8311_raw).read_byte(0x32, &reg)) return;
          int base;
          if (id(gain_last_written) >= 0 && reg == (uint8_t) id(gain_last_written)) {
            base = id(gain_base);   // untouched since our last write
          } else {
            base = reg;             // codec rewrote the register: new base
          }
          int target = base + delta;
          if (target > 255) target = 255;
          if ((uint8_t) target != reg) {
            id(es8311_raw).write_byte(0x32, (uint8_t) target);
          }
          id(gain_base) = base;
          id(gain_last_written) = target;
  # Set the voice assistant phase to idle or muted, depending on if the software mute switch is activated
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};

# User controls from the repo's packages/esp_audio_stack/controls.yaml.
# NOTE: this number block is not optional decoration — esp_audio_stack ships
# number.h at its component root, which #includes the core 'number' component
# unconditionally. A config with no number entities never loads core 'number'
# and the build fails (fatal error: esphome/components/number/number.h).
# Every maintained profile carries these controls for the same reason.
number:
  - platform: esp_audio_stack
    esp_audio_stack_id: audio_stack
    master_volume:
      id: master_volume
      name: Master Volume
      speaker_id: box_speaker
    mic_gain:
      id: mic_gain
      name: Mic Gain
      min_value: -20
      max_value: 30
  # Hardware output boost on the ES8311 DAC. The codec's digital volume scale
  # reaches +32 dB above its 0 dB boot default (reg 0x32: 0.5 dB/step, 191 =
  # 0 dB); the popular BigBobbas Box-3 config tops out around +6.5 dB on this
  # same hardware. This is a separate stage from HA's media volume and the
  # Master Volume number — think of it as the amp's trim knob. Values much
  # above ~7 dB will clip/distort full-scale TTS peaks; back off if playback
  # sounds harsh.
  - platform: template
    name: Speaker Gain
    id: speaker_gain
    icon: "mdi:volume-plus"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 6
    min_value: 0
    max_value: 12
    step: 0.5
    unit_of_measurement: dB
    mode: slider
    on_value:
      # Also fires on boot-restore; harmless if it lands before the DAC is set
      # up (the late on_boot hook re-applies once setup is complete).
      - script.execute: apply_speaker_gain

switch:
  # Runtime AEC on/off (packages/esp_audio_stack/aec_controls.yaml). Restores
  # ON — leave it on for normal use, barge-in ('Stop' during TTS) depends on it.
  - platform: esp_audio_stack
    esp_audio_stack_id: audio_stack
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON
  - platform: gpio
    name: Speaker Enable
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    disabled_by_default: true
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: draw_display
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: draw_display
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Turn off the repeat mode and disable the pause between playlist items
      - lambda: |-
              id(speaker_media_player)
                ->make_call()
                .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                .set_announcement(true)
                .perform();
              id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      # Stop playing the alarm
      - media_player.stop:
          announcement: true
    on_turn_on:
      # Clear a leftover speaker pause from global_cancel — a timer alarm must
      # never ring silently because the user cancelled a TTS reply earlier.
      - lambda: id(box_speaker).set_pause_state(false);
      # Turn on the repeat mode and pause for 1000 ms between playlist items/repeats
      - lambda: |-
            id(speaker_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      - delay: 15min
      - switch.turn_off: timer_ringing

select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - wait_until:
                lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start
                        # Without these, switching to 'On device' mid-session could
                        # run mWW with the internal Stop model still disabled (it is
                        # only enabled by start_wake_word / on_end restart paths).
                        - micro_wake_word.enable_model: stop
                        - script.execute: apply_wake_word_selection
                        - script.execute: boost_mww_priority
  - platform: template
    entity_category: config
    name: Wake word
    id: wake_word_select
    icon: "mdi:chat-question"
    optimistic: true
    restore_value: true
    options:
      - Okay Nabu
      - Zylox
    initial_option: Okay Nabu
    on_value:
      # Runs on boot restore too — harmless, the apply script only flips
      # model-enable flags and is safe whether or not mWW is running.
      - script.execute: apply_wake_word_selection

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: global_first_active_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: global_is_timer_active
    type: bool
    restore_value: false
  - id: global_first_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: global_is_timer
    type: bool
    restore_value: false
  - id: user_cancelled
    type: bool
    restore_value: false
    initial_value: "false"
  # Wake word that requested a cancel+restart, consumed by voice_assistant.on_end.
  # Empty = no restart pending.
  - id: pending_wake_restart
    type: std::string
    restore_value: false
  # millis() when pending_wake_restart was last set — the wedge-recovery path in
  # media_player.on_idle only honors FRESH requests (< 15 s).
  - id: pending_set_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # Speaker Gain layering state (codec mode): codec-rewrite detection.
  - id: gain_base
    type: int
    restore_value: false
    initial_value: "0"
  - id: gain_last_written
    type: int
    restore_value: false
    initial_value: "-1"

