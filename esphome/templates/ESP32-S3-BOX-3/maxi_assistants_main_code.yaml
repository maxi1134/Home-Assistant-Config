  allowed_characters: " !#%'()+,-./0123456789:;<>?@ABCDEFGHIJKLMNOPQRSTUVWYZ[]_abcdefghijklmnopqrstuvwxyz{|}°²³µ¿ÁÂÄÅÉÖÚßàáâãäåæçèéêëìíîðñòóôõöøùúûüýþāăąćčďĐđēėęěğĮįıļľŁłńňőřśšťũūůűųźŻżŽžơưșțΆΈΌΐΑΒΓΔΕΖΗΘΚΜΝΠΡΣΤΥΦάέήίαβγδεζηθικλμνξοπρςστυφχψωϊόύώАБВГДЕЖЗИКЛМНОПРСТУХЦЧШЪЭЮЯабвгдежзийклмнопрстуфхцчшщъыьэюяёђєіїјљњћאבגדהוזחטיכלםמןנסעפץצקרשת،ءآأإئابةتجحخدذرزسشصضطظعغفقكلمنهوىيٹپچڈکگںھہیےংকচতধনফবযরলশষস়ািু্చయలిెొ్ംഅആഇഈഉഎഓകഗങചജഞടഡണതദധനപഫബഭമയരറലളവശസഹാിീുൂെേൈ്ൺൻർൽൾაბგდევზთილმნოპრსტუფქყშჩცძჭხạảấầẩậắặẹẽếềểệỉịọỏốồổỗộớờởợụủứừửữựỳ—、一上不个中为主乾了些亮人任低佔何作供依侧係個側偵充光入全关冇冷几切到制前動區卧厅厨及口另右吊后吗启吸呀咗哪唔問啟嗎嘅嘛器圍在场執場外多大始安定客室家密寵对將小少左已帘常幫幾库度庫廊廚廳开式後恆感態成我戲戶户房所扇手打执把拔换掉控插摄整斯新明是景暗更最會有未本模機檯櫃欄次正氏水沒没洗活派温測源溫漏潮激濕灯為無煙照熱燈燥物狀玄现現瓦用發的盞目着睡私空窗立笛管節簾籬紅線红罐置聚聲脚腦腳臥色节著行衣解設調請謝警设调走路車车运連遊運過道邊部都量鎖锁門閂閉開關门闭除隱離電震霧面音頂題顏颜風风食餅餵가간감갔강개거게겨결경고공과관그금급기길깥꺼껐꼽나난내네놀누는능니다닫담대더데도동됐되된됨둡드든등디때떤뜨라래러렇렌려로료른를리림링마많명몇모무문물뭐바밝방배변보부불블빨뽑사산상색서설성세센션소쇼수스습시신실싱아안않알았애야어얼업없었에여연열옆오온완외왼요운움워원위으은을음의이인일임입있작잠장재전절정제져조족종주줄중줘지직진짐쪽차창천최추출충치침커컴켜켰쿠크키탁탄태탬터텔통트튼티파팬퍼폰표퓨플핑한함해했행혀현화활후휴힘，？"

  # Add support for non-unicode characters by using better glyphset
  font_glyphsets: "GF_Latin_Core"
  # for Greek use "Noto Sans" for other languages use a compatible font family
  font_family: Figtree

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0  # esphome-intercom 2026.6.x requires ESPHome 2026.5.x or newer
  name_add_mac_suffix: false
  on_boot:
    - priority: 600
      then:
        - script.execute: draw_display
        - delay: 30s
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - script.execute: draw_display
    # Late hook (-100 runs after EVERY component's setup, including the ES8311
    # driver, which programs its own 0 dB default during setup): re-apply the
    # restored Speaker Gain so the hardware boost survives reboots and cannot
    # be overwritten by the driver's init.
    - priority: -100
      then:
        - script.execute: apply_speaker_gain

external_components:
  # n-IA-hane/esphome-intercom, pinned to a validated release.
  - source: github://n-IA-hane/esphome-intercom@v2026.6.2
    components: [audio_processor, esp_aec, esp_audio_stack, speaker]

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # esp_audio_stack 2026.6.x: GMF / esp-sr / esp_audio_effects allocate via
      # plain malloc (not ESPHome's RAMAllocator), so route ordinary large
      # mallocs to PSRAM and keep internal RAM for DMA/Wi-Fi/latency-critical
      # use. Mirrors the repo's packages/platform/esp32s3_base.yaml.
      CONFIG_SPIRAM_USE_CAPS_ALLOC: "n"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "4096"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_MDNS_TASK_CREATE_FROM_SPIRAM: "y"
      CONFIG_MDNS_MEMORY_ALLOC_SPIRAM: "y"

psram:
  mode: octal
  speed: 80MHz

# NOTE (2026-06-11): `network: enable_high_performance: false` was trialed
# here for internal-heap savings, but is the prime suspect for a spike in
# wedged TTS fetches ("Failed to fetch headers" -> unabortable ~30 s reader
# lockups): it also shrinks CONFIG_LWIP_MAX_SOCKETS to 12, and barge-in churn
# (HA API + log stream + OTA/web listeners + a retrying announcement reader
# holding a socket for 30 s) can starve new TTS connections. Deliberately left
# at the component-requested default — do not re-add without soak-testing
# barge-in cycles against "Failed to fetch headers" in the logs.

# Keep the FLAC decoder's working buffers out of internal RAM — it allocates
# on every TTS response, exactly when AEC + mWW + LVGL are all live.
# (repo packages/audio/flac_codecs_psram.yaml)
audio:
  codecs:
    flac:
      buffer_memory: psram

# Native production diagnostics (repo packages/diagnostics/native.yaml):
# heap/fragmentation/loop-time telemetry to HA as diagnostic entities — the
# baseline for validating heap/latency changes across the 9-device fleet.
debug:
  update_interval: 60s

api:
  encryption:
    key: !secret api_key_voice_assistant
  on_client_connected:
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: draw_display

ota:
  - platform: esphome
    id: ota_esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  # Production logging (repo maintained profiles + docs/troubleshooting.md:
  # "Production YAMLs default to logger.level: INFO. Only flip to DEBUG while
  # tuning, then revert.") DEBUG burns main-loop time formatting per-frame
  # audio chatter and ships it over the API to HA. NOTE: global INFO compiles
  # DEBUG statements out — custom logger.log actions that must survive need an
  # explicit level (see the 'MWW fired' log in on_wake_word_detected).
  level: INFO
  logs:
    # Mute chatty entity-state built-ins; voice/audio components stay at INFO.
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN
    select: INFO
    light: INFO
    speaker: INFO
    audio: INFO
    micro_wake_word: INFO
    voice_assistant: INFO
    media_player: INFO
    mdns: INFO
    wifi: INFO
    audio_processor: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # ESPHome's ESP32 default is LIGHT (modem-sleep): the radio naps between DTIM
  # beacons, adding tens of ms of jitter per packet — straight onto wake->STT
  # and TTS first-byte latency, and a known cause of HA marking satellites
  # unavailable. All maintained esphome-intercom S3 profiles set NONE.
  power_save_mode: NONE
  manual_ip:
    static_ip: ${static_ip}
    gateway: 192.168.20.1
    subnet: 255.255.255.0
  ap:
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:
time:
  - platform: homeassistant
    id: ha_time_og

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true
interval:
  - interval: 30s
    then:
      - script.execute: draw_display
  # Speaker Gain enforcement: re-layer the boost within 5 s of any codec
  # rewrite (Master Volume moves, stack reopen). One i2c read when idle.
  - interval: 5s
    then:
      - if:
          condition:
            lambda: 'return !id(init_in_progress);'
          then:
            - script.execute: apply_speaker_gain
sensor:       
  - platform: homeassistant
    id: outside_temp
    entity_id: sensor.outside_temperature_with_fallback
    internal: true
    on_value:
      - if:
          condition:
            - lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id} || id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
          then:
            - script.execute: draw_display
  # ── Fleet diagnostics (repo packages/diagnostics/native.yaml) ──────────────
  - platform: wifi_signal
    id: wifi_signal_db
    name: "WiFi Signal dBm"
    icon: "mdi:wifi"
    update_interval: 30s
    entity_category: diagnostic
  - platform: template
    id: wifi_pct
    name: "WiFi Signal %"
    icon: "mdi:wifi"
    unit_of_measurement: "%"
    update_interval: 30s
    entity_category: diagnostic
    lambda: |-
      if (!id(wifi_signal_db).has_state()) return 0.0f;
      float dbm = id(wifi_signal_db).state;
      if (dbm >= -50) return 100.0f;
      if (dbm <= -100) return 0.0f;
      return 2.0f * (dbm + 100.0f);
  - platform: uptime
    name: Uptime
    update_interval: 60s
    entity_category: diagnostic
  - platform: internal_temperature
    name: CPU Temperature
    update_interval: 60s
    entity_category: diagnostic
  - platform: debug
    free:
      name: Free Heap
      entity_category: diagnostic
    block:
      name: Largest Free Block
      entity_category: diagnostic
    min_free:
      name: Minimum Free Heap
      entity_category: diagnostic
    fragmentation:
      name: Heap Fragmentation
      entity_category: diagnostic
    loop_time:
      name: Main Loop Max Time
      entity_category: diagnostic
    psram:
      name: PSRAM Free
      entity_category: diagnostic
    cpu_frequency:
      name: CPU Frequency
      entity_category: diagnostic
binary_sensor:
  - platform: touchscreen
    name: "Screen Touch"
    id: screen_touch
    touchscreen_id: board_touchscreen
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 240
    on_click:
      min_length: 75ms
      then:
        - if:
            # Same stale-announcing guard as on_wake_word_detected: if user_cancelled is
            # already true, the announcing state is stuck (HTTP reader not yet released)
            # and the touch should start a fresh turn rather than re-entering global_cancel.
            condition:
              or:
                - lambda: |-
                    const int phase = id(voice_assistant_phase);
                    return phase == ${voice_assist_listening_phase_id} ||
                           phase == ${voice_assist_thinking_phase_id} ||
                           phase == ${voice_assist_replying_phase_id};
                - and:
                    - media_player.is_announcing:
                    - lambda: 'return !id(user_cancelled);'
                - switch.is_on: timer_ringing
            then:
              - script.execute: global_cancel
            else:
              - if:
                  condition:
                    and:
                      - lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
                      - switch.is_off: mute
                      - not:
                          voice_assistant.is_running:
                  then:
                    # NOTE: do NOT stop_wake_word here. The pre-AEC config required it because
                    # MWW couldn't share the mic with VA. With esp_audio_stack + esp_aec, MWW
                    # and VA run concurrently as separate consumers of box_mic, so we leave MWW
                    # running through the touch-triggered turn — that's how 'Stop' (and the
                    # 'Okay Nabu' barge-in) keeps working during TTS reply for touch sessions.
                    - lambda: id(va).set_use_wake_word(false);
                    # Belt-and-braces: re-enable the internal Stop model in case anything
                    # disabled it earlier in the session.
                    - micro_wake_word.enable_model: stop
                    - voice_assistant.start:
  - platform: gpio
    pin:
      number: GPIO0
      ignore_strapping_warning: true
      mode: INPUT_PULLUP
      inverted: true
    id: left_top_button
    internal: true
    on_multi_click:
      - timing:
          - ON for at least 50ms
          - OFF for at least 50ms
        then:
          - switch.turn_off: timer_ringing
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn
  # ── Fleet diagnostics (repo packages/diagnostics/native.yaml) ──────────────
  - platform: status
    id: node_status
    name: Status
    entity_category: diagnostic
touchscreen:
  - platform: gt911 # Most S3-Box models use this; if it fails, try 'ft6336'
    id: board_touchscreen
    interrupt_pin: GPIO3

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

i2c:
  id: i2c_bus
  scl: GPIO18
  sda: GPIO8

# Raw register access to the ES8311 for the Speaker Gain boost (esp_codec_dev
# owns the codec in TDM mode; we layer the boost on top of its DAC volume reg).
i2c_device:
  - id: es8311_raw
    i2c_id: i2c_bus
    address: 0x18

esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 4
  mode: sr_low_cost

# esp_audio_stack (2026.6.x) — successor of i2s_audio_duplex. 1:1 option
# carry-over, run in "no-codec" mode (no codec: block): the stack does raw
# I2S read/write and the ESPHome core audio_adc/audio_dac blocks below keep
# initializing the ES7210/ES8311 over I2C, exactly like the old setup.
# (The canonical-but-untested-on-Box-3 alternative is the stack's built-in
# codec: {input: es7210, output: es8311} block with use_tdm_reference for a
# hardware AEC reference — needs on-device slot-map bring-up, see repo's
# waveshare-s3 profile and packages/codec/es7210_tdm.yaml before attempting.)
esp_audio_stack:
  id: audio_stack
  i2s_lrclk_pin: GPIO45
  i2s_bclk_pin: GPIO17
  i2s_mclk_pin: GPIO2
  i2s_din_pin: GPIO16
  i2s_dout_pin: GPIO15
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 16  # TDM: 16-bit slots x4 (WS3/Korvo-2 convention)              # new default is 'auto' (follows bits_per_sample) — the
                                  # Box-3 bus runs 32-bit slots, so this must stay explicit
  bits_per_sample: 16
  # NOTE: do NOT set dma_frame_num: 240 here. It was tried (Tier-1 tuning,
  # 2026-06-11) to recover ~10-20 KB internal heap, but halving the DMA backlog
  # to ~30 ms produced audible TX underruns ("compressed"/crunchy playback) on
  # this std-mode bus — the component's auto-raise protection for large
  # processor quanta is TDM-only and does not guard this path. Auto sizing
  # (~10 ms/descriptor, 480 frames @48 kHz, ~60 ms backlog) is required.
  correct_dc_offset: true
  processor_id: aec_processor
  # ===== TDM HARDWARE AEC REFERENCE (validated on hallway 2026-06-11) =====
  codec:
    i2c_id: i2c_bus
    input:
      type: es7210
      address: 0x40
      mic_selected: 0x0F
      gain_db: 24.0        # matches the old core-driver default the +21 dB software Mic Gain was tuned against
      ref_channel: 2       # MIC3 (reg 0x45) loopback. ES7210 MIC order is NOT 1:1 with TDM
                           # slots: slot order is MIC1, MIC3, MIC2, MIC4 (measured).
      ref_gain_db: 0.0     # unity PGA on the reference — higher gains clip the line-level loopback
    output:
      type: es8311
      address: 0x18
      use_mclk: true
      no_dac_ref: true
  tdm_total_slots: 4
  tdm_mic_slots: [0]       # MEASURED: mics on slots 0+2 (esp_aec single-mic; slot 0 = MIC1)
  tdm_ref_slot: 1          # MEASURED: DAC loopback on slot 1 (= MIC3)
  use_tdm_reference: true
  buffers_in_psram: true
  audio_task_stack_in_psram: true # new in 2026.6.x — frees ~8 KB internal heap, used by
                                  # all maintained S3 profiles (helps the LVGL+VA heap budget)
  aec_reference: previous_frame   # parity with the old duplex config. The 2026.6.x DEFAULT
                                  # changed to ring_buffer (ADF TYPE2, 80 ms ring) — keep this
                                  # explicit or the AEC reference timing changes silently.

microphone:
  - platform: esp_audio_stack
    id: box_mic
    esp_audio_stack_id: audio_stack

speaker:
  - platform: esp_audio_stack
    id: box_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000

media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    # Option from the repo's 'speaker' fork (2026.6.2): HA media pause RELEASES
    # the media pipeline (instead of parking it half-owned) so TTS and timer
    # alarms can take the speaker graph while a stream is paused.
    pause_releases_pipeline: true
    volume_min: 0.8
    volume_max: 1.0
    announcement_pipeline:
      speaker: box_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1  # S3 Box only has one output channel
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
    on_announcement:
      - script.execute: apply_speaker_gain
      # If the streaming wake word (HA-side) is capturing, stop it and wait for VA to settle.
      # On-device micro_wake_word keeps running through TTS so the user can barge in.
      - if:
          condition:
            and:
              - microphone.is_capturing:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - script.execute: stop_wake_word
            - wait_until:
                - not:
                    voice_assistant.is_running:
      # Since VA isn't running, this is user-intiated media playback. Draw the mute display
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            # Clear a leftover speaker pause from global_cancel — otherwise media /
            # HA announcements played after a cancelled turn are silently swallowed
            # (the pause is otherwise only cleared in voice_assistant.on_listening).
            - lambda: id(box_speaker).set_pause_state(false);
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: draw_display
    on_idle:
      # Normal end of user-initiated media playback (no cancel in flight):
      # restart the wake word and show idle.
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - lambda: 'return !id(user_cancelled);'
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display
      # WEDGE RELEASE: a cancelled episode just fully ended — the unabortable
      # TTS reader died and the pipeline went idle. VA lags a moment leaving
      # STREAMING_RESPONSE (which is why a bare is_running check here used to
      # skip and leave the error page stranded until the next wake word).
      # Wait that lag out (bounded), then either honor a FRESH barge-in
      # request (any repeat 'Zylox' during the wedge refreshes the 15 s
      # window) or fall back to the idle page automatically.
      - if:
          condition:
            lambda: 'return id(user_cancelled);'
          then:
            - wait_until:
                condition:
                  not:
                    voice_assistant.is_running:
                timeout: 6s
            - if:
                condition:
                  and:
                    - lambda: 'return !id(pending_wake_restart).empty() && (millis() - id(pending_set_ms)) < 15000;'
                    - not:
                        voice_assistant.is_running:
                then:
                  - script.execute:
                      id: barge_log
                      msg: "wedge-recover"
                  - voice_assistant.start:
                      wake_word: !lambda return id(pending_wake_restart);
                else:
                  - if:
                      condition:
                        not:
                          voice_assistant.is_running:
                      then:
                        - script.execute:
                            id: barge_log
                            msg: "wedge-idle"
                        - script.execute: start_wake_word
                        # The cancelled episode is fully resolved — clear the
                        # stale-cancel marker and return the display to idle.
                        - lambda: id(user_cancelled) = false;
                        - script.execute: set_idle_or_mute_phase
                        - script.execute: draw_display
            - lambda: id(pending_wake_restart).clear();

micro_wake_word:
  id: mww
  microphone: box_mic
  stop_after_detection: false
  models:
    # ── Activation words ──────────────────────────────────────────────────
    # Exactly one is active at a time, chosen by the 'Wake word' select below
    # (enforced by the apply_wake_word_selection script). Both are internal:
    # HA's per-pipeline wake-word switches are out of the loop, the firmware
    # select is the single source of truth.
    #
    # IMPORTANT: internal models do NOT persist their enable state to flash
    # (WakeWordModel::enable()/disable() skip pref_.save for internal_only
    # models), so every boot reverts to the compile-time default: first model
    # in this list enabled, everything else disabled. The selection survives
    # anyway because (a) the 'Wake word' select restores from flash and its
    # on_value re-applies the choice during boot, and (b) every mWW start
    # path below re-runs apply_wake_word_selection. Those re-applications are
    # load-bearing — do not remove them.
    - model: okay_nabu
      id: okay_nabu_model
      internal: true
    - model: http://192.168.0.15:8123/local/mww/zylox.json
      id: zylox_model
      internal: true
    # ── Halt word (unchanged) ─────────────────────────────────────────────
    - model: https://raw.githubusercontent.com/TaterTotterson/microWakeWords/refs/heads/main/microWakeWords/stop.json
      id: stop
      internal: true                  # hide from HA's voice-assistant wake-word switches —
                                      # HA defaults non-primary wake words to OFF, which would
                                      # disable Stop until the user manually toggled it on.
                                      # internal=true keeps the model loaded and always-running
                                      # at the firmware level, outside HA's per-pipeline control.
      probability_cutoff: 0.40        # model default is 0.5 — your sliding avg comes in around 0.58, so 0.40 fires reliably
      sliding_window_size: 3          # model default is 5 — fires after 3 frames (~30 ms) instead of 5
  vad:
    # Loose VAD: noise filter without the multi-second lag the defaults caused.
    # 0.20 cutoff + 1-frame window means VAD agrees almost immediately on any voice-like sound,
    # but still suppresses pure non-speech noise (silence, fan hum, music without vocals).
    probability_cutoff: 0.20
    sliding_window_size: 1
  on_wake_word_detected:
    - logger.log:
        tag: mww
        level: INFO   # default is DEBUG, which the global INFO level compiles out
        format: "MWW fired: %s"
        args:
          - 'wake_word.c_str()'
    - if:
        # Barge-in: VA mid-turn, or speaker mid-announcement (TTS / timer alarm).
        # We treat media_player.is_announcing as a barge-in trigger ONLY when we
        # haven't already cancelled — if user_cancelled is true, the announcing
        # state is stale (the network HTTP reader hasn't released yet) and a new
        # wake word should start a fresh turn instead of looping back into cancel.
        condition:
          or:
            - voice_assistant.is_running:
            - and:
                - media_player.is_announcing:
                - lambda: 'return !id(user_cancelled);'
        then:
          # A second 'Okay Nabu' / 'Zylox' doesn't just cancel — it re-opens
          # listening for a fresh turn. 'Stop' stays cancel-only.
          # ORDER MATTERS: the restart request is recorded BEFORE global_cancel
          # runs, so the cancel paints the LISTENING page (no idle flash) and
          # the dying turn's on_end takes its fast-restart path instead of the
          # full announcement-wait + cleanup sequence.
          - if:
              condition:
                lambda: 'return wake_word != "Stop";'
              then:
                - lambda: |-
                    id(pending_wake_restart) = wake_word;
                    id(pending_set_ms) = millis();
          # RE-ENTRY GUARD: while a cancel is already in flight (user_cancelled
          # is set and no new turn has reached on_listening yet), rapid repeat
          # detections — the Stop model prefiring on 'Zylox', double-fires of
          # the zylox model, or an impatient second utterance — must NOT run
          # global_cancel again: a second cancel's voice_assistant.stop can
          # kill the very turn the restart machinery just started. Updating
          # pending_wake_restart above is enough; the in-flight on_end (or the
          # direct-start below) honors the latest word.
          - if:
              condition:
                lambda: 'return !id(user_cancelled);'
              then:
                - script.execute:
                    id: barge_log
                    msg: !lambda 'return "cancel:" + wake_word;'
                - script.execute: global_cancel
              else:
                - logger.log:
                    tag: barge
                    level: INFO
                    format: "duplicate barge-in ignored (cancel in flight)"
                - script.execute:
                    id: barge_log
                    msg: "dup-ign"
          - if:
              condition:
                and:
                  - lambda: 'return !id(pending_wake_restart).empty();'
                  - not:
                      voice_assistant.is_running:
              then:
                # No pipeline was active (timer alarm, user media, stale TTS
                # tail): no on_end is coming — start the new turn directly.
                - logger.log:
                    tag: barge
                    level: INFO
                    format: "direct restart: VA idle at wake time"
                - script.execute:
                    id: barge_log
                    msg: "direct-start"
                - voice_assistant.start:
                    wake_word: !lambda return id(pending_wake_restart);
                - lambda: id(pending_wake_restart).clear();
        else:
          # Idle: only the activation word starts a new turn.
          # 'Stop' while idle is a no-op (logged above) so it cannot summon the assistant.
          - if:
              condition:
                lambda: 'return wake_word != "Stop";'
              then:
                - voice_assistant.start:
                    wake_word: !lambda return wake_word;
voice_assistant:
  id: va
  microphone: box_mic
  media_player: speaker_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 4.0
  on_listening:
    # Clear the speaker-paused flag set by global_cancel. Without this, the wake-chime
    # plus subsequent TTS would play through the paused TX path and only produce silence.
    - lambda: id(box_speaker).set_pause_state(false);
    - lambda: id(user_cancelled) = false;
    # A turn is starting — any deferred barge-in restart is moot now. Clearing
    # here keeps a stale flag (e.g. from a turn whose on_end never consumed it)
    # from spawning a surprise extra turn after some later, unrelated turn.
    - lambda: id(pending_wake_restart).clear();
    - script.execute:
        id: barge_log
        msg: "listening"
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: draw_display
    # Audible "ding" — AEC cancels it from the mic capture so STT is clean.
    - media_player.speaker.play_on_device_media_file:
        media_file: wake_word_triggered_sound
        announcement: true
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display
  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display
  on_tts_start:
    - if:
        condition:
          lambda: return id(user_cancelled);
        then:
          - voice_assistant.stop:
          - media_player.stop:
              announcement: true
          - media_player.stop: speaker_media_player
          - script.execute: set_idle_or_mute_phase
          - script.execute: draw_display
        else:
          - text_sensor.template.publish:
              id: text_response
              state: !lambda return x;
          # Hold the marquee for 2.5 s so the answer's beginning is readable
          # before it starts scrolling.
          - script.execute: response_scroll_delay
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: draw_display
  on_end:
    # Branch tracer — INFO so it survives the production log level. The barge-in
    # machinery has had enough subtle races that every decision point logs.
    - logger.log:
        tag: barge
        level: INFO
        format: "on_end: pending='%s' announcing=%d va_running=%d"
        args:
          - id(pending_wake_restart).c_str()
          - 'id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING'
          - 'id(va).is_running()'
    - script.execute:
        id: barge_log
        msg: !lambda |-
          char b[64];
          snprintf(b, sizeof(b), "end p=%s a=%d v=%d",
                   id(pending_wake_restart).empty() ? "-" : id(pending_wake_restart).c_str(),
                   (int) (id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING),
                   (int) id(va).is_running());
          return std::string(b);
    # ── FAST BARGE-IN RESTART ────────────────────────────────────────────
    # A second 'Okay Nabu'/'Zylox' mid-turn requested a fresh turn.
    # pending_wake_restart was set BEFORE global_cancel ran, so the cancel
    # already stopped the media player, flushed+paused the speaker, cleared
    # the text sensors and painted the LISTENING page. No TTS announcement is
    # coming, and mWW never stopped (it just detected the wake word) — so the
    # normal path's 0.5 s announcement wait, drain waits, mWW restart and
    # idle-phase cleanup would only add latency and an idle flash. Skip all
    # of it and reopen the mic immediately.
    - if:
        condition:
          lambda: 'return !id(pending_wake_restart).empty();'
        then:
          # Wait until BOTH the announcement pipeline has settled AND the VA
          # component is truly back to IDLE. The VA condition is the critical
          # one: when a turn is cancelled during STREAMING_RESPONSE, core VA
          # fires on_end with state STILL = STREAMING_RESPONSE (the RUN_END
          # handler only forces IDLE from mic/awaiting states; the IDLE
          # transition happens later in VA's own loop once the announcement
          # unwinds) — and request_start is a strict NO-OP unless state ==
          # IDLE, so a start issued too early is silently swallowed (the
          # "frozen on the listening page" bug). is_running() == (state !=
          # IDLE), so waiting on it is exactly the request_start gate.
          # Do NOT gate on speaker.is_playing (lingers ~5 s after pause+flush).
          - wait_until:
              condition:
                and:
                  - not:
                      media_player.is_announcing:
                  - not:
                      voice_assistant.is_running:
              timeout: 6s
          - if:
              condition:
                and:
                  - not:
                      media_player.is_announcing:
                  - not:
                      voice_assistant.is_running:
              then:
                - logger.log:
                    tag: barge
                    level: INFO
                    format: "fast-path restart: starting new turn"
                - script.execute:
                    id: barge_log
                    msg: "fast-start"
                - voice_assistant.start:
                    wake_word: !lambda return id(pending_wake_restart);
                - lambda: id(pending_wake_restart).clear();
              else:
                # Restart impossible right now — almost always the wedged-TTS
                # case: the announcement's HTTP reader is blocked (~30 s,
                # unabortable) and holds VA hostage in STREAMING_RESPONSE.
                # ALWAYS replace the optimistic listening paint with the busy
                # indicator so the device never looks frozen-listening; the
                # media_player.on_idle handler restores idle + wake word when
                # the reader finally errors out. Only silence the speaker when
                # no turn could be live.
                - logger.log:
                    tag: barge
                    level: INFO
                    format: "fast-path restart blocked (announcing=%d va_running=%d)"
                    args:
                      - 'id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING'
                      - 'id(va).is_running()'
                - script.execute:
                    id: barge_log
                    msg: !lambda |-
                      char b[32];
                      snprintf(b, sizeof(b), "fast-blk a=%d v=%d",
                               (int) (id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING),
                               (int) id(va).is_running());
                      return std::string(b);
                # Deliberately KEEP pending_wake_restart: the wedge-recovery
                # block in media_player.on_idle honors it (if still fresh) the
                # moment the dead stream releases the pipeline. on_listening
                # clears it on any turn start.
                - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                - script.execute: draw_display
                - if:
                    condition:
                      not:
                        voice_assistant.is_running:
                    then:
                      - logger.log:
                          tag: va
                          level: WARN
                          format: "barge-in restart abandoned — media_player stuck in ANNOUNCING (blocked HTTP reader). Wake again once the stream errors out."
                      - lambda: |-
                          id(box_speaker).set_pause_state(true);
                          id(audio_stack).stop_speaker();
        else:
          # ── NORMAL TURN END ──────────────────────────────────────────────
          # Wait a short amount of time to see if an announcement starts
          - wait_until:
              condition:
                - media_player.is_announcing:
              timeout: 0.5s
          # Wait for the announcement to finish. The timeout depends on whether the user
          # cancelled mid-TTS:
          #   - user_cancelled = true: 3 s. media_player.stop only flags a stop request —
          #     the streaming HTTP reader can stay stuck on fetch_headers for ~30 s. We
          #     bail out fast so the next turn can start; the follow-up "still announcing"
          #     block silences the I2S TX until the network unblocks.
          #   - user_cancelled = false: 120 s. Normal TTS playback ranges from a few
          #     seconds (short answers) to over a minute (stories, multi-paragraph
          #     responses). A short timeout here silences healthy playback — the
          #     previous unconditional 3 s timeout truncated every response longer
          #     than ~3 s of audio.
          # Drain gates on is_announcing ONLY. speaker.is_playing was removed
          # from these waits deliberately: a paused speaker wrapper never hits
          # its idle timeout (`!pause_state_` is part of the timeout condition),
          # so after barge-in pause/flush churn the flag can stay latched and
          # hold this automation hostage for the full timeout with the display
          # stranded — while the VA component is long idle. is_announcing spans
          # the actual answer playback, and the VA-unwind wait below covers the
          # tail (VA leaves STREAMING_RESPONSE only once media settles).
          - if:
              condition:
                lambda: 'return id(user_cancelled);'
              then:
                - wait_until:
                    condition:
                      not:
                        media_player.is_announcing:
                    timeout: 3s
              else:
                - wait_until:
                    condition:
                      not:
                        media_player.is_announcing:
                    timeout: 120s
          # ── Let the turn FULLY unwind before deciding anything. ──
          # KEY FACT (from live traces): on_end fires at TTS HANDOFF — seconds
          # before the user hears the answer — and the drain wait above is what
          # spans the playback. A reply-phase barge-in therefore always lands
          # MID-DRAIN (pending_wake_restart set while we waited), and right
          # after the cancel VA stays in STREAMING_RESPONSE for up to ~1 s
          # (request_start is a no-op until its loop reaches IDLE). Wait that
          # out, bounded so a wedged stream can't hold this automation hostage.
          - wait_until:
              condition:
                not:
                  voice_assistant.is_running:
              timeout: 6s
          # ── BARGE-IN RESTART (the main consumer for reply-phase barge-ins). ──
          - if:
              condition:
                lambda: 'return !id(pending_wake_restart).empty();'
              then:
                - if:
                    condition:
                      and:
                        - not:
                            media_player.is_announcing:
                        - not:
                            voice_assistant.is_running:
                    then:
                      - logger.log:
                          tag: barge
                          level: INFO
                          format: "late restart: starting new turn"
                      - script.execute:
                          id: barge_log
                          msg: "late-start"
                      - voice_assistant.start:
                          wake_word: !lambda return id(pending_wake_restart);
                      - lambda: id(pending_wake_restart).clear();
                    else:
                      - logger.log:
                          tag: barge
                          level: INFO
                          format: "late restart blocked (announcing=%d va_running=%d)"
                          args:
                            - 'id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING'
                            - 'id(va).is_running()'
                      - script.execute:
                          id: barge_log
                          msg: !lambda |-
                            char b[32];
                            snprintf(b, sizeof(b), "late-blk a=%d v=%d",
                                     (int) (id(speaker_media_player)->state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING),
                                     (int) id(va).is_running());
                            return std::string(b);
                      # Never leave the optimistic listening paint up with no
                      # turn coming — show busy; on_idle recovers when the
                      # wedged reader errors out, honoring the (kept) pending
                      # restart if it is still fresh.
                      - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                      - script.execute: draw_display
          # ── Cleanup for THIS ended turn — ONLY if no turn is live now ──
          # (live = the restart we just issued, a direct restart from the wake
          # handler, or a touch-started turn). The stuck-branch would PAUSE a
          # live turn's audio and the phase/text cleanup would clobber its
          # listening UI.
          - if:
              condition:
                not:
                  voice_assistant.is_running:
              then:
                # If media_player is still stuck after the timeout, log a warning + keep the
                # speaker paused. The lockup itself is unavoidable — ESPHome's audio_reader has
                # a hard-coded 6 × 5 s = 30 s retry on fetch_headers and cannot be aborted from
                # outside. New turns will be accepted once the stream errors out.
                - if:
                    condition:
                      - media_player.is_announcing:
                    then:
                      - logger.log:
                          tag: va
                          level: WARN
                          format: "media_player stuck in ANNOUNCING — audio_reader is blocked on HTTP fetch_headers (~30s upstream limit). Audio is silenced; new turns will be accepted once the stream errors out."
                      - lambda: |-
                          id(box_speaker).set_pause_state(true);
                          id(audio_stack).stop_speaker();
                      # Show a visible "busy" indicator so user knows the device is alive but waiting.
                      - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                      - script.execute: draw_display
                # Restart only mWW if enabled; streaming wake words automatically restart.
                # (Can't reuse start_wake_word here — its `not voice_assistant.is_running`
                # guard can still be false while on_end is executing.)
                - if:
                    condition:
                      - lambda: return id(wake_word_engine_location).current_option() == "On device";
                    then:
                      - lambda: id(va).set_use_wake_word(false);
                      - micro_wake_word.start:
                      # Internal models don't persist enable state — re-assert Stop and the
                      # selected activation word on every restart path, same as start_wake_word.
                      - micro_wake_word.enable_model: stop
                      - script.execute: apply_wake_word_selection
                      - script.execute: boost_mww_priority
                - script.execute: set_idle_or_mute_phase
                - script.execute: draw_display
                # Clear text sensors
                - text_sensor.template.publish:
                    id: text_request
                    state: ""
                - text_sensor.template.publish:
                    id: text_response
                    state: ""
  on_error:
    - script.execute:
        id: barge_log
        msg: "va-err"
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
          - script.execute: draw_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
  on_client_disconnected:
    # Drop any in-flight barge-in restart — with HA gone it can't start a
    # pipeline, and a stale flag must not trigger after some later turn.
    - lambda: id(pending_wake_restart).clear();
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display
  on_timer_started:
    - script.execute: draw_display
  on_timer_cancelled:
    - script.execute: draw_display
  on_timer_updated:
    - script.execute: draw_display
  on_timer_tick:
    - script.execute: draw_display
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - wait_until:
        media_player.is_announcing:
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - script.execute: draw_display

script:
  - id: global_cancel
    then:
      - lambda: id(user_cancelled) = true;
      - voice_assistant.stop:
      - media_player.stop:
          announcement: true
      - media_player.stop: speaker_media_player
      # ── Halt the audio-stack speaker output immediately ──────────────────
      # Calling `speaker.stop` is futile while media_player still has data:
      # the speaker's `play()` auto-re-registers the listener, the state
      # machine runs STOPPED → STARTING → calls parent.start_speaker(), and
      # audio resumes. (Verified on the old duplex component; esp_audio_stack
      # keeps the same speaker-wrapper state machine.)
      #
      # Pausing gates the TX ring read in the audio task, so the I2S DMA emits
      # pure silence regardless of what's still queued in the announcement
      # ring buffer or what media_player keeps feeding. stop_speaker()
      # additionally requests a speaker-buffer reset (service_speaker_reset_)
      # so the queued PCM is dropped, not deferred.
      # IMPORTANT: pause via the WRAPPER (box_speaker.set_pause_state), not
      # id(audio_stack).set_speaker_paused — the wrapper forwards to the stack
      # AND keeps its own flag in sync, which (a) lets upstream speaker logic
      # fast-path its stop on pause, and (b) makes the wrapper auto-unpause
      # the stack on the next start, so a missed manual unpause can't leave
      # the device permanently silent.
      # The pause is cleared in voice_assistant.on_listening when a fresh
      # turn starts, so the wake-chime + new TTS play normally.
      - lambda: |-
          id(box_speaker).set_pause_state(true);
          id(audio_stack).stop_speaker();
      - switch.turn_off: timer_ringing
      - text_sensor.template.publish:
          id: text_request
          state: ""
      - text_sensor.template.publish:
          id: text_response
          state: ""
      # When a barge-in restart is pending (second activation word), go straight
      # to the LISTENING visuals — the restart lands a few hundred ms later and
      # the screen should never flash the idle page between the two turns.
      # Cancel-only paths (Stop, touch) keep the idle/mute page as before.
      - if:
          condition:
            lambda: 'return id(pending_wake_restart).empty();'
          then:
            - script.execute: set_idle_or_mute_phase
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
      - script.execute: draw_display
  - id: draw_display
    then:
      # Day/night artwork: sun.sun below_horizon selects the *_night set.
      # Unknown/empty state (HA not connected yet) keeps the day images.
      # Only write the src when it actually changes — lv_image_set_src always
      # invalidates the whole 320x240 widget, and draw_display runs every 30 s.
      - lambda: |-
          const bool night = id(sun_state).has_state() &&
                             id(sun_state).state == "below_horizon";
          const auto swap = [](lv_obj_t *img, const void *src) {
            if (lv_image_get_src(img) != src)
              lv_image_set_src(img, src);
          };
          swap(id(idle_image),      night ? id(casita_idle_night).get_lv_image_dsc()      : id(casita_idle).get_lv_image_dsc());
          swap(id(listening_image), night ? id(casita_listening_night).get_lv_image_dsc() : id(casita_listening).get_lv_image_dsc());
          swap(id(thinking_image),  night ? id(casita_thinking_night).get_lv_image_dsc()  : id(casita_thinking).get_lv_image_dsc());
          swap(id(replying_image),  night ? id(casita_replying_night).get_lv_image_dsc()  : id(casita_replying).get_lv_image_dsc());
