  thinking_illustration_file: /config/esphome/images/thinking.png
  replying_illustration_file: /config/esphome/images/replying.png
  error_illustration_file: /config/esphome/images/stop.png
  timer_finished_illustration_file: /config/esphome/images/timer_finished.png
  # Night variants (sun.sun below_horizon) — loading and timer_finished have no
