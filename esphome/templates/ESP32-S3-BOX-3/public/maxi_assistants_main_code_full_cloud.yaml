substitutions:
  # Device Identity
  name: "hallway-assistant"
  friendly_name: hallway Assistant
  static_ip: 192.168.20.61
  gateway_ip: 192.168.20.1  
  network_subnet: 255.255.255.0
  #images
  loading_illustration_file: https://github.com/esphome/wake-word-voice-assistants/raw/main/casita/loading_320_240.png
  idle_illustration_file: https://github.com/esphome/wake-word-voice-assistants/raw/main/casita/idle_320_240.png
  listening_illustration_file: https://github.com/esphome/wake-word-voice-assistants/raw/main/casita/listening_320_240.png
  thinking_illustration_file: https://github.com/esphome/wake-word-voice-assistants/raw/main/casita/thinking_320_240.png
  replying_illustration_file: https://github.com/esphome/wake-word-voice-assistants/raw/main/casita/replying_320_240.png
  error_illustration_file: https://github.com/esphome/wake-word-voice-assistants/raw/main/casita/error_320_240.png
  timer_finished_illustration_file: https://github.com/esphome/wake-word-voice-assistants/raw/main/casita/timer_finished_320_240.png

  #colors
  loading_illustration_background_color: "000000"
  idle_illustration_background_color: "000000"
  listening_illustration_background_color: "FFFFFF"
  thinking_illustration_background_color: "FFFFFF"
  replying_illustration_background_color: "FFFFFF"
  error_illustration_background_color: "000000"
  #phase ids
  voice_assist_idle_phase_id: "1"
  voice_assist_listening_phase_id: "2"
  voice_assist_thinking_phase_id: "3"
  voice_assist_replying_phase_id: "4"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  voice_assist_muted_phase_id: "12"
  voice_assist_timer_finished_phase_id: "20"

  # These unique characters have been extracted from every test file of every language available on https://github.com/home-assistant/intents (14 March 2024)
  # However, the Figtree font only contains Latin characters, so there is no point using this... unlessyou change the font configuration accordingly.
  allowed_characters: " !#%'()+,-./0123456789:;<>?@ABCDEFGHIJKLMNOPQRSTUVWYZ[]_abcdefghijklmnopqrstuvwxyz{|}°²³µ¿ÁÂÄÅÉÖÚßàáâãäåæçèéêëìíîðñòóôõöøùúûüýþāăąćčďĐđēėęěğĮįıļľŁłńňőřśšťũūůűųźŻżŽžơưșțΆΈΌΐΑΒΓΔΕΖΗΘΚΜΝΠΡΣΤΥΦάέήίαβγδεζηθικλμνξοπρςστυφχψωϊόύώАБВГДЕЖЗИКЛМНОПРСТУХЦЧШЪЭЮЯабвгдежзийклмнопрстуфхцчшщъыьэюяёђєіїјљњћאבגדהוזחטיכלםמןנסעפץצקרשת،ءآأإئابةتجحخدذرزسشصضطظعغفقكلمنهوىيٹپچڈکگںھہیےংকচতধনফবযরলশষস়ািু্చయలిెొ్ംഅആഇഈഉഎഓകഗങചജഞടഡണതദധനപഫബഭമയരറലളവശസഹാിീുൂെേൈ്ൺൻർൽൾაბგდევზთილმნოპრსტუფქყშჩცძჭხạảấầẩậắặẹẽếềểệỉịọỏốồổỗộớờởợụủứừửữựỳ—、一上不个中为主乾了些亮人任低佔何作供依侧係個側偵充光入全关冇冷几切到制前動區卧厅厨及口另右吊后吗启吸呀咗哪唔問啟嗎嘅嘛器圍在场執場外多大始安定客室家密寵对將小少左已帘常幫幾库度庫廊廚廳开式後恆感態成我戲戶户房所扇手打执把拔换掉控插摄整斯新明是景暗更最會有未本模機檯櫃欄次正氏水沒没洗活派温測源溫漏潮激濕灯為無煙照熱燈燥物狀玄现現瓦用發的盞目着睡私空窗立笛管節簾籬紅線红罐置聚聲脚腦腳臥色节著行衣解設調請謝警设调走路車车运連遊運過道邊部都量鎖锁門閂閉開關门闭除隱離電震霧面音頂題顏颜風风食餅餵가간감갔강개거게겨결경고공과관그금급기길깥꺼껐꼽나난내네놀누는능니다닫담대더데도동됐되된됨둡드든등디때떤뜨라래러렇렌려로료른를리림링마많명몇모무문물뭐바밝방배변보부불블빨뽑사산상색서설성세센션소쇼수스습시신실싱아안않알았애야어얼업없었에여연열옆오온완외왼요운움워원위으은을음의이인일임입있작잠장재전절정제져조족종주줄중줘지직진짐쪽차창천최추출충치침커컴켜켰쿠크키탁탄태탬터텔통트튼티파팬퍼폰표퓨플핑한함해했행혀현화활후휴힘，？"

  # Add support for non-unicode characters by using better glyphset
  font_glyphsets: "GF_Latin_Core"
  # for Greek use "Noto Sans" for other languages use a compatible font family
  font_family: Figtree

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0  # esphome-intercom 2026.6.x requires ESPHome 2026.5.x or newer
  name_add_mac_suffix: false
  on_boot:
    - priority: 600
      then:
        - script.execute: draw_display
        - delay: 30s
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - script.execute: draw_display
    # Late hook (-100 = after every component's setup): apply the restored
    # Speaker Gain on top of the codec's freshly-initialized DAC volume.
    - priority: -100
      then:
        - script.execute: apply_speaker_gain

external_components:
  # n-IA-hane/esphome-intercom, pinned to a validated release.
  - source: github://n-IA-hane/esphome-intercom@v2026.6.2
    components: [audio_processor, esp_aec, esp_audio_stack, speaker]


esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Route ordinary large mallocs (GMF / esp-sr / esp_audio_effects) to
      # PSRAM, keeping internal RAM for DMA/Wi-Fi/latency-critical use.
      CONFIG_SPIRAM_USE_CAPS_ALLOC: "n"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "4096"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_MDNS_TASK_CREATE_FROM_SPIRAM: "y"
      CONFIG_MDNS_MEMORY_ALLOC_SPIRAM: "y"

psram:
  mode: octal
  speed: 80MHz

# Do NOT set `network: enable_high_performance: false` here: it shrinks the
# lwIP socket pool and can starve TTS fetches ("Failed to fetch headers"
# -> unabortable ~30 s reader lockups) under barge-in churn.

# Keep the FLAC decoder's working buffers out of internal RAM — it allocates
# on every TTS response, exactly when AEC + wake word + LVGL are all live.
audio:
  codecs:
    flac:
      buffer_memory: psram

# Heap/fragmentation/loop-time telemetry exposed to HA as diagnostic entities.
debug:
  update_interval: 60s

api:
  encryption:
    key: !secret api_key_voice_assistant
  on_client_connected:
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: draw_display

ota:
  - platform: esphome
    id: ota_esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  # Production logging: DEBUG burns main-loop time on per-frame audio chatter.
  # Note: global INFO compiles DEBUG statements out — custom logger.log actions
  # that must survive need an explicit level.
  level: INFO
  logs:
    # Mute chatty entity-state built-ins; voice/audio components stay at INFO.
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN
    select: INFO
    light: INFO
    speaker: INFO
    audio: INFO
    micro_wake_word: INFO
    voice_assistant: INFO
    media_player: INFO
    mdns: INFO
    wifi: INFO
    audio_processor: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Modem-sleep (the ESP32 default) adds tens of ms of jitter per packet,
  # straight onto wake->STT and TTS latency. Keep the radio awake.
  power_save_mode: NONE
  manual_ip:
    static_ip: ${static_ip}
    gateway: ${gateway_ip}
    subnet: ${network_subnet}
  ap:
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true
interval:
  - interval: 30s
    then:
      - script.execute: draw_display
  # Speaker Gain enforcement: re-layer the boost within 5 s of any codec
  # rewrite (Master Volume moves, stack reopen). One i2c read when idle.
  - interval: 5s
    then:
      - if:
          condition:
            lambda: 'return !id(init_in_progress);'
          then:
            - script.execute: apply_speaker_gain
sensor:       
  # ── Diagnostics ─────────────────────────────────────────────────────────
  - platform: wifi_signal
    id: wifi_signal_db
    name: "WiFi Signal dBm"
    icon: "mdi:wifi"
    update_interval: 30s
    entity_category: diagnostic
  - platform: template
    id: wifi_pct
    name: "WiFi Signal %"
    icon: "mdi:wifi"
    unit_of_measurement: "%"
    update_interval: 30s
    entity_category: diagnostic
    lambda: |-
      if (!id(wifi_signal_db).has_state()) return 0.0f;
      float dbm = id(wifi_signal_db).state;
      if (dbm >= -50) return 100.0f;
      if (dbm <= -100) return 0.0f;
      return 2.0f * (dbm + 100.0f);
  - platform: uptime
    name: Uptime
    update_interval: 60s
    entity_category: diagnostic
  - platform: internal_temperature
    name: CPU Temperature
    update_interval: 60s
    entity_category: diagnostic
  - platform: debug
    free:
      name: Free Heap
      entity_category: diagnostic
    block:
      name: Largest Free Block
      entity_category: diagnostic
    min_free:
      name: Minimum Free Heap
      entity_category: diagnostic
    fragmentation:
      name: Heap Fragmentation
      entity_category: diagnostic
    loop_time:
      name: Main Loop Max Time
      entity_category: diagnostic
    psram:
      name: PSRAM Free
      entity_category: diagnostic
    cpu_frequency:
      name: CPU Frequency
      entity_category: diagnostic
binary_sensor:
  - platform: touchscreen
    name: "Screen Touch"
    id: screen_touch
    touchscreen_id: board_touchscreen
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 240
    on_click:
      min_length: 75ms
      then:
        - if:
            # Same stale-announcing guard as on_wake_word_detected: if user_cancelled is
            # already true, the announcing state is stuck (HTTP reader not yet released)
            # and the touch should start a fresh turn rather than re-entering global_cancel.
            condition:
              or:
                - lambda: |-
                    const int phase = id(voice_assistant_phase);
                    return phase == ${voice_assist_listening_phase_id} ||
                           phase == ${voice_assist_thinking_phase_id} ||
                           phase == ${voice_assist_replying_phase_id};
                - and:
                    - media_player.is_announcing:
                    - lambda: 'return !id(user_cancelled);'
                - switch.is_on: timer_ringing
            then:
              - script.execute: global_cancel
            else:
              - if:
                  condition:
                    and:
                      - lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
                      - switch.is_off: mute
                      - not:
                          voice_assistant.is_running:
                  then:
                    # NOTE: do NOT stop_wake_word here. The pre-AEC config required it because
                    # MWW couldn't share the mic with VA. With esp_audio_stack + esp_aec, MWW
                    # and VA run concurrently as separate consumers of box_mic, so we leave MWW
                    # running through the touch-triggered turn — that's how 'Stop' (and the
                    # 'Okay Nabu' barge-in) keeps working during TTS reply for touch sessions.
                    - lambda: id(va).set_use_wake_word(false);
                    # Belt-and-braces: re-enable the internal Stop model in case anything
                    # disabled it earlier in the session.
                    - micro_wake_word.enable_model: stop
                    - voice_assistant.start:
  - platform: gpio
    pin:
      number: GPIO0
      ignore_strapping_warning: true
      mode: INPUT_PULLUP
      inverted: true
    id: left_top_button
    internal: true
    on_multi_click:
      - timing:
          - ON for at least 50ms
          - OFF for at least 50ms
        then:
          - switch.turn_off: timer_ringing
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn
  # ── Diagnostics ─────────────────────────────────────────────────────────
  - platform: status
    id: node_status
    name: Status
    entity_category: diagnostic
touchscreen:
  - platform: gt911 # Most S3-Box models use this; if it fails, try 'ft6336'
    id: board_touchscreen
    interrupt_pin: GPIO3

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

i2c:
  id: i2c_bus
  scl: GPIO18
  sda: GPIO8

# Raw register access to the ES8311 for the Speaker Gain boost (esp_codec_dev
# owns the codec in TDM mode; we layer the boost on top of its DAC volume reg).
i2c_device:
  - id: es8311_raw
    i2c_id: i2c_bus
    address: 0x18

esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 4
  mode: sr_low_cost

# Full-duplex audio for the ESP32-S3-Box-3 in hardware-codec mode:
# esp_codec_dev drives the ES7210 (4-ch TDM ADC) and ES8311 (DAC) directly,
# and the ES7210 captures the DAC loopback on a dedicated TDM slot — a
# sample-accurate hardware AEC reference (far better echo cancellation than
# the software reference modes).
esp_audio_stack:
  id: audio_stack
  i2s_lrclk_pin: GPIO45
  i2s_bclk_pin: GPIO17
  i2s_mclk_pin: GPIO2
  i2s_din_pin: GPIO16
  i2s_dout_pin: GPIO15
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 16  # 16-bit TDM slots x4
  bits_per_sample: 16
  # Do NOT set dma_frame_num here: shrinking the DMA backlog below the auto
  # sizing (~10 ms/descriptor) causes audible TX underruns on this device.
  correct_dc_offset: true
  processor_id: aec_processor
  # ── TDM hardware AEC reference (slot map measured on the S3-Box-3) ──
  # ES7210 MIC numbering is NOT 1:1 with TDM slot order; the slots carry
  # MIC1, MIC3, MIC2, MIC4. The board loops the ES8311 DAC output back into
  # MIC3, which lands on TDM slot 1.
  codec:
    i2c_id: i2c_bus
    input:
      type: es7210
      address: 0x40
      mic_selected: 0x0F
      gain_db: 24.0        # mic PGA
      ref_channel: 2       # MIC3 = the DAC loopback channel
      ref_gain_db: 0.0     # unity PGA — higher gains clip the line-level loopback
    output:
      type: es8311
      address: 0x18
      use_mclk: true
      no_dac_ref: true
  tdm_total_slots: 4
  tdm_mic_slots: [0]       # slot 0 = MIC1 (esp_aec is single-mic)
  tdm_ref_slot: 1          # slot 1 = MIC3 = DAC loopback
  use_tdm_reference: true
  buffers_in_psram: true
  audio_task_stack_in_psram: true
  aec_reference: previous_frame   # ignored while use_tdm_reference is set

microphone:
  - platform: esp_audio_stack
    id: box_mic
    esp_audio_stack_id: audio_stack

speaker:
  - platform: esp_audio_stack
    id: box_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000

media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    # From the esphome-intercom 'speaker' fork: HA media pause RELEASES the
    # media pipeline (instead of parking it half-owned) so TTS and timer
    # alarms can take the speaker graph while a stream is paused.
    pause_releases_pipeline: true
    volume_min: 0.8
    volume_max: 1.0
    announcement_pipeline:
      speaker: box_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1  # S3 Box only has one output channel
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
    on_announcement:
      - script.execute: apply_speaker_gain
      # If the streaming wake word (HA-side) is capturing, stop it and wait for VA to settle.
      # On-device micro_wake_word keeps running through TTS so the user can barge in.
      - if:
          condition:
            and:
              - microphone.is_capturing:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - script.execute: stop_wake_word
            - wait_until:
                - not:
                    voice_assistant.is_running:
      # Since VA isn't running, this is user-intiated media playback. Draw the mute display
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            # Clear a leftover speaker pause from global_cancel — otherwise media /
            # HA announcements played after a cancelled turn are silently swallowed
            # (the pause is otherwise only cleared in voice_assistant.on_listening).
            - lambda: id(box_speaker).set_pause_state(false);
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: draw_display
    on_idle:
      # Normal end of user-initiated media playback (no cancel in flight):
      # restart the wake word and show idle.
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - lambda: 'return !id(user_cancelled);'
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display
      # WEDGE RELEASE: a cancelled episode fully ended (the unabortable TTS
      # reader died). VA lags a moment leaving STREAMING_RESPONSE — wait that
      # out (bounded), then either honor a FRESH barge-in request (repeat wake
      # words refresh the 15 s window) or fall back to the idle page.
      - if:
          condition:
            lambda: 'return id(user_cancelled);'
          then:
            - wait_until:
                condition:
                  not:
                    voice_assistant.is_running:
                timeout: 6s
            - if:
                condition:
                  and:
                    - lambda: 'return !id(pending_wake_restart).empty() && (millis() - id(pending_set_ms)) < 15000;'
                    - not:
                        voice_assistant.is_running:
                then:
                  - voice_assistant.start:
                      wake_word: !lambda return id(pending_wake_restart);
                else:
                  - if:
                      condition:
                        not:
                          voice_assistant.is_running:
                      then:
                        - script.execute: start_wake_word
                        # The cancelled episode is fully resolved — clear the
                        # stale-cancel marker and return the display to idle.
                        - lambda: id(user_cancelled) = false;
                        - script.execute: set_idle_or_mute_phase
                        - script.execute: draw_display
            - lambda: id(pending_wake_restart).clear();

micro_wake_word:
  id: mww
  microphone: box_mic
  stop_after_detection: false
  models:
    # ── Activation word ───────────────────────────────────────────────────
    # internal: true keeps HA's per-pipeline wake-word switches out of the
    # loop. Internal models do NOT persist their enable state to flash —
    # every boot reverts to the compile-time default (first listed model
    # enabled, everything else disabled), which is exactly what we want here.
    - model: okay_nabu
      id: okay_nabu_model
      internal: true
    # ── Halt word (unchanged) ─────────────────────────────────────────────
    - model: https://raw.githubusercontent.com/TaterTotterson/microWakeWords/refs/heads/main/microWakeWords/stop.json
      id: stop
      internal: true                  # hide from HA's voice-assistant wake-word switches —
                                      # HA defaults non-primary wake words to OFF, which would
                                      # disable Stop until the user manually toggled it on.
                                      # internal=true keeps the model loaded and always-running
                                      # at the firmware level, outside HA's per-pipeline control.
      probability_cutoff: 0.40        # below the 0.5 default so Stop fires reliably mid-playback
      sliding_window_size: 3          # fires after 3 frames (~30 ms) instead of the default 5
  vad:
    # Loose VAD: noise filter without the multi-second lag the defaults caused.
    # 0.20 cutoff + 1-frame window means VAD agrees almost immediately on any voice-like sound,
    # but still suppresses pure non-speech noise (silence, fan hum, music without vocals).
    probability_cutoff: 0.20
    sliding_window_size: 1
  on_wake_word_detected:
    - logger.log:
        tag: mww
        level: INFO   # default is DEBUG, which the global INFO level compiles out
        format: "MWW fired: %s"
        args:
          - 'wake_word.c_str()'
    - if:
        # Barge-in: VA mid-turn, or speaker mid-announcement (TTS / timer alarm).
        # We treat media_player.is_announcing as a barge-in trigger ONLY when we
        # haven't already cancelled — if user_cancelled is true, the announcing
        # state is stale (the network HTTP reader hasn't released yet) and a new
        # wake word should start a fresh turn instead of looping back into cancel.
        condition:
          or:
            - voice_assistant.is_running:
            - and:
                - media_player.is_announcing:
                - lambda: 'return !id(user_cancelled);'
        then:
          # A repeated activation word doesn't just cancel — it re-opens
          # listening for a fresh turn ('Stop' stays cancel-only). ORDER
          # MATTERS: record the restart request BEFORE global_cancel so the
          # cancel paints the LISTENING page and on_end takes the fast path.
          - if:
              condition:
                lambda: 'return wake_word != "Stop";'
              then:
                - lambda: |-
                    id(pending_wake_restart) = wake_word;
                    id(pending_set_ms) = millis();
          # RE-ENTRY GUARD: while a cancel is already in flight, rapid repeat
          # detections (the hair-trigger Stop model prefiring on the activation
          # word, model double-fires, impatient re-utterances) must NOT run
          # global_cancel again — a second cancel can kill the very turn the
          # restart machinery just started. Updating pending_wake_restart
          # above is enough.
          - if:
              condition:
                lambda: 'return !id(user_cancelled);'
              then:
                - script.execute: global_cancel
          - if:
              condition:
                and:
                  - lambda: 'return !id(pending_wake_restart).empty();'
                  - not:
                      voice_assistant.is_running:
              then:
                # No pipeline was active (timer alarm, user media, stale TTS
                # tail): no on_end is coming — start the new turn directly.
                - voice_assistant.start:
                    wake_word: !lambda return id(pending_wake_restart);
                - lambda: id(pending_wake_restart).clear();
        else:
          # Idle: only the activation word starts a new turn.
          # 'Stop' while idle is a no-op (logged above) so it cannot summon the assistant.
          - if:
              condition:
                lambda: 'return wake_word != "Stop";'
              then:
                - voice_assistant.start:
                    wake_word: !lambda return wake_word;
voice_assistant:
  id: va
  microphone: box_mic
  media_player: speaker_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 4.0
  on_listening:
    # Clear the speaker-paused flag set by global_cancel. Without this, the wake-chime
    # plus subsequent TTS would play through the paused TX path and only produce silence.
    - lambda: id(box_speaker).set_pause_state(false);
    - lambda: id(user_cancelled) = false;
    # A turn is starting — any deferred barge-in restart is moot now. Clearing
    # here keeps a stale flag (e.g. from a turn whose on_end never consumed it)
    # from spawning a surprise extra turn after some later, unrelated turn.
    - lambda: id(pending_wake_restart).clear();
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: draw_display
    # Audible "ding" — AEC cancels it from the mic capture so STT is clean.
    - media_player.speaker.play_on_device_media_file:
        media_file: wake_word_triggered_sound
        announcement: true
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display
  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display
  on_tts_start:
    - if:
        condition:
          lambda: return id(user_cancelled);
        then:
          - voice_assistant.stop:
          - media_player.stop:
              announcement: true
          - media_player.stop: speaker_media_player
          - script.execute: set_idle_or_mute_phase
          - script.execute: draw_display
        else:
          - text_sensor.template.publish:
              id: text_response
              state: !lambda return x;
          # Hold the marquee briefly so the answer's beginning is readable
          # before it starts scrolling.
          - script.execute: response_scroll_delay
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: draw_display
  on_end:
    # ── FAST BARGE-IN RESTART ────────────────────────────────────────────
    # A repeated wake word mid-turn requested a fresh turn. The cancel already
    # stopped the media player, flushed+paused the speaker and painted the
    # LISTENING page — skip the normal announcement waits and cleanup and
    # reopen the mic as soon as the old turn has unwound.
    - if:
        condition:
          lambda: 'return !id(pending_wake_restart).empty();'
        then:
          # Wait for BOTH the announcement pipeline AND the VA component to be
          # idle. The VA condition is critical: request_start is a strict no-op
          # unless VA's state is IDLE, and after a reply-phase cancel VA stays
          # in STREAMING_RESPONSE for up to ~1 s — a start issued too early is
          # silently swallowed. Do NOT gate on speaker.is_playing (a paused
          # speaker wrapper can keep it latched for seconds).
          - wait_until:
              condition:
                and:
                  - not:
                      media_player.is_announcing:
                  - not:
                      voice_assistant.is_running:
              timeout: 6s
          - if:
              condition:
                and:
                  - not:
                      media_player.is_announcing:
                  - not:
                      voice_assistant.is_running:
              then:
                - voice_assistant.start:
                    wake_word: !lambda return id(pending_wake_restart);
                - lambda: id(pending_wake_restart).clear();
              else:
                # Restart impossible — almost always a wedged TTS fetch (the
                # HTTP reader blocks unabortably for ~30 s and holds VA
                # hostage). Show the busy page instead of a fake listening
                # screen; media_player.on_idle recovers when the reader dies.
                # Deliberately KEEP pending_wake_restart: the wedge-recovery
                # block in media_player.on_idle honors it (if still fresh) the
                # moment the dead stream releases the pipeline. on_listening
                # clears it on any turn start.
                - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                - script.execute: draw_display
                - if:
                    condition:
                      not:
                        voice_assistant.is_running:
                    then:
                      - logger.log:
                          tag: va
                          level: WARN
                          format: "barge-in restart abandoned — media_player stuck in ANNOUNCING (blocked HTTP reader). Wake again once the stream errors out."
                      - lambda: |-
                          id(box_speaker).set_pause_state(true);
                          id(audio_stack).stop_speaker();
        else:
          # ── NORMAL TURN END ──────────────────────────────────────────────
          # Wait a short amount of time to see if an announcement starts
          - wait_until:
              condition:
                - media_player.is_announcing:
              timeout: 0.5s
          # Wait for the announcement to finish: 3 s when the user cancelled
          # (the wedged-reader case is handled below), 120 s for healthy
          # playback (long answers can exceed a minute). Gate on is_announcing
          # ONLY — never speaker.is_playing, which a paused speaker wrapper
          # can keep latched for the full timeout.
          - if:
              condition:
                lambda: 'return id(user_cancelled);'
              then:
                - wait_until:
                    condition:
                      not:
                        media_player.is_announcing:
                    timeout: 3s
              else:
                - wait_until:
                    condition:
                      not:
                        media_player.is_announcing:
                    timeout: 120s
          # ── Let the turn FULLY unwind before deciding anything. ──
          # on_end fires at TTS HANDOFF (before the answer is heard); the drain
          # wait above spans the playback, so a reply-phase barge-in lands
          # MID-DRAIN with pending_wake_restart set. Wait (bounded) for VA to
          # reach IDLE — request_start is a no-op until it does.
          - wait_until:
              condition:
                not:
                  voice_assistant.is_running:
              timeout: 6s
          # ── BARGE-IN RESTART (the main consumer for reply-phase barge-ins). ──
          - if:
              condition:
                lambda: 'return !id(pending_wake_restart).empty();'
              then:
                - if:
                    condition:
                      and:
                        - not:
                            media_player.is_announcing:
                        - not:
                            voice_assistant.is_running:
                    then:
                      - voice_assistant.start:
                          wake_word: !lambda return id(pending_wake_restart);
                      - lambda: id(pending_wake_restart).clear();
                    else:
                      # Never leave the listening paint up with no turn coming
                      # — show busy; on_idle recovers when the wedged reader
                      # errors out, honoring the kept pending restart if fresh.
                      - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                      - script.execute: draw_display
          # ── Cleanup for THIS ended turn — ONLY if no turn is live now. ──
          # A live turn (restart above, direct restart, or touch-started) must
          # not have its audio paused or its listening UI clobbered.
          - if:
              condition:
                not:
                  voice_assistant.is_running:
              then:
                # If media_player is still stuck after the timeout, silence the
                # speaker and show the busy page. The lockup is upstream
                # (audio_reader's unabortable ~30 s fetch retry); new turns are
                # accepted once the stream errors out.
                - if:
                    condition:
                      - media_player.is_announcing:
                    then:
                      - logger.log:
                          tag: va
                          level: WARN
                          format: "media_player stuck in ANNOUNCING — audio_reader is blocked on HTTP fetch_headers (~30s upstream limit). Audio is silenced; new turns will be accepted once the stream errors out."
                      - lambda: |-
                          id(box_speaker).set_pause_state(true);
                          id(audio_stack).stop_speaker();
                      # Show a visible "busy" indicator so user knows the device is alive but waiting.
                      - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
                      - script.execute: draw_display
                # Restart only mWW if enabled; streaming wake words automatically restart.
                # (Can't reuse start_wake_word here — its `not voice_assistant.is_running`
                # guard can still be false while on_end is executing.)
                - if:
                    condition:
                      - lambda: return id(wake_word_engine_location).current_option() == "On device";
                    then:
                      - lambda: id(va).set_use_wake_word(false);
                      - micro_wake_word.start:
                      # Re-assert the internal Stop model (it never persists
                      # its enable state), same as start_wake_word.
                      - micro_wake_word.enable_model: stop
                      - script.execute: boost_mww_priority
                - script.execute: set_idle_or_mute_phase
                - script.execute: draw_display
                # Clear text sensors
                - text_sensor.template.publish:
                    id: text_request
                    state: ""
                - text_sensor.template.publish:
                    id: text_response
                    state: ""
  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
          - script.execute: draw_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
  on_client_disconnected:
    # Drop any in-flight barge-in restart — with HA gone it can't start a
    # pipeline, and a stale flag must not trigger after some later turn.
    - lambda: id(pending_wake_restart).clear();
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display
  on_timer_started:
    - script.execute: draw_display
  on_timer_cancelled:
    - script.execute: draw_display
  on_timer_updated:
    - script.execute: draw_display
  on_timer_tick:
    - script.execute: draw_display
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - wait_until:
        media_player.is_announcing:
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - script.execute: draw_display

script:
  - id: global_cancel
    then:
      - lambda: id(user_cancelled) = true;
      - voice_assistant.stop:
      - media_player.stop:
          announcement: true
      - media_player.stop: speaker_media_player
      # ── Halt the speaker output immediately ──────────────────────────────
      # `speaker.stop` is futile while media_player still has data (play()
      # auto-restarts the speaker). Pausing gates the TX ring read so the DMA
      # emits silence; stop_speaker() drops the queued PCM. IMPORTANT: pause
      # via the WRAPPER (box_speaker.set_pause_state), never the stack
      # directly — the wrapper keeps its own flag in sync and auto-unpauses on
      # the next start, so a missed unpause can't leave the device silent.
      # The pause is cleared in voice_assistant.on_listening.
      - lambda: |-
          id(box_speaker).set_pause_state(true);
          id(audio_stack).stop_speaker();
      - switch.turn_off: timer_ringing
      - text_sensor.template.publish:
          id: text_request
          state: ""
      - text_sensor.template.publish:
          id: text_response
          state: ""
      # With a restart pending (repeated activation word), paint the LISTENING
      # page directly — no idle flash between the two turns. Cancel-only paths
      # (Stop, touch) keep the idle/mute page.
      - if:
          condition:
            lambda: 'return id(pending_wake_restart).empty();'
          then:
            - script.execute: set_idle_or_mute_phase
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
      - script.execute: draw_display
  - id: draw_display
    then:
      - lvgl.label.update:
          id: thinking_request_label
          text: !lambda return id(text_request).state;
      - lvgl.label.update:
          id: replying_request_label
          text: !lambda return id(text_request).state;
      # Pace the answer marquee to roughly match TTS dictation. LVGL's default
      # label scroll is SPEED-encoded but hard-clamped to a 10 s maximum pass
      # (lv_label.c: lv_anim_speed_clamped(40, 300, 10000)), so long answers
      # whip through far too fast. Give the label an explicit duration scaled
      # to the text (~70 ms/char ~= speaking pace) before updating it; only
      # write when changed so periodic redraws don't restart the scroll.
      - lambda: |-
          const uint32_t ms = std::max((uint32_t) 4000,
                                       (uint32_t) (id(text_response).state.length() * 70));
          if (lv_obj_get_style_anim_duration(id(response_label), LV_PART_MAIN) != ms) {
            lv_obj_set_style_anim_duration(id(response_label), ms, LV_PART_MAIN);
          }
      - lvgl.label.update:
          id: response_label
          text: !lambda return id(text_response).state;
      - script.execute: check_if_timers_active
      - script.execute: check_if_timers
      - if:
          condition:
            lambda: |-
              const int phase = id(voice_assistant_phase);
              return phase == ${voice_assist_idle_phase_id} ||
                     phase == ${voice_assist_muted_phase_id} ||
                     phase == ${voice_assist_listening_phase_id} ||
                     phase == ${voice_assist_thinking_phase_id} ||
                     phase == ${voice_assist_replying_phase_id};
          then:
            - if:
                condition:
                  lambda: return id(global_is_timer_active);
                then:
                  - script.execute: fetch_first_active_timer
                  - lvgl.widget.show: active_timer_bar
                  - lvgl.widget.hide: paused_timer_bar
                  - lvgl.bar.update:
                      id: active_timer_bar
                      value: !lambda |-
                        return std::max(
                          0,
                          std::min(
                            1000,
                            (int) round(
                              1000.0f * id(global_first_active_timer).seconds_left /
                              std::max(id(global_first_active_timer).total_seconds, static_cast<uint32_t>(1))
                            )
                          )
                        );
                  - if:
                      condition:
                        lambda: |-
                          return id(voice_assistant_phase) == ${voice_assist_idle_phase_id} ||
                                 id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
                      then:
                        - lvgl.widget.show: active_timer_widget
                        - lvgl.label.update:
                            id: active_timer_label
                            text: !lambda |-
                              int hours_left = floor(id(global_first_active_timer).seconds_left / 3600);
                              int minutes_left = floor((id(global_first_active_timer).seconds_left - hours_left * 3600) / 60);
                              int seconds_left = id(global_first_active_timer).seconds_left - hours_left * 3600 - minutes_left * 60;
                              auto display_hours = (hours_left < 10 ? "0" : "") + std::to_string(hours_left);
                              auto display_minute = (minutes_left < 10 ? "0" : "") + std::to_string(minutes_left);
                              auto display_seconds = (seconds_left < 10 ? "0" : "") + std::to_string(seconds_left);
                              if (hours_left > 0) {
                                return display_hours + ":" + display_minute;
                              }
                              return display_minute + ":" + display_seconds;
                      else:
                        - lvgl.widget.hide: active_timer_widget
                else:
                  - if:
                      condition:
                        lambda: return id(global_is_timer);
                      then:
                        - script.execute: fetch_first_timer
                        - lvgl.widget.hide: [active_timer_bar, active_timer_widget]
                        - lvgl.widget.show: paused_timer_bar
                        - lvgl.bar.update:
                            id: paused_timer_bar
                            value: !lambda |-
                              return std::max(
                                0,
                                std::min(
                                  1000,
                                  (int) round(
                                    1000.0f * id(global_first_timer).seconds_left /
                                    std::max(id(global_first_timer).total_seconds, static_cast<uint32_t>(1))
                                  )
                                )
                              );
                      else:
                        - lvgl.widget.hide: [active_timer_bar, paused_timer_bar, active_timer_widget]
          else:
            - lvgl.widget.hide: [active_timer_bar, paused_timer_bar, active_timer_widget]
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - if:
                            condition:
                              lambda: return id(voice_assistant_phase) == ${voice_assist_listening_phase_id};
                            then:
                              - lvgl.page.show: listening_page
                            else:
                              - if:
                                  condition:
                                    lambda: return id(voice_assistant_phase) == ${voice_assist_thinking_phase_id};
                                  then:
                                    - lvgl.page.show: thinking_page
                                  else:
                                    - if:
                                        condition:
                                          lambda: return id(voice_assistant_phase) == ${voice_assist_replying_phase_id};
                                        then:
                                          - lvgl.page.show: replying_page
                                        else:
                                          - if:
                                              condition:
                                                lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
                                              then:
                                                - lvgl.page.show: error_page
                                              else:
                                                - if:
                                                    condition:
                                                      lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
                                                    then:
                                                      - lvgl.page.show: muted_page
                                                    else:
                                                      - if:
                                                          condition:
                                                            lambda: return id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id};
                                                          then:
                                                            - lvgl.page.show: no_ha_page
                                                          else:
                                                            - if:
                                                                condition:
                                                                  lambda: return id(voice_assistant_phase) == ${voice_assist_timer_finished_phase_id};
                                                                then:
                                                                  - lvgl.page.show: timer_finished_page
                                                                else:
                                                                  - lvgl.page.show: idle_page
                      else:
                        - lvgl.page.show: no_ha_page
                else:
                  - lvgl.page.show: no_wifi_page
          else:
            - lvgl.page.show: initializing_page

  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_active_timer) = output_timer;
  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer_active) = output;
  - id: fetch_first_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_timer) = output_timer;
  - id: check_if_timers
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          id(global_is_timer) = !timers.empty();

  # Starts either mWW or the streaming wake word, depending on the configured location
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
            # The internal Stop model never persists its enable state and
            # boots disabled — re-assert it on every wake-word (re)start path.
            - micro_wake_word.enable_model: stop
            - script.execute: boost_mww_priority
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  # Stops either mWW or the streaming wake word, depending on the configured location
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:
  # Hold the answer still (DOTS-truncated, the ellipsis signals more text) for
  # 1 s so the start of the answer is readable, THEN begin the circular
  # marquee. mode: restart — each new answer restarts the hold.
  - id: response_scroll_delay
    mode: restart
    then:
      - lambda: lv_label_set_long_mode(id(response_label), LV_LABEL_LONG_MODE_DOTS);
      - delay: 1s
      - lambda: lv_label_set_long_mode(id(response_label), LV_LABEL_LONG_MODE_SCROLL_CIRCULAR);
  # Boost the micro_wake_word inference task from ESPHome's default priority 3
  # to 8 for reliable wake/'Stop' detection during loud TTS playback. The task
  # (FreeRTOS name "mww") is created by micro_wake_word.start — wait 1 s for
  # it to exist.
  - id: boost_mww_priority
    mode: restart
    then:
      - delay: 1s
      - lambda: |-
          TaskHandle_t mww_task = xTaskGetHandle("mww");
          if (mww_task) {
            vTaskPrioritySet(mww_task, 8);
          }
  # Codec-mode Speaker Gain: esp_codec_dev owns ES8311 reg 0x32 (DAC volume,
  # 0.5 dB/step, rewritten on every Master Volume change and stack reopen) and
  # its curve caps at 0 dB. We layer the boost ON TOP: read the register, and
  # if it differs from what WE last wrote, the codec rewrote it — treat that
  # value as the new base and re-add the boost. Idempotent; enforced by a 5 s
  # interval and at every announcement start.
  - id: apply_speaker_gain
    mode: queued
    max_runs: 2
    then:
      - lambda: |-
          float db = id(speaker_gain).state;
          if (isnan(db)) db = 6.0f;
          db = std::max(0.0f, std::min(12.0f, db));
          const int delta = (int) lroundf(db * 2.0f);
          uint8_t reg = 0;
          if (!id(es8311_raw).read_byte(0x32, &reg)) return;
          int base;
          if (id(gain_last_written) >= 0 && reg == (uint8_t) id(gain_last_written)) {
            base = id(gain_base);   // untouched since our last write
          } else {
            base = reg;             // codec rewrote the register: new base
          }
          int target = base + delta;
          if (target > 255) target = 255;
          if ((uint8_t) target != reg) {
            id(es8311_raw).write_byte(0x32, (uint8_t) target);
          }
          id(gain_base) = base;
          id(gain_last_written) = target;
  # Set the voice assistant phase to idle or muted, depending on if the software mute switch is activated
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};

# NOTE: this number block is load-bearing — esp_audio_stack ships number.h at
# its component root, so a config with NO number entities fails to build
# (core 'number' never gets loaded).
number:
  - platform: esp_audio_stack
    esp_audio_stack_id: audio_stack
    master_volume:
      id: master_volume
      name: Master Volume
      speaker_id: box_speaker
    mic_gain:
      id: mic_gain
      name: Mic Gain
      min_value: -20
      max_value: 30
  # Hardware output boost on the ES8311 DAC (+32 dB of headroom above 0 dB).
  # A separate stage from media volume and Master Volume — the amp's trim
  # knob. Much above ~7 dB clips full-scale TTS peaks; back off if harsh.
  - platform: template
    name: Speaker Gain
    id: speaker_gain
    icon: "mdi:volume-plus"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 6
    min_value: 0
    max_value: 12
    step: 0.5
    unit_of_measurement: dB
    mode: slider
    on_value:
      # Also fires on boot-restore; harmless if it lands before the DAC is set
      # up (the late on_boot hook re-applies once setup is complete).
      - script.execute: apply_speaker_gain

switch:
  # Runtime AEC on/off. Restores ON — leave it on for normal use; barge-in
  # ('Stop' during TTS) depends on it.
  - platform: esp_audio_stack
    esp_audio_stack_id: audio_stack
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON
  - platform: gpio
    name: Speaker Enable
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    disabled_by_default: true
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: draw_display
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: draw_display
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Turn off the repeat mode and disable the pause between playlist items
      - lambda: |-
              id(speaker_media_player)
                ->make_call()
                .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                .set_announcement(true)
                .perform();
              id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      # Stop playing the alarm
      - media_player.stop:
          announcement: true
    on_turn_on:
      # Clear a leftover speaker pause from global_cancel — a timer alarm must
      # never ring silently because the user cancelled a TTS reply earlier.
      - lambda: id(box_speaker).set_pause_state(false);
      # Turn on the repeat mode and pause for 1000 ms between playlist items/repeats
      - lambda: |-
            id(speaker_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      - delay: 15min
      - switch.turn_off: timer_ringing

select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - wait_until:
                lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start
                        # Without this, switching to 'On device' mid-session could
                        # run mWW with the internal Stop model still disabled (it is
                        # only enabled by start_wake_word / on_end restart paths).
                        - micro_wake_word.enable_model: stop
                        - script.execute: boost_mww_priority

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: global_first_active_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: global_is_timer_active
    type: bool
    restore_value: false
  - id: global_first_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: global_is_timer
    type: bool
    restore_value: false
  - id: user_cancelled
    type: bool
    restore_value: false
    initial_value: "false"
  # Wake word that requested a cancel+restart, consumed by voice_assistant.on_end.
  # Empty = no restart pending.
  - id: pending_wake_restart
    type: std::string
    restore_value: false
  # millis() when pending_wake_restart was last set — the wedge-recovery path in
  # media_player.on_idle only honors FRESH requests (< 15 s).
  - id: pending_set_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # Speaker Gain layering state (codec mode): codec-rewrite detection.
  - id: gain_base
    type: int
    restore_value: false
    initial_value: "0"
  - id: gain_last_written
    type: int
    restore_value: false
    initial_value: "-1"

image:
  - file: ${error_illustration_file}
    id: casita_error
    resize: 320x240
    type: RGB565
  - file: ${idle_illustration_file}
    id: casita_idle
    resize: 320x240
    type: RGB565
  - file: ${listening_illustration_file}
    id: casita_listening
    resize: 320x240
    type: RGB565
  - file: ${thinking_illustration_file}
    id: casita_thinking
    resize: 320x240
    type: RGB565
  - file: ${replying_illustration_file}
    id: casita_replying
    resize: 320x240
    type: RGB565
  - file: ${timer_finished_illustration_file}
    id: casita_timer_finished
    resize: 320x240
    type: RGB565
  - file: ${loading_illustration_file}
    id: casita_initializing
    resize: 320x240
    type: RGB565
  - file: https://github.com/esphome/wake-word-voice-assistants/raw/main/error_box_illustrations/error-no-wifi.png
    id: error_no_wifi
    resize: 320x240
    type: RGB565
  - file: https://github.com/esphome/wake-word-voice-assistants/raw/main/error_box_illustrations/error-no-ha.png
    id: error_no_ha
    resize: 320x240
    type: RGB565

font:
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
      italic: true
    id: font_request
    size: 15
    glyphsets:
      - ${font_glyphsets}
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
    id: font_response
    size: 15
    glyphsets:
      - ${font_glyphsets}
  - file:
      type: gfonts
      family: ${font_family}
      weight: 300
    id: font_timer
    size: 30
    glyphsets:
      - ${font_glyphsets}
text_sensor:
  - id: text_request
    platform: template
    on_value:
      lambda: |-
        if(id(text_request).state.length()>32) {
          std::string name = id(text_request).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_request).state = (truncated+"...").c_str();
        }

  - id: text_response
    platform: template
    on_value:
      lambda: |-
        // The replying page scrolls the answer in a circular marquee, so keep
        // the full text — bounded so a runaway LLM response can't bloat the
        // label buffer.
        if(id(text_response).state.length()>600) {
          std::string name = id(text_response).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),597);
          id(text_response).state = (truncated+"...").c_str();
        }
  # ── Diagnostics ─────────────────────────────────────────────────────────
  - platform: debug
    device:
      name: Device Info
      entity_category: diagnostic
    reset_reason:
      name: Reset Reason
      entity_category: diagnostic

color:  
  - id: idle_color
    hex: ${idle_illustration_background_color}
  - id: listening_color
    hex: ${listening_illustration_background_color}
  - id: thinking_color
    hex: ${thinking_illustration_background_color}
  - id: replying_color
    hex: ${replying_illustration_background_color}
  - id: loading_color
    hex: ${loading_illustration_background_color}
  - id: error_color
    hex: ${error_illustration_background_color}
  - id: active_timer_color
    hex: "26ed3a"
  - id: paused_timer_color
    hex: "3b89e3"

spi:
  - id: spi_bus
    clk_pin: 7
    mosi_pin: 6

display:
  - platform: mipi_spi
    id: s3_box_lcd
    model: S3BOX
    invert_colors: false
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    auto_clear_enabled: false
    update_interval: never

lvgl:
  displays:
    - s3_box_lcd
  buffer_size: 12%
  pages:
    - id: idle_page
      bg_color: idle_color
      pad_all: 0
      widgets:
        - image:
            src: casita_idle
            align: CENTER
    - id: listening_page
      bg_color: listening_color
      pad_all: 0
      widgets:
        - image:
            src: casita_listening
            align: CENTER
    - id: thinking_page
      bg_color: thinking_color
      pad_all: 0
      widgets:
        - image:
            src: casita_thinking
            align: CENTER
        - container:
            id: request_box
            x: 20
            y: 20
            width: 280
            height: 30
            bg_color: 0xFFFFFF
            bg_opa: COVER
            border_color: 0x000000
            border_width: 1
            radius: 0
            pad_all: 0
            clickable: false
            widgets:
              - label:
                  id: thinking_request_label
                  text: ""
                  align: LEFT_MID
                  x: 10
                  y: 0
                  width: 250
                  long_mode: DOT
                  text_font: font_request
                  text_color: 0x000000
    - id: replying_page
      bg_color: replying_color
      pad_all: 0
      widgets:
        - image:
            src: casita_replying
            align: CENTER
        - container:
            x: 20
            y: 20
            width: 280
            height: 30
            bg_color: 0xFFFFFF
            bg_opa: COVER
            border_color: 0x000000
            border_width: 1
            radius: 0
            pad_all: 0
            clickable: false
            widgets:
              - label:
                  id: replying_request_label
                  text: ""
                  align: LEFT_MID
                  x: 10
                  y: 0
                  width: 250
                  long_mode: DOT
                  text_font: font_request
                  text_color: 0x000000
        - container:
            x: 20
            y: 190
            width: 280
            height: 30
            bg_color: 0xFFFFFF
            bg_opa: COVER
            border_color: 0x000000
            border_width: 1
            radius: 0
            pad_all: 0
            clickable: false
            widgets:
              - label:
                  id: response_label
                  text: ""
                  align: LEFT_MID
                  x: 10
                  y: 0
                  width: 250
                  # Fixed single-line height: without it, the DOTS hold phase
                  # (response_scroll_delay) word-wraps the full answer into
                  # multiple rows instead of truncating on one line.
                  height: 20
                  # Circular marquee so long answers scroll through the box
                  # while they are dictated (was DOT = hard truncation).
                  long_mode: SCROLL_CIRCULAR
                  text_font: font_response
                  text_color: 0x000000
    - id: timer_finished_page
      bg_color: idle_color
      pad_all: 0
      widgets:
        - image:
            src: casita_timer_finished
            align: CENTER
    - id: error_page
      bg_color: error_color
      pad_all: 0
      widgets:
        - image:
            src: casita_error
            align: CENTER
    - id: no_ha_page
      pad_all: 0
      widgets:
        - image:
            src: error_no_ha
            align: CENTER
    - id: no_wifi_page
      pad_all: 0
      widgets:
        - image:
            src: error_no_wifi
            align: CENTER
    - id: initializing_page
      bg_color: loading_color
      pad_all: 0
      widgets:
        - image:
            src: casita_initializing
            align: CENTER
    - id: muted_page
      bg_color: 0x000000
      pad_all: 0
  top_layer:
    pad_all: 0
    widgets:
      - container:
          id: active_timer_widget
          x: 80
          y: 40
          width: 160
          height: 50
          hidden: true
          bg_color: 0xFFFFFF
          border_color: 0x000000
          border_width: 1
          radius: 0
          pad_all: 0
          clickable: false
          widgets:
            - label:
                id: active_timer_label
                text: ""
                align: CENTER
                text_font: font_timer
                text_color: 0x000000
      - bar:
          id: active_timer_bar
          x: 0
          y: 225
          width: 320
          height: 15
          min_value: 0
          max_value: 1000
          value: 0
          hidden: true
          bg_color: 0xFFFFFF
          radius: 0
          pad_all: 1
          clickable: false
          indicator:
            bg_color: active_timer_color
            radius: 0
      - bar:
          id: paused_timer_bar
          x: 0
          y: 225
          width: 320
          height: 15
          min_value: 0
          max_value: 1000
          value: 0
          hidden: true
          bg_color: 0xFFFFFF
          radius: 0
          pad_all: 1
          clickable: false
          indicator:
            bg_color: paused_timer_color
            radius: 0