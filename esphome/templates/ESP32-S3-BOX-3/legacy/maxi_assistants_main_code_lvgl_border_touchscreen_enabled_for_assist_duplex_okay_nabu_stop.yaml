      - lvgl.label.update:
          id: temp_label_up
          text: !lambda |-
            if (isnan(id(outside_temp).state)) {
              return std::string("--°C");
            }
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%.0f°C", id(outside_temp).state);
            return std::string(buffer);
      - lvgl.label.update:
          id: temp_label_down
          text: !lambda |-
            if (isnan(id(outside_temp).state)) {
              return std::string("--°C");
            }
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%.0f°C", id(outside_temp).state);
            return std::string(buffer);
      - lvgl.label.update:
          id: temp_label_left
          text: !lambda |-
            if (isnan(id(outside_temp).state)) {
              return std::string("--°C");
            }
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%.0f°C", id(outside_temp).state);
            return std::string(buffer);
      - lvgl.label.update:
          id: temp_label_right
          text: !lambda |-
            if (isnan(id(outside_temp).state)) {
              return std::string("--°C");
            }
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%.0f°C", id(outside_temp).state);
            return std::string(buffer);
      - lvgl.label.update:
          id: temp_label
          text: !lambda |-
            if (isnan(id(outside_temp).state)) {
              return std::string("--°C");
            }
            char buffer[16];
            snprintf(buffer, sizeof(buffer), "%.0f°C", id(outside_temp).state);
            return std::string(buffer);
      - script.execute: check_if_timers_active
      - script.execute: check_if_timers
      - if:
          condition:
            lambda: |-
              const int phase = id(voice_assistant_phase);
              return phase == ${voice_assist_idle_phase_id} ||
                     phase == ${voice_assist_muted_phase_id} ||
                     phase == ${voice_assist_listening_phase_id} ||
                     phase == ${voice_assist_thinking_phase_id} ||
                     phase == ${voice_assist_replying_phase_id};
          then:
            - if:
                condition:
                  lambda: return id(global_is_timer_active);
                then:
                  - script.execute: fetch_first_active_timer
                  - lvgl.widget.show: active_timer_bar
                  - lvgl.widget.hide: paused_timer_bar
                  - lvgl.bar.update:
                      id: active_timer_bar
                      value: !lambda |-
                        return std::max(
                          0,
                          std::min(
                            1000,
                            (int) round(
                              1000.0f * id(global_first_active_timer).seconds_left /
                              std::max(id(global_first_active_timer).total_seconds, static_cast<uint32_t>(1))
                            )
                          )
                        );
                  - if:
                      condition:
                        lambda: |-
                          return id(voice_assistant_phase) == ${voice_assist_idle_phase_id} ||
                                 id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
                      then:
                        - lvgl.widget.show: active_timer_widget
                        - lvgl.label.update:
                            id: active_timer_label
                            text: !lambda |-
                              int hours_left = floor(id(global_first_active_timer).seconds_left / 3600);
                              int minutes_left = floor((id(global_first_active_timer).seconds_left - hours_left * 3600) / 60);
                              int seconds_left = id(global_first_active_timer).seconds_left - hours_left * 3600 - minutes_left * 60;
                              auto display_hours = (hours_left < 10 ? "0" : "") + std::to_string(hours_left);
                              auto display_minute = (minutes_left < 10 ? "0" : "") + std::to_string(minutes_left);
                              auto display_seconds = (seconds_left < 10 ? "0" : "") + std::to_string(seconds_left);
                              if (hours_left > 0) {
                                return display_hours + ":" + display_minute;
                              }
                              return display_minute + ":" + display_seconds;
                      else:
                        - lvgl.widget.hide: active_timer_widget
                else:
                  - if:
                      condition:
                        lambda: return id(global_is_timer);
                      then:
                        - script.execute: fetch_first_timer
                        - lvgl.widget.hide: [active_timer_bar, active_timer_widget]
                        - lvgl.widget.show: paused_timer_bar
                        - lvgl.bar.update:
                            id: paused_timer_bar
                            value: !lambda |-
                              return std::max(
                                0,
                                std::min(
                                  1000,
                                  (int) round(
                                    1000.0f * id(global_first_timer).seconds_left /
                                    std::max(id(global_first_timer).total_seconds, static_cast<uint32_t>(1))
                                  )
                                )
                              );
                      else:
                        - lvgl.widget.hide: [active_timer_bar, paused_timer_bar, active_timer_widget]
          else:
            - lvgl.widget.hide: [active_timer_bar, paused_timer_bar, active_timer_widget]
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - if:
                            condition:
                              lambda: return id(voice_assistant_phase) == ${voice_assist_listening_phase_id};
                            then:
                              - lvgl.page.show: listening_page
                            else:
                              - if:
                                  condition:
                                    lambda: return id(voice_assistant_phase) == ${voice_assist_thinking_phase_id};
                                  then:
                                    - lvgl.page.show: thinking_page
                                  else:
                                    - if:
                                        condition:
                                          lambda: return id(voice_assistant_phase) == ${voice_assist_replying_phase_id};
                                        then:
                                          - lvgl.page.show: replying_page
                                        else:
                                          - if:
                                              condition:
                                                lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
                                              then:
                                                - lvgl.page.show: error_page
                                              else:
                                                - if:
                                                    condition:
                                                      lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
                                                    then:
                                                      - lvgl.page.show: muted_page
                                                    else:
                                                      - if:
                                                          condition:
                                                            lambda: return id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id};
                                                          then:
                                                            - lvgl.page.show: no_ha_page
                                                          else:
                                                            - if:
                                                                condition:
                                                                  lambda: return id(voice_assistant_phase) == ${voice_assist_timer_finished_phase_id};
                                                                then:
                                                                  - lvgl.page.show: timer_finished_page
                                                                else:
                                                                  - lvgl.page.show: idle_page
                      else:
                        - lvgl.page.show: no_ha_page
                else:
                  - lvgl.page.show: no_wifi_page
          else:
            - lvgl.page.show: initializing_page

  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_active_timer) = output_timer;
  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(global_is_timer_active) = output;
  - id: fetch_first_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(global_first_timer) = output_timer;
  - id: check_if_timers
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          id(global_is_timer) = !timers.empty();

  # Starts either mWW or the streaming wake word, depending on the configured location
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
            # The 'stop' model is internal=true (hidden from HA so HA can't disable it),
            # which means it boots DISABLED and only runs after an explicit enable_model.
            # Re-enabling here ensures Stop is active on every boot, HA reconnect, and
            # after every TTS turn (start_wake_word is called from voice_assistant.on_end).
            - micro_wake_word.enable_model: stop
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  # Stops either mWW or the streaming wake word, depending on the configured location
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:
  # Set the voice assistant phase to idle or muted, depending on if the software mute switch is activated
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};

switch:
  - platform: gpio
    name: Speaker Enable
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    disabled_by_default: true
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: draw_display
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: draw_display
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Turn off the repeat mode and disable the pause between playlist items
      - lambda: |-
              id(speaker_media_player)
                ->make_call()
                .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                .set_announcement(true)
                .perform();
              id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      # Stop playing the alarm
      - media_player.stop:
          announcement: true
    on_turn_on:
      # Turn on the repeat mode and pause for 1000 ms between playlist items/repeats
      - lambda: |-
            id(speaker_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      - delay: 15min
      - switch.turn_off: timer_ringing

select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - wait_until:
                lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start

globals:
  - id: init_in_progress
