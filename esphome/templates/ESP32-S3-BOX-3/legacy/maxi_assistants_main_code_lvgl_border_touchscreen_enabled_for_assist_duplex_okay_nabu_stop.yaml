  # Add support for non-unicode characters by using better glyphset
  font_glyphsets: "GF_Latin_Core"
  # for Greek use "Noto Sans" for other languages use a compatible font family
  font_family: Figtree

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.4.0
  name_add_mac_suffix: false
  on_boot:
    priority: 600
    then:
      - script.execute: draw_display
      - delay: 30s
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: draw_display

external_components:
  # Local copy of n-IA-hane/esphome-intercom @ v4.0.0 — extracted manually
  # because the HA host's `git clone` was failing with `fetch-pack: invalid
  # index-pack output` (OOM during pack indexing).
  - source:
      type: local
      path: /config/esphome/external/esphome-intercom-4.0.0/esphome/components
    components: [i2s_audio_duplex, esp_aec, audio_processor]

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: octal
  speed: 80MHz

api:
  encryption:
    key: !secret api_key_voice_assistant
  on_client_connected:
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: draw_display

ota:
  - platform: esphome
    id: ota_esphome

logger:
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: ${static_ip}
    gateway: 192.168.20.1
    subnet: 255.255.255.0
  ap:
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:
time:
  - platform: homeassistant
    id: ha_time_og

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true
interval:
  - interval: 30s
    then:
      - script.execute: draw_display
sensor:       
  - platform: homeassistant
    id: outside_temp
    entity_id: sensor.outside_temperature_with_fallback
    internal: true
    on_value:
      - if:
          condition:
            - lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id} || id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
          then:
            - script.execute: draw_display
binary_sensor:
  - platform: touchscreen
    name: "Screen Touch"
    id: screen_touch
    touchscreen_id: board_touchscreen
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 240
    on_press:
      then:
        - if:
            condition:
              or:
                - lambda: |-
                    const int phase = id(voice_assistant_phase);
                    return phase == ${voice_assist_listening_phase_id} ||
                           phase == ${voice_assist_thinking_phase_id} ||
                           phase == ${voice_assist_replying_phase_id};
                - media_player.is_announcing:
                - switch.is_on: timer_ringing
            then:
              - script.execute: global_cancel
            else:
              - if:
                  condition:
                    and:
                      - lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
                      - switch.is_off: mute
                      - not:
                          voice_assistant.is_running:
                  then:
                    # NOTE: do NOT stop_wake_word here. The pre-AEC config required it because
                    # MWW couldn't share the mic with VA. With i2s_audio_duplex + esp_aec, MWW
                    # and VA run concurrently as separate consumers of box_mic, so we leave MWW
                    # running through the touch-triggered turn — that's how 'Stop' (and the
                    # 'Okay Nabu' barge-in) keeps working during TTS reply for touch sessions.
                    - lambda: id(va).set_use_wake_word(false);
                    # Belt-and-braces: re-enable the internal Stop model in case anything
                    # disabled it earlier in the session.
                    - micro_wake_word.enable_model: stop
                    - voice_assistant.start:
  - platform: gpio
    pin:
      number: GPIO0
      ignore_strapping_warning: true
      mode: INPUT_PULLUP
      inverted: true
    id: left_top_button
    internal: true
    on_multi_click:
      - timing:
          - ON for at least 50ms
          - OFF for at least 50ms
        then:
          - switch.turn_off: timer_ringing
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn
touchscreen:
  - platform: gt911 # Most S3-Box models use this; if it fails, try 'ft6336'
    id: board_touchscreen
    interrupt_pin: GPIO3

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

i2c:
  scl: GPIO18
  sda: GPIO8

esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 4
  mode: sr_low_cost

i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO45
  i2s_bclk_pin: GPIO17
  i2s_mclk_pin: GPIO2
  i2s_din_pin: GPIO16
  i2s_dout_pin: GPIO15
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 32
  bits_per_sample: 16
  correct_dc_offset: true
  processor_id: aec_processor
  buffers_in_psram: true
  aec_reference: previous_frame

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 48000

audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio_duplex
    id: box_mic
    i2s_audio_duplex_id: i2s_duplex

speaker:
  - platform: i2s_audio_duplex
    id: box_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 48000

media_player:
  - platform: speaker
    name: None
    id: speaker_media_player
    volume_min: 0.8
    volume_max: 1.0
    announcement_pipeline:
      speaker: box_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1  # S3 Box only has one output channel
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
    on_announcement:
      # If the streaming wake word (HA-side) is capturing, stop it and wait for VA to settle.
      # On-device micro_wake_word keeps running through TTS so the user can barge in.
      - if:
          condition:
            and:
              - microphone.is_capturing:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - script.execute: stop_wake_word
            - wait_until:
                - not:
                    voice_assistant.is_running:
      # Since VA isn't running, this is user-intiated media playback. Draw the mute display
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: draw_display
    on_idle:
      # Since VA isn't running, this is the end of user-intiated media playback. Restart the wake word.
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display

micro_wake_word:
  id: mww
  microphone: box_mic
  stop_after_detection: false
  models:
    - model: okay_nabu
    - model: https://raw.githubusercontent.com/TaterTotterson/microWakeWords/refs/heads/main/microWakeWords/stop.json
      id: stop
      internal: true                  # hide from HA's voice-assistant wake-word switches —
                                      # HA defaults non-primary wake words to OFF, which would
                                      # disable Stop until the user manually toggled it on.
                                      # internal=true keeps the model loaded and always-running
                                      # at the firmware level, outside HA's per-pipeline control.
      probability_cutoff: 0.40        # model default is 0.5 — your sliding avg comes in around 0.58, so 0.40 fires reliably
      sliding_window_size: 3          # model default is 5 — fires after 3 frames (~30 ms) instead of 5
  vad:
    # Loose VAD: noise filter without the multi-second lag the defaults caused.
    # 0.20 cutoff + 1-frame window means VAD agrees almost immediately on any voice-like sound,
    # but still suppresses pure non-speech noise (silence, fan hum, music without vocals).
    probability_cutoff: 0.20
    sliding_window_size: 1
  on_wake_word_detected:
    - logger.log:
        tag: mww
        format: "MWW fired: %s"
        args:
          - 'wake_word.c_str()'
    - if:
        # Barge-in: VA mid-turn, or speaker mid-announcement (TTS / timer alarm).
        # Any wake word ('Okay Nabu' or 'Stop') silences the assistant when active.
        # Reuses global_cancel so wake-word and touchscreen go through identical cleanup
        # (incl. the speaker.stop call that flushes the duplex pre-buffer).
        condition:
          or:
            - voice_assistant.is_running:
            - media_player.is_announcing:
        then:
          - script.execute: global_cancel
        else:
          # Idle: only the activation word starts a new turn.
          # 'Stop' while idle is a no-op (logged above) so it cannot summon the assistant.
          - if:
              condition:
                lambda: 'return wake_word != "Stop";'
              then:
                - voice_assistant.start:
                    wake_word: !lambda return wake_word;
voice_assistant:
  id: va
  microphone: box_mic
  media_player: speaker_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 4.0
  on_listening:
    # Clear the speaker-paused flag set by global_cancel. Without this, the wake-chime
    # plus subsequent TTS would play through the paused TX path and only produce silence.
    - lambda: id(i2s_duplex).set_speaker_paused(false);
    - lambda: id(user_cancelled) = false;
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: draw_display
    # Audible "ding" — AEC cancels it from the mic capture so STT is clean.
    - media_player.speaker.play_on_device_media_file:
        media_file: wake_word_triggered_sound
        announcement: true
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display
  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display
  on_tts_start:
    - if:
        condition:
          lambda: return id(user_cancelled);
        then:
          - voice_assistant.stop:
          - media_player.stop:
              announcement: true
          - media_player.stop: speaker_media_player
          - script.execute: set_idle_or_mute_phase
          - script.execute: draw_display
        else:
          - text_sensor.template.publish:
              id: text_response
              state: !lambda return x;
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: draw_display
  on_end:
    # Wait a short amount of time to see if an announcement starts
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    # Announcement is finished and the I2S bus is free
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing:
    # Restart only mWW if enabled; streaming wake words automatically restart
    - if:
        condition:
          - lambda: return id(wake_word_engine_location).current_option() == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
    # Clear text sensors
    - text_sensor.template.publish:
        id: text_request
        state: ""
    - text_sensor.template.publish:
        id: text_response
        state: ""
  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
          - script.execute: draw_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display
  on_timer_started:
    - script.execute: draw_display
  on_timer_cancelled:
    - script.execute: draw_display
  on_timer_updated:
    - script.execute: draw_display
  on_timer_tick:
    - script.execute: draw_display
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - wait_until:
        media_player.is_announcing:
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - script.execute: draw_display

script:
  - id: global_cancel
    then:
      - lambda: id(user_cancelled) = true;
      - voice_assistant.stop:
      - media_player.stop:
          announcement: true
      - media_player.stop: speaker_media_player
      # ── Halt the duplex speaker output immediately ───────────────────────
      # Tracing the duplex source revealed that calling `speaker.stop` is
      # futile while media_player still has data: the speaker's `play()`
      # auto-re-registers the listener, the state machine runs
      # STOPPED → STARTING → calls parent.start_speaker(), and audio resumes.
      #
      # set_speaker_paused(true) bypasses the state machine entirely.
      # process_tx_path_ memsets the output buffer to zeros every frame
      # while paused=true, so the I2S DMA emits pure silence regardless of
      # what's still queued in the 1 MB announcement ring buffer or what
      # media_player keeps feeding. stop_speaker() additionally requests
      # a buffer reset so the queued PCM is dropped, not deferred.
      # The pause is cleared in voice_assistant.on_listening when a fresh
      # turn starts, so the wake-chime + new TTS play normally.
      - lambda: |-
          id(i2s_duplex).set_speaker_paused(true);
          id(i2s_duplex).stop_speaker();
      - switch.turn_off: timer_ringing
      - text_sensor.template.publish:
          id: text_request
          state: ""
      - text_sensor.template.publish:
          id: text_response
          state: ""
      - script.execute: set_idle_or_mute_phase
      - script.execute: draw_display
  - id: draw_display
    then:
      - lvgl.label.update:
          id: thinking_request_label
          text: !lambda return id(text_request).state;
      - lvgl.label.update:
          id: replying_request_label
          text: !lambda return id(text_request).state;
      - lvgl.label.update:
          id: response_label
          text: !lambda return id(text_response).state;
      - lvgl.label.update:
          id: date_label_up
          text: !lambda |-
            static const char *days[] = {"Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"};
            static const char *months[] = {"Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sept", "Oct", "Nov", "Dec"};
            if (!id(ha_time_og).now().is_valid()) {
              return std::string("");
            }
            char buffer[32];
            snprintf(
              buffer,
              sizeof(buffer),
              "%s %d %s",
              days[id(ha_time_og).now().day_of_week - 1],
              id(ha_time_og).now().day_of_month,
              months[id(ha_time_og).now().month - 1]
            );
            return std::string(buffer);
      - lvgl.label.update:
          id: date_label_down
          text: !lambda |-
            static const char *days[] = {"Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"};
            static const char *months[] = {"Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sept", "Oct", "Nov", "Dec"};
            if (!id(ha_time_og).now().is_valid()) {
              return std::string("");
            }
            char buffer[32];
            snprintf(
              buffer,
              sizeof(buffer),
              "%s %d %s",
              days[id(ha_time_og).now().day_of_week - 1],
