# ─── MQTT Device Configuration ───
# Manually defined MQTT entities for devices flashed with Tasmota firmware.
# These devices communicate over MQTT rather than native HA integrations.
switch:
  # Bathroom exhaust fan controlled via a Sonoff relay running Tasmota
  - name: "Bathroom Fan"
    command_topic: "cmnd/sonoff_bathroomfan/POWER"   # Tasmota command topic
    state_topic: "stat/sonoff_bathroomfan/POWER"     # Tasmota state feedback topic
    qos: 0
    payload_on: "ON"
    payload_off: "OFF"
    payload_available: "ON"
    payload_not_available: "OFF"
    retain: false
    unique_id: bathroom_fan