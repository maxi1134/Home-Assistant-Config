
# ─── Media Player Configuration ───
# Defines universal media players that wrap underlying Chromecast, Plex, Jellyfin,
# and Music Assistant (MASS) entities into unified controls per room.
#
# Architecture:
#   - Tablet universals: Combine Jellyfin players for tablet media playback
#   - Chromecast universals: Wrap each room's Chromecast with Plex-aware active child
#     selection (prefers the Plex entity when titles match, for better playback control)
#   - Speaker universals (commented out): Were planned MASS/WiiM/LinkPlay wrappers
#   - Following speaker (commented out): Would auto-route media to Maxi's current room
#
# Most speaker universal players are commented out as they were replaced by
# Music Assistant's native grouping and routing capabilities.

#  ##########################  Tablets  ##########################
  # Myriam's tablet - switches between two Jellyfin player instances
  - platform: universal
    name: Universal Tablet Myriam S8
    unique_id: universal_tablet_myriam_s8
    children:     
      - media_player.jellyfin_tablet_myriam_alt
      - media_player.jellyfin_tablet_myriam
                     
    active_child_template:  >-
                  {% set alt_player = 'media_player.jellyfin_tablet_myriam_alt' %}
                  {% set main_player = 'media_player.jellyfin_tablet_myriam' %}
                   {% if is_state(main_player,'playing')  %}
                    {{ main_player }}
                  {% elif is_state(alt_player,'playing')  %}
                    {{ alt_player }}
                  {% elif not is_state(main_player,'idle')  %}
                    {{ main_player }}
                  {% elif not is_state(alt_player,'idle')  %}
                    {{ alt_player }}
                  {% else %}
                   {{ alt_player }}
                  {% endif %} 

