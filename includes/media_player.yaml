  ##########################  CHROMECASTS  ##########################   
  

  ########################## Universal bedroom Chromecast  ########################## 
  
  
  - platform: universal
    unique_id: universal_bedroom_chromecast
    name: Universal bedroom chromecast
    children:
      - media_player.bedroom_chromecast
    active_child_template: >-
      {% set cast = "media_player.bedroom_chromecast" %}
      {% set ns = namespace(plex_entity = "") %}
      {% set cast_title = state_attr(cast, 'media_title') | default("", true) %}
      {% set cast_series = state_attr(cast, 'media_series_title') | default("", true) %}
      {% for player in states.media_player if "plex" in player.entity_id and player.state != "unavailable" %}
        {% set plex_title = state_attr(player.entity_id, 'media_title') | default("", true) %}
        {% set plex_series = state_attr(player.entity_id, 'media_series_title') | default("", true) %}
        {% if cast_title and plex_title == cast_title %}
          {% set ns.plex_entity = player.entity_id %}
        {% elif cast_series and plex_series == cast_series %}
          {% set ns.plex_entity = player.entity_id %}
        {% endif %}
      {% endfor %}
      {{ ns.plex_entity if ns.plex_entity else cast }}
    commands:
      volume_mute:
        service: media_player.volume_mute
        target:
          entity_id: 
            - media_player.bedroom_chromecast            
        data:
          is_volume_muted: "{{ is_volume_muted }}"
      volume_set:
        service: media_player.volume_set
        target:
          entity_id: 
            - media_player.bedroom_chromecast            
        data:
          volume_level: "{{ volume_level }}"
      volume_up:
        service: media_player.volume_up
        target:
          entity_id: 
            - media_player.bedroom_chromecast            
      volume_down:
        service: media_player.volume_down
        target:
          entity_id: 
            - media_player.bedroom_chromecast              
      media_pause:
        service: media_player.media_pause
        target:
          entity_id: 
            - media_player.bedroom_chromecast             
      media_play_pause:
        service: media_player.media_play_pause
        target:
          entity_id: 
            - media_player.bedroom_chromecast            
      turn_on:
        service: media_player.turn_on
        target:
          entity_id: 
            - media_player.bedroom_chromecast            
      turn_off:
        service: media_player.turn_off
        target:
          entity_id: 
            - media_player.bedroom_chromecast         
      media_stop:
        service: media_player.media_stop
        target:
          entity_id: 
            - media_player.bedroom_chromecast   
      media_play:
        service: media_player.media_play
        target:
          entity_id: 
            - media_player.bedroom_chromecast    
      play_media :
        service: media_player.play_media
        data:
          media_content_type: '{{media_content_type}}'
          media_content_id: '{{media_content_id}}'
        target:
          entity_id: 
            - media_player.bedroom_chromecast            
    attributes:
      is_volume_muted: media_player.bedroom_chromecast|is_volume_muted
      volume_level: media_player.bedroom_chromecast|volume_level
      state: media_player.bedroom_chromecast


