# ─── Notification Groups ───
# Groups mobile app notification targets so a single notify call reaches
# multiple devices (phone + watch) or multiple users at once.

  # Maxi's devices: phone and Galaxy Watch
  - platform: group
    name: "Maxi notification group"
    services:
        - action: mobile_app_phone_maxi
        - action: mobile_app_maxi_watch
  # Myriam's devices: phone only
  - platform: group
    name: "Myriam notification group"
    services:
        - action: mobile_app_phone_myriam
  # All users: combines both individual groups above
  - platform: group
    name: "Users notification group"
    services:
        - action: maxi_notification_group
        - action: myriam_notification_group