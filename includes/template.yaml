  # ─── Person Counting & Presence Sensors ───
  # Counts partners, crashers, and residents at home using HA labels on person entities.
  # Also provides a "Users Present" binary sensor with a 7-minute delay-off.
  - trigger:
      - trigger: state
        entity_id:
          - person.maximiliano
          - person.myriam
          - person.carla
          - person.fay
          - person.cindy
          - person.gnome
          - person.lylou
      - trigger: homeassistant
        event: start
    binary_sensor:
      - name: "Users Present"
        unique_id: user_home
        delay_off:
          minutes: 7
        state: >-
          {{ states.person | selectattr('state', 'eq', 'home') | list | count > 0 }}
    sensor:
      - name: "amount partners home"
        unique_id: "amount_partners_home"
        unit_of_measurement: "partners"
        state: >-
            {% set ns = namespace(total_partners = 0) %}
            {% for person in states.person %}
            {% if "partners" in person.entity_id | labels() and person.state == "home" %}
              {% set ns.total_partners = ns.total_partners + 1 %}
            {% endif %}
            {% endfor %}
            {{ ns.total_partners }}

      - name: "amount people crashing at home"
        unique_id: "amount_crashing_home"
        unit_of_measurement: "crashers"
        state: >-
            {% set ns = namespace(crashers = 0) %}
            {% for person in states.person %}
            {% if "crashers" in person.entity_id | labels() and person.state == "home" %}
              {% set ns.crashers = ns.crashers + 1 %}
            {% endif %}
            {% endfor %}
            {{ ns.crashers }}

      - name: "amount residents at home"
        unique_id: "amount_residents_home"
        unit_of_measurement: "residents"
        state: >-
            {% set ns = namespace(residents = 0) %}
            {% for person in states.person %}
            {% if "residents" in person.entity_id | labels() and person.state == "home" %}
              {% set ns.residents = ns.residents + 1 %}
            {% endif %}
            {% endfor %}
            {{ ns.residents }}
        attributes:
          rooms: >
            {% set info = [
              ('watch', 'sensor.bermuda_maxi_watch_bps_zone', 'sensor.bermuda_maxi_watch_area'),
              ('bracelet', 'device_tracker.maxi_bracelet_espresense', 'sensor.bermuda_maxi_ankle_monitor_area'),
              ('phone', 'device_tracker.espresense_phone_maxi', 'sensor.bermuda_maxi_phone_area'),
            ] %}
            {% set gpslocation = states('device_tracker.phone_maxi') | lower %}
            {% set ns = namespace(rooms=[], results=[]) %}
            {% for name, room, sensor in info if ( name != 'watch' or (name == 'watch' and is_state('binary_sensor.maxi_watch_on_body_sensor', 'on') and is_state('sensor.maxi_watch_charger_type', 'none') )) and (name != 'phone' or (name == 'phone' and is_state('sensor.phone_maxi_charger_type', 'none') and is_state('binary_sensor.phone_maxi_interactive', 'on') )) %}
              {% set room, sensor = (room, sensor) | map('states') | map('lower') | list %}
                {% if room != 'not_home' and room != 'main floor' and room  != 'unknown' and room  != 'home' and room!= 'unavailable' %}
                  {% set ns.rooms = ns.rooms + [(name, room)] %}
                {% endif %}
                {% if sensor != 'not_home' and sensor != 'main floor' and sensor  != 'unknown' and sensor  != 'home' and sensor != 'unavailable' %}
                  {% set ns.rooms = ns.rooms + [(name, sensor)] %}
                {% endif %}
            {% endfor %}
            {% if is_state('binary_sensor.maxi_alone', 'on') %}
              {% set ns.rooms = ns.rooms + [('last',states('sensor.last_active_room')|lower)] %}
            {% endif %}
            {% for room, items in ns.rooms | groupby(attribute='1') %}
               {% set ns.results = ns.results + [(room, items | map(attribute='0') | list )] %}
            {% endfor %}
            {%- for room, devices in ns.results %}
              '{{ room }}': {{ devices | tojson | replace('[','(') | replace(']',')') }}{{ ',' if not loop.last }}
            {%- endfor %}

  # ─── Average House Humidity ───
  # Computes the mean humidity across all room temperature/humidity sensors.
  # Used by the shower detection binary sensor to identify humidity spikes.
  - trigger:
      - trigger: state
        entity_id:
          - sensor.sensor_outside_temperature_humidity
          - sensor.sensor_stove_temperature_humidity
          - sensor.sensor_closet_temperature_humidity
          - sensor.sensor_bedroom_temperature_humidity
          - sensor.sensor_workshop_temperature_humidity
          - sensor.sensor_hotbox_down_temperature_humidity
          - sensor.sensor_bathroom_temperature_humidity
          - sensor.sensor_lounge_temperature_humidity
          - sensor.sensor_server_temperature_humidity
          - sensor.sensor_kitchen_temperature_humidity
          - sensor.sensor_salon_temperature_humidity
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Average House Humidity"
        unique_id: "average_house_humidity"
        unit_of_measurement: '%'
        state: >-
            {{ expand(
              'sensor.sensor_outside_temperature_humidity',
              'sensor.sensor_stove_temperature_humidity',
              'sensor.sensor_closet_temperature_humidity',
              'sensor.sensor_bedroom_temperature_humidity',
              'sensor.sensor_workshop_temperature_humidity',
              'sensor.sensor_hotbox_down_temperature_humidity',
              'sensor.sensor_bathroom_temperature_humidity',
              'sensor.sensor_lounge_temperature_humidity',
              'sensor.sensor_server_temperature_humidity',
              'sensor.sensor_kitchen_temperature_humidity',
              'sensor.sensor_salon_temperature_humidity')
              | rejectattr('state', 'in', ['unavailable', 'unknown'])
              | map(attribute='state')
              | map('float')
              | list
              | average(default=0)
              | round(2) }}

