  #############################################################################
  # TRIGGER-BASED TEMPLATES
  # Converted from polling templates to reduce constant domain-wide iterations
  #############################################################################

  # ─── Friends & Hotspot Tracking ───
  # Counts guests by checking which phones are connected to the "Chilling Hotspot" WiFi.
  # Subtracts known partners and crashers to get the friend count.
  - trigger:
      - trigger: state
        entity_id:
          - sensor.chilling_hotspot_client_count
          - device_tracker.phone_maxi
          - device_tracker.phone_lylou
          - device_tracker.phone_myriam_gps
      - trigger: time_pattern
        minutes: "/5"
    sensor:
      - name: "amount friends home"
        unique_id: "amount_friends_home"
        state: >-
            {% set ns = namespace(friends=0) %}
            {% for device_tracker in states.device_tracker | selectattr('state','eq','home') | selectattr('entity_id','search',"phone_") %}
              {% if state_attr(device_tracker.entity_id, "essid") == "Chilling Hotspot" and 'phone' in device_tracker.entity_id %}
                {% set ns.friends = ns.friends + 1 %}
              {% endif %}
            {% endfor %}
            {% set friendshome = [ns.friends | int - states('sensor.amount_partners_home') | int - states('sensor.amount_crashing_home') | int, 0] | max %}
            {{ friendshome }}
        unit_of_measurement: "friends"
        attributes:
          friends: >
            {% set ns = namespace(friends=[]) %}
            {% for device_tracker in states.device_tracker | selectattr('state','eq','home') | selectattr('entity_id','search',"phone_") %}
              {% if state_attr(device_tracker.entity_id, "essid") == "Chilling Hotspot" and 'phone' in device_tracker.entity_id %}
                {% set name = device_tracker.entity_id | replace('device_tracker.phone_','') | replace('_',' ') | capitalize %}
                {% set ns.friends = ns.friends + [name] %}
              {% endif %}
            {% endfor %}
            {{ ns.friends }}

      - name: "Chilling Hotspot devices"
        unique_id: "which_devices_hotspot"
        state: >-
            {% set ns = namespace(friends=[]) %}
            {% for device_tracker in states.device_tracker | selectattr('state','eq','home') %}
              {% if state_attr(device_tracker.entity_id, "essid") == "Chilling Hotspot" %}
                {% set name = device_tracker.entity_id %}
                {% set ns.friends = ns.friends + [name] %}
              {% endif %}
            {% endfor %}
            {{ ns.friends }}

  # ─── Sleeper Room Tracking ───
  # Tracks which rooms have active "sleeper" flags (input_booleans toggled by
  # automations when a room is detected as having someone sleeping in it).
  - trigger:
      - trigger: state
        entity_id:
          - input_boolean.sleeper_in_bedroom
          - input_boolean.sleeper_in_closet
          - input_boolean.sleeper_in_workshop
          - input_boolean.sleeper_in_patio
          - input_boolean.sleeper_in_hotbox
          - input_boolean.sleeper_in_salon
          - input_boolean.sleeper_in_lounge
      - trigger: homeassistant
        event: start
    sensor:
      - name: "active_sleeper_rooms"
        unique_id: "active_sleeper_rooms"
        state: >-
            {% set sleepers = expand('input_boolean.sleeper_in_bedroom', 'input_boolean.sleeper_in_closet', 'input_boolean.sleeper_in_workshop', 'input_boolean.sleeper_in_patio', 'input_boolean.sleeper_in_hotbox', 'input_boolean.sleeper_in_salon', 'input_boolean.sleeper_in_lounge') | selectattr('state','eq','on') | map(attribute='entity_id') | map('replace', 'input_boolean.sleeper_in_', '') | list %}
            {{ sleepers }}

      - name: "active_sleepers"
        unique_id: "active_sleepers"
        state: >-
            {% set active = expand('input_boolean.sleeper_in_bedroom', 'input_boolean.sleeper_in_closet', 'input_boolean.sleeper_in_workshop', 'input_boolean.sleeper_in_patio', 'input_boolean.sleeper_in_hotbox', 'input_boolean.sleeper_in_salon', 'input_boolean.sleeper_in_lounge') | selectattr('state','eq','on') | list %}
            {{ active | count }}
        attributes:
          rooms: >
            {% set ns = namespace(items=[]) %}
            {% for inp in expand('input_boolean.sleeper_in_bedroom', 'input_boolean.sleeper_in_closet', 'input_boolean.sleeper_in_workshop', 'input_boolean.sleeper_in_patio', 'input_boolean.sleeper_in_hotbox', 'input_boolean.sleeper_in_salon', 'input_boolean.sleeper_in_lounge') | selectattr('state','eq','on') %}
              {% set ns.items = ns.items + [ (loop.index, inp.entity_id | replace('input_boolean.sleeper_in_','') ) ] %}
            {% endfor %}
            {{ dict(ns.items) }}

      - name: "active_sleeper_amount"
        unique_id: "active_sleeper_amount"
        state: >-
            {% set active = expand('input_boolean.sleeper_in_bedroom', 'input_boolean.sleeper_in_closet', 'input_boolean.sleeper_in_workshop', 'input_boolean.sleeper_in_patio', 'input_boolean.sleeper_in_hotbox', 'input_boolean.sleeper_in_salon', 'input_boolean.sleeper_in_lounge') | selectattr('state','eq','on') | list %}
            {{ active | count }}

  # ─── Available Rooms Discovery ───
  # Periodically scans all entities to build a list of known area IDs.
  - trigger:
      - trigger: time_pattern
        minutes: "/30"
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Existing Rooms"
        unique_id: "existing_rooms"
        state: >-
          {% set areas = states | selectattr('attributes.device_class', 'defined') | map(attribute='entity_id') | map('area_id') | unique | reject('none') | list %}
          {{ areas }}

  # ─── Maxi Indoor Location (Petro Algorithm) ───
  # Fuses BLE data from watch, bracelet, and phone with GPS and motion sensors.
  # Uses a voting system: each device reports a room, and the room with the most
  # votes wins. Filters out devices that are charging or not on the body.
  - trigger:
      - trigger: state
        entity_id:
          - sensor.bermuda_maxi_watch_bps_zone
          - sensor.bermuda_maxi_watch_area
          - device_tracker.maxi_bracelet_espresense
          - sensor.bermuda_maxi_ankle_monitor_area
          - sensor.bermuda_maxi_phone_bps_zone
          - sensor.bermuda_maxi_phone_area
          - device_tracker.espresense_phone_maxi
          - device_tracker.phone_maxi
          - binary_sensor.maxi_watch_on_body_sensor
          - sensor.maxi_watch_charger_type
          - sensor.phone_maxi_charger_type
          - binary_sensor.phone_maxi_interactive
          - binary_sensor.maxi_alone
          - sensor.last_active_room
    sensor:
      - name: "Maxi Location by petro"
        unique_id: maxi_location_by_petro
        state: >-
            {% set info = [
              ('watch', 'sensor.bermuda_maxi_watch_bps_zone', 'sensor.bermuda_maxi_watch_area'),
              ('bracelet', 'device_tracker.maxi_bracelet_espresense', 'sensor.bermuda_maxi_ankle_monitor_area'),
              ('phone', 'sensor.bermuda_maxi_phone_bps_zone', 'sensor.bermuda_maxi_phone_area'),
            ] %}
            {% set gpslocation = states('device_tracker.phone_maxi') | lower %}
            {% set ns = namespace(rooms=[], results=[]) %}
            {% for name, room, sensor in info if (name == 'watch' and is_state('binary_sensor.maxi_watch_on_body_sensor', 'on') and is_state('sensor.maxi_watch_charger_type', 'none') ) or
                                                 (name == 'phone' and is_state('sensor.phone_maxi_charger_type', 'none') and is_state('binary_sensor.phone_maxi_interactive', 'on')) or
                                                 (name == 'bracelet' )
            %}
              {% set room, sensor = (room, sensor) | map('states') | map('lower') | list %}
                {% if room != 'not_home' and room != 'main floor' and room  != 'unknown' and room  != 'home' and room!= 'unavailable' %}
                  {% set ns.rooms = ns.rooms + [(name, room.split('_').0)] %}
                {% endif %}
                {% if sensor != 'not_home' and sensor != 'main floor' and sensor  != 'unknown' and sensor  != 'home' and sensor != 'unavailable' %}
                  {% set ns.rooms = ns.rooms + [(name, sensor.split('_').0)] %}
                {% endif %}
            {% endfor %}
            {% if is_state('binary_sensor.maxi_alone', 'on') %}
              {% set ns.rooms = ns.rooms + [('last',states('sensor.last_active_room')|lower)] %}
            {% endif %}
            {% for room, items in ns.rooms | groupby(attribute='1') %}
               {% set ns.results = ns.results + [(room, items | map(attribute='0') | list | length)] %}
            {% endfor %}
            {% if is_state('device_tracker.phone_maxi', 'home') %}
              {{ ns.results | sort(attribute='1', reverse=True) | map(attribute='0') | first | default('unknown') }}
            {% elif gpslocation != "home" and gpslocation != "away" %}
              At {{gpslocation}}
            {% else %}
              not_home
            {% endif %}

  # ─── "Now Playing" Per-Device Sensors ───
  # Extracts human-readable "now playing" text for each Chromecast and speaker.
  # Shows series/episode info for TV, or artist/album for music.
  - trigger:
      - trigger: state
        entity_id:
          - media_player.hotbox_top_chromecast
          - media_player.patio_chromecast
          - media_player.workshop_chromecast
          - media_player.group_mass_home_group_speakers
          - media_player.mass_bathroom_vpe_speaker
          - media_player.mass_bedroom_wiim_speaker
          - media_player.mass_closet_wiim_speaker
          - media_player.mass_lounge_wiim_speaker
          - media_player.mass_kitchen_wiim_speaker
          - media_player.mass_hallway_wiim_speaker
          - media_player.mass_salon_wiim_speaker
          - media_player.mass_workshop_wiim_speaker
      - trigger: homeassistant
        event: start
    sensor:
      - name: "Playing on Hotbox TV"
        unique_id: playing_on_hotbox_tv
        state: >-
          {% set e = 'media_player.hotbox_top_chromecast' %}
          {% if state_attr(e, 'media_series_title') %}
            {{ state_attr(e, 'media_series_title') }} S{{ state_attr(e, 'media_season') }} E{{ state_attr(e, 'media_episode') }}
          {% elif state_attr(e, 'media_album_name') %}
            {{ state_attr(e, 'media_title') }} - {{ state_attr(e, 'media_album_name') }} by {{ state_attr(e, 'media_album_artist') }}
          {% elif state_attr(e, 'media_title') %}
            {{ state_attr(e, 'media_title') }}
          {% endif %}
      - name: "Playing on Patio TV"
        unique_id: playing_on_patio_tv
        state: >-
          {% set e = 'media_player.patio_chromecast' %}
          {% if state_attr(e, 'media_series_title') %}
            {{ state_attr(e, 'media_series_title') }} S{{ state_attr(e, 'media_season') }} E{{ state_attr(e, 'media_episode') }}
          {% elif state_attr(e, 'media_album_name') %}
            {{ state_attr(e, 'media_title') }} - {{ state_attr(e, 'media_album_name') }} by {{ state_attr(e, 'media_album_artist') }}
          {% elif state_attr(e, 'media_title') %}
            {{ state_attr(e, 'media_title') }}
          {% endif %}
      - name: "Playing on Workshop TV"
        unique_id: playing_on_workshop_tv
        state: >-
          {% set e = 'media_player.workshop_chromecast' %}
          {% if state_attr(e, 'media_series_title') %}
            {{ state_attr(e, 'media_series_title') }}: S{{ state_attr(e, 'media_season') }} E{{ state_attr(e, 'media_episode') }}
          {% elif state_attr(e, 'media_album_name') %}
            {{ state_attr(e, 'media_title') }} - {{ state_attr(e, 'media_album_name') }} by {{ state_attr(e, 'media_album_artist') }}
          {% elif state_attr(e, 'media_title') %}
            {{ state_attr(e, 'media_title') }}
          {% endif %}
      - name: "Playing on Home Group Speaker"
        unique_id: playing_on_home_group_speaker
        state: >-
          {% set e = 'media_player.group_mass_home_group_speakers' %}
          {% if state_attr(e, 'media_series_title') %}
            {{ state_attr(e, 'media_series_title') }}
          {% elif state_attr(e, 'media_album_name') %}
