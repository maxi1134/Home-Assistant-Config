          - binary_sensor.group_salon_motion_occupancy
          - binary_sensor.group_hotbox_motion_occupancy
          - binary_sensor.group_patio_motion_occupancy
          - binary_sensor.group_server_motion_occupancy
          - binary_sensor.group_bathroom_motion_occupancy
      - trigger: homeassistant
        event: start
    sensor:
      - name: "active_motion_rooms"
        unique_id: "active_motion_rooms"
        state: >-
            {% set ns = namespace(mediaactiverooms = []) %}
            {% for motion_sensor in expand('binary_sensor.group_security_occupancy_sensors') -%}
              {%- if motion_sensor.state == 'on' -%}
                {% set currentroomname = area_name(motion_sensor.entity_id) %}
                {%- set ns.mediaactiverooms = ns.mediaactiverooms + [currentroomname] -%}
              {%- endif -%}
            {% endfor %}
            {{ ns.mediaactiverooms | unique | list }}
      - name: "last active room"
        unique_id: last_active_room
        state: >-
            {% set groups = [
              'binary_sensor.group_bedroom_motion_occupancy',
              'binary_sensor.group_closet_motion_occupancy',
              'binary_sensor.group_lounge_motion_occupancy',
              'binary_sensor.group_hallway_motion_occupancy',
              'binary_sensor.group_kitchen_motion_occupancy',
              'binary_sensor.group_entrance_motion_occupancy',
              'binary_sensor.group_workshop_motion_occupancy',
              'binary_sensor.group_workstation_motion_occupancy',
              'binary_sensor.group_salon_motion_occupancy',
              'binary_sensor.group_patio_motion_occupancy',
              'binary_sensor.group_server_motion_occupancy',
              'binary_sensor.group_bathroom_motion_occupancy'
            ] %}
            {% set active = expand(groups)
              | selectattr('state', 'eq', 'on')
              | sort(reverse=true, attribute='last_changed')
              | map(attribute='entity_id')
              | first | default(none) %}
            {{ area_name(active) | lower if active else this.state | default('unknown') }}

  # Myriam Location by petro - triggers on specific entities instead of constant re-rendering
  - trigger:
      - trigger: state
        entity_id:
          - device_tracker.myriam_s24_espresense
          - sensor.bermuda_myriam_phone_area
          - device_tracker.phone_myriam_gps
          - binary_sensor.myriam_alone
          - sensor.last_active_room
    sensor:
      - name: "Myriam Location by petro"
        unique_id: myriam_location_by_petro
        state: >-
            {% set info = [
              ('phone', 'device_tracker.myriam_s24_espresense', 'sensor.bermuda_myriam_phone_area'),
            ] %}
            {% set gpslocation = states('device_tracker.phone_myriam_gps') | lower %}
            {% set ns = namespace(rooms=[], results=[]) %}
            {% for name, room, sensor in info %}
              {% set room, sensor = (room, sensor) | map('states') | map('lower') | list %}
                {% if room != 'not_home' and room != 'main floor' and room  != 'unknown' and room  != 'home' and room!= 'unavailable' %}
                  {% set ns.rooms = ns.rooms + [(name, room.split('_').0)] %}
                {% endif %}
                {% if sensor != 'not_home' and sensor != 'main floor' and sensor  != 'unknown' and sensor  != 'home' and sensor != 'unavailable' %}
                  {% set ns.rooms = ns.rooms + [(name, sensor.split('_').0)] %}
                {% endif %}
            {% endfor %}
            {% if is_state('binary_sensor.myriam_alone', 'on') %}
              {% set ns.rooms = ns.rooms + [('last',states('sensor.last_active_room')|lower)] %}
            {% endif %}
            {% for room, items in ns.rooms | groupby(attribute='1') %}
               {% set ns.results = ns.results + [(room, items | map(attribute='0') | list | length)] %}
            {% endfor %}
            {% if is_state('device_tracker.phone_myriam_gps', 'home') %}
              {{ ns.results | sort(attribute='1', reverse=True) | map(attribute='0') | first | default('unknown') }}
            {% elif gpslocation != "home" and gpslocation != "away" %}
              At {{gpslocation}}
            {% else %}
              not_home
            {% endif %}
