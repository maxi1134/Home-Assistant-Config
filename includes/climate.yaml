# ─── Climate / Thermostat Configuration ───
# Generic thermostats that pair Zooz smart plugs (controlling AC units)
# with Zigbee temperature sensors for per-room cooling control.
# All operate in ac_mode (cooling), with away_temp as the fallback setpoint.

  # Hotbox room AC - uses downstairs temperature sensor
  - platform: generic_thermostat
    unique_id: hotbox_ac
    name: Hotbox AC
    heater: switch.zooz_hotbox_ac
    target_sensor: sensor.sensor_hotbox_down_temperature_temperature
    away_temp: 26
    ac_mode: true
  # Salon / living room AC
  - platform: generic_thermostat
    unique_id: salon_ac
    name: Salon AC
    heater: switch.zooz_salon_ac
    target_sensor: sensor.sensor_salon_temperature_temperature
    away_temp: 26
    ac_mode: true
  # Workshop AC
  - platform: generic_thermostat
    unique_id: workshop_ac
    name: workshop AC
    heater: switch.zooz_workshop_ac
    target_sensor: sensor.sensor_workshop_temperature_temperature
    away_temp: 26
    ac_mode: true
  # Bedroom AC - lower away temp (22) for sleeping comfort
  - platform: generic_thermostat
    unique_id: bedroom_ac
    name: Bedroom AC
    heater: switch.zooz_bedroom_plug
    target_sensor: sensor.sensor_bedroom_temperature_temperature
    away_temp: 22
    ac_mode: true