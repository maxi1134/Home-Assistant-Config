ptz_to_doorway:
  alias: PTZ to Doorway
  sequence:
  - service: rest_command.ptz_reolink
    data:
      ptz_id: 1
      token: '{{states(''sensor.reolink_token'')}}'
  mode: single
  icon: mdi:door
