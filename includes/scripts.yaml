ptz_right:
  alias: PTZ Right
  sequence:
  - service: rest_command.ptz_reolink_var
    data:
      command: '[{"cmd":"PtzCtrl","action":0,"param":{"channel":0,"op":"Right","speed":10}}]'
      token: '{{states(''sensor.reolink_token'')}}'
  mode: single
  icon: mdi:arrow-right
