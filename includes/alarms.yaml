# ─── Alarm Control Panel Configuration ───
# Defines the home alarm system using HA's manual alarm platform.
# Works with automations in automations.yaml for arming/disarming/triggering.
  - platform: manual
    name: Home Alarm
    arming_time: 0            # No arming delay (instant arm)
    delay_time: 0             # No entry delay before triggering
    trigger_time: 1200        # Alarm stays triggered for 20 minutes
    disarmed:
      trigger_time: 0         # No trigger when disarmed
    armed_home:
      arming_time: 0          # No arming delay when arming home
      delay_time: 0           # No entry delay when armed home
    code_arm_required: false  # No PIN required to arm the alarm