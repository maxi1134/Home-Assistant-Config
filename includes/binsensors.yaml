# ─── Binary Sensor Configuration ───
# Bayesian sensors that combine multiple observations to infer probability-based states.
# Additional binary sensors (presence, sleep, occupancy) are defined in template.yaml.

  - platform: bayesian
    name: 'Sleeper in Bedroom'
    unique_id: sleeper_in_bedroom
    prior: 0.11
    probability_threshold: 0.8
    observations:
      - entity_id: 'light.group_bedroom_lights'
        prob_given_true: 0.7
        prob_given_false: 0.1
        platform: 'state'
        to_state: 'off'
      - entity_id: 'binary_sensor.sensor_bedroom_door_contact'
        prob_given_true: 0.88
        prob_given_false: 0.125
        platform: 'state'
        to_state: 'off'
  # Migrated to modern template format in includes/template.yaml:
  # user_home, maxi_alone, lylou_alone, myriam_alone, maxi_sleeping