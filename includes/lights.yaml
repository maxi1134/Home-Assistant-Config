# ─── Light Configuration ───
# Wraps smart plugs as light entities so they appear in the lights domain.
# These plugs control non-dimmable novelty lights (lava lamps, plasma ball).
- platform: switch
  name: "Hotbox_Down_lavaLamp"        # Lava lamp in the hotbox lower area
  entity_id: switch.plug_hotbox_down_lavalamp
- platform: switch
  name: "Bedroom_lavaLamp"            # Lava lamp in the bedroom
  entity_id: switch.plug_bedroom_lavalamp
- platform: switch
  name: "Dungeon_Plasmaball"          # Plasma ball in the dungeon/bedroom area
  entity_id: switch.plug_bedroom_plasmaball