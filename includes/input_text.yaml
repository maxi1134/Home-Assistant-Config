# ─── Input Text Configuration ───
# Stores Music Assistant jukebox authentication tokens as input_text helpers.
# Tokens are loaded from secrets.yaml on startup and used by MA jukebox scripts.
ma_jukebox_token_1:
    name: ma_token1
    max: 254
    initial : !secret ma_jukebox_token_1
ma_jukebox_token_2:
    name: ma_token2
    max: 254
    initial : !secret ma_jukebox_token_2