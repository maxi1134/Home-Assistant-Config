intent_script:
  FindPhoneMaxi: # Your custom intent name
    action:
      - action: notify.mobile_app_phone_maxi
        data:
          message: command_dnd
          data:
            command: "off"
      - action: notify.mobile_app_phone_maxi
        data:
          message: command_volume_level
          data:
            media_stream: ring_stream
            command: 100
      - action: notify.mobile_app_phone_maxi
        data:
          title: "Phone Lost?"
          message: "Phone Found!"
          data:
            ttl: 0
            priority: high
            tag: Find
            importance: high
            channel: alarm_stream
    speech:
      text: >-
        Your phone should be near the {{ states('device_tracker.espresense_phone_maxi') }}
