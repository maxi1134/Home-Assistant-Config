# ─── Vibe Arc: Autonomous Party Lifecycle ───
# This package defines all input helpers for the Vibe Arc system.
# The Vibe Arc automatically transitions the party through phases
# based on guest count, time of night, and noise levels.
#
# Phases: Gathering → Warming Up → Peak Party → Late Night → Wind Down → After Party
#
# Automations and scripts are managed via the HA UI.

input_select:
  vibe_arc_phase:
    name: "Vibe Arc Phase"
    icon: mdi:waves-arrow-right
    options:
      - "Off"
      - "Gathering"
      - "Warming Up"
      - "Peak Party"
      - "Late Night"
      - "Wind Down"
      - "After Party"
    initial: "Off"

input_boolean:
  vibe_arc_enabled:
    name: "Vibe Arc"
    icon: mdi:auto-fix
  vibe_arc_paused:
    name: "Vibe Arc Paused"
    icon: mdi:pause-circle
  vibe_arc_acting:
    name: "Vibe Arc Acting"
    icon: mdi:cog-sync

timer:
  vibe_arc_override:
    name: "Vibe Arc Override Timer"
    icon: mdi:timer-pause
    duration: "00:15:00"
    restore: true
