- id: '1774308533764'
  alias: Unmute Bathroom Muzak on Door Close
  description: Starts playing the Bathroom Muzak playlist on shuffle at moderate volume
    on the bathroom speaker when the bathroom door closes and nothing is already playing.
  triggers:
  - entity_id:
    - binary_sensor.sensor_bathroom_door_contact
    to: 'off'
    from: 'on'
    trigger: state
  conditions: []
  actions:
  - action: media_player.volume_mute
    metadata: {}
    target:
      entity_id: media_player.home_assistant_voice_09e4a7_media_player
    data:
      is_volume_muted: false
    enabled: true
    continue_on_error: true
  - metadata: {}
    data:
      volume_level: 0.4
    action: media_player.volume_set
    target:
      entity_id: media_player.mass_bathroom_vpe_speaker
  mode: restart
