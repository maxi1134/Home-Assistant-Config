- id: '1754680196397'
  alias: Turn lights back to normal when UV lamps are turned off
  description: Restores lights in a room to their appropriate color scheme when UV
    lamps are turned off, choosing between party pastel colors, warm kink colors,
    psychedelic random colors, or adaptive lighting based on the current house mode.
  triggers:
  - trigger: state
    entity_id:
    - light.group_hallway_uv_lamps
    - light.group_kitchen_uv_lamps
    - light.group_lounge_uv_lamps
    - light.group_patio_uv_lamps
    - light.group_workshop_uv_lamps
    - light.group_salon_uv_lamps
    to: 'off'
    from: 'on'
  conditions: []
  actions:
  - variables:
      on_lights_in_room: "{% set ns = namespace(f = [] ) %}  {% set zero = ([area_id(trigger.entity_id)]
        \  | map('area_entities')  | sum(start=[]) |    select('match', '^light.')
        \ | select('is_state','on')   | expand | selectattr('attributes.rgb_color','search','0,
        0, 255') |map(attribute='entity_id') |  unique  | list )  %}     {% set eleven
        = ([area_id(trigger.entity_id)]   | map('area_entities')  | sum(start=[])
        |    select('match', '^light.')  | select('is_state','on')   | expand | selectattr('attributes.rgb_color','search','11,
        0, 255') |map(attribute='entity_id') |  unique  | list )  %} {% for i in zero
        \ %} {% if i not in  label_entities(\"High Intensity Light\") | string %}\n
        \ {% set ns.f = ns.f + [i] %}\n{% endif %} {% endfor %} {% for x in eleven
        \ %} {% if x not in  label_entities(\"High Intensity Light\") | string %}\n
        \ {% set ns.f = ns.f + [x] %}\n{% endif %} {% endfor %} {{ ns.f }}\n"
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: state
          entity_id: input_boolean.party_mode
          state: 'on'
      sequence:
      - action: script.changes_selected_lights_to_warm_pale_colors
        metadata: {}
        data:
          light: '{{ on_lights_in_room | first }}

            '
          saturation: 100
      alias: Pastel on party mode on
    - conditions:
      - condition: or
        conditions:
        - condition: state
          entity_id: input_boolean.kink_party
          state: 'on'
      sequence:
      - action: script.changes_selected_light_group_to_single_warm_colors
        metadata: {}
        data:
          light: '{{ on_lights_in_room | first }}

            '
          saturation: 100
    - conditions:
      - condition: or
        conditions:
        - condition: state
          entity_id: input_boolean.acid_time
          state: 'on'
      sequence:
      - action: script.change_received_lights_to_random_colors
        metadata: {}
        data:
          light: '{{ on_lights_in_room | first }}

            '
          saturation: 100
    default:
    - action: adaptive_lighting.apply
      metadata: {}
      data:
        lights: '{{on_lights_in_room}}'
        transition: '1'
  mode: parallel
  max: 10
