- id: '1708472009602'
  alias: Play Random Music when maxi awakes at home
  description: This Automation will start music on the home group when maxi awakes
  triggers:
  - entity_id:
    - sensor.is_maxi_asleep
    from: asleep
    to: awake
    for:
      hours: 0
      minutes: 2
      seconds: 0
    trigger: state
  conditions:
  - condition: state
    entity_id: person.maximiliano
    state: home
  - condition: state
    entity_id: binary_sensor.all_residents_sleeping
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.group_mass_home_group_speakers
      state: playing
  - condition: time
    after: 07:00:00
    before: '11:59:00'
  actions:
  - choose:
    - conditions:
      - condition: time
        before: '11:00:00'
        after: 03:00:00
      sequence:
      - action: media_player.shuffle_set
        metadata: {}
        data:
          shuffle: true
        target:
          entity_id: media_player.group_mass_home_group_speakers
      - alias: Start soft myriam music
        data:
          media_id: Myriam Morning Music
          enqueue: replace
          media_type: playlist
        action: music_assistant.play_media
        target:
          entity_id: media_player.group_mass_home_group_speakers
    default:
    - action: script.start_a_random_maxi_playlist
      data:
        player_entity: media_player.group_mass_home_group_speakers
  mode: single
- id: '1708472370553'
  alias: Stop bedroom speaker when bedroom sleeper awake
  description: Stops the bedroom speaker when the sleeper boolean turns off, preventing
    music from continuing when someone wakes up.
  triggers:
  - entity_id:
    - input_boolean.sleeper_in_bedroom
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 6
      seconds: 0
    trigger: state
  conditions: []
  actions:
  - action: media_player.clear_playlist
    metadata: {}
    data: {}
    target:
      entity_id: media_player.mass_bedroom_wiim_speaker
  - metadata: {}
    data: {}
    action: media_player.turn_off
    target:
      entity_id: media_player.mass_bedroom_wiim_speaker
  mode: single
- id: '1711565389493'
  alias: Assist Restart Music Assistant
  description: Allows restarting the Music Assistant add-on via a voice conversation
    command.
  triggers:
  - trigger: conversation
    command: Restart Music Assistant
  conditions: []
  actions:
  - action: hassio.addon_restart
    metadata: {}
    data:
      addon: d5369777_music_assistant_beta
  mode: single
- id: '1713378517441'
  alias: Auto-lock doors when closed for 5 seconds
  description: Locks the front or back door 5 seconds after the outside contact sensor
    reports the door is shut, but only if the lock is not already in the locked state.
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.sensor_front_outside_door_contact
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: front_door_closed
  - trigger: state
    entity_id:
    - binary_sensor.sensor_back_outside_door_contact
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: back_door_closed
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: front_door_closed
      - condition: not
        conditions:
        - condition: state
          entity_id: lock.lock_front_door
          state: locked
      sequence:
      - alias: Lock the front door
        action: lock.lock
        data: {}
        target:
          entity_id: lock.lock_front_door
    - conditions:
      - condition: trigger
        id: back_door_closed
      - condition: not
        conditions:
        - condition: state
          entity_id: lock.back_door
          state: locked
      sequence:
      - alias: Lock the back door
        action: lock.lock
        data: {}
        target:
          entity_id: lock.back_door
  mode: parallel
  max: 2
- id: '1713378679048'
  alias: Re-lock doors 5 minutes after unlocking if door is shut
  description: Safety net that re-locks the front or back door if it has been unlocked
    for 5 minutes and the door is currently closed. Prevents doors from staying unlocked
    indefinitely.
  triggers:
  - trigger: state
    entity_id:
    - lock.lock_front_door
    to: unlocked
    for:
      hours: 0
      minutes: 5
      seconds: 0
    id: front_door_unlocked
  - trigger: state
    entity_id:
    - lock.back_door
    to: unlocked
    for:
      hours: 0
      minutes: 5
      seconds: 0
    id: back_door_unlocked
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: front_door_unlocked
      - condition: state
        entity_id: binary_sensor.sensor_front_outside_door_contact
        state: 'off'
      sequence:
      - alias: Re-lock the front door
        action: lock.lock
        data: {}
        target:
          entity_id: lock.lock_front_door
    - conditions:
      - condition: trigger
        id: back_door_unlocked
      - condition: state
        entity_id: binary_sensor.sensor_back_outside_door_contact
        state: 'off'
      sequence:
      - alias: Re-lock the back door
        action: lock.lock
        data: {}
        target:
          entity_id: lock.back_door
  mode: parallel
  max: 2
- id: '1713378916074'
  alias: Alert that the front door remained open
  description: Repeatedly broadcasts an alert every 5 minutes while the front door
    contact sensor reports open, unless the apartment is being aired out.
  triggers:
  - entity_id:
    - binary_sensor.sensor_front_door_contact
    to: 'on'
    for:
      hours: 0
      minutes: 3
      seconds: 0
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.aerating_apartment
    state: 'off'
  actions:
  - repeat:
      sequence:
      - action: script.non_important_broadcast_alert_in_the_house
        data:
          message: Front door remained opened
      - delay:
          hours: 0
          minutes: 5
          seconds: 0
          milliseconds: 0
      while:
      - condition: state
        entity_id: binary_sensor.sensor_front_door_contact
        state: 'on'
      - condition: state
        entity_id: input_boolean.aerating_apartment
        state: 'off'
    enabled: true
  mode: restart
- id: '1713399927983'
  alias: Alert that the vacuum is stuck
  description: Notifies when the robot vacuum enters an error state and repeatedly
    alerts until the error is resolved.
  triggers:
  - entity_id:
    - vacuum.roborock_qrevo_curv_series
    to: error
    trigger: state
    for:
      hours: 0
      minutes: 5
      seconds: 0
  conditions: []
  actions:
  - repeat:
      sequence:
      - metadata: {}
        data:
          message: Vacuum Stuck in "{{states('sensor.roborock_qrevo_curv_series_current_room')}}"
        action: script.non_important_broadcast_alert_in_the_house
      - delay:
          hours: 0
          minutes: 10
          seconds: 0
          milliseconds: 0
      until:
      - condition: not
        conditions:
        - condition: state
          entity_id: vacuum.roborock_qrevo_curv_series
          state: error
  mode: single
- id: '1713408006382'
  alias: Turn back door lights on when someone is detected
  description: Turns on the back door light at full brightness and warm temperature
    when any person sensor near the back entrance detects someone.
  triggers:
  - entity_id:
    - binary_sensor.back_entrance_presence_person_occupancy
    - binary_sensor.reolink_back_door_camera_person
    - binary_sensor.hotbox_window_presence_person_occupancy
    - binary_sensor.back_door_camera_person_occupancy
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - metadata: {}
    data:
      color_temp: 254
      brightness: 255
    target:
      entity_id: light.back_door_light
    action: light.turn_on
  mode: single
- id: '1713451307697'
  alias: Sleep actions when "all resident sleeping" is turned on
  description: Close the blinds, turn off the lights and turn on the sleep mode of
    Adaptative lighting
  triggers:
  - entity_id:
    - binary_sensor.all_residents_sleeping
    to: 'on'
    for:
      hours: 0
      minutes: 5
      seconds: 0
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.kink_party
    state: 'off'
  - condition: state
    entity_id: input_boolean.acid_time
    state: 'off'
  - condition: state
    entity_id: input_boolean.party_mode
    state: 'off'
  - condition: sun
    after: sunset
  actions:
  - metadata: {}
    data: {}
    target:
      entity_id: switch.adaptive_lighting_sleep_mode_adaptive_lighting
    action: switch.turn_on
  - metadata: {}
    data: {}
    target:
      entity_id:
      - cover.cover_workshop_blinds
      - cover.cover_salon_blinds
    action: cover.close_cover
  mode: single
- id: '1713451780517'
  alias: Turn off Sleeping mode for Adaptative lighting on "all resident sleeping"
    turns off
  description: Turn off sleep mode for adaptative lighting
  triggers:
  - entity_id:
    - binary_sensor.all_residents_sleeping
    to: 'off'
    trigger: state
    for:
      hours: 0
      minutes: 20
      seconds: 0
  conditions:
  - condition: time
    after: '10:00:00'
    before: '22:00:00'
    weekday:
    - fri
    - thu
    - wed
    - tue
    - mon
    - sat
    - sun
  actions:
  - target:
      entity_id: switch.adaptive_lighting_sleep_mode_adaptive_lighting
    data: {}
    action: switch.turn_off
  mode: single
- id: '1713451981404'
  alias: Turn on party mode when over 5 guests are over
  description: Also check that no psychedelic or kink event is going on
  triggers:
  - entity_id:
    - sensor.chilling_hotspot_client_count
    above: 5
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: input_boolean.kink_party
    state: 'off'
  - condition: state
    entity_id: input_boolean.acid_time
    state: 'off'
  actions:
  - target:
      entity_id: input_boolean.party_mode
    data: {}
    action: input_boolean.turn_on
  mode: single
- id: '1713452550061'
  alias: Close blinds when the house is empty
  description: 'Close blinds '
  triggers:
  - entity_id:
    - zone.home
    for:
      hours: 0
      minutes: 5
      seconds: 0
    below: 0.9
    trigger: numeric_state
  conditions: []
  actions:
  - metadata: {}
    data: {}
    action: cover.close_cover
    target:
      entity_id:
      - cover.group_all_blinds
      - cover.cover_bedroom_blinds
  mode: single
- id: '1713533595890'
  alias: Disarm alarm-away when "User Home" turns on
  description: Automatically disarms the away-alarm when a tracked user arrives home,
    based on the 'User Home' input boolean.
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.user_home
    to: 'on'
    from: 'off'
  conditions:
  - condition: state
    entity_id: alarm_control_panel.home_alarm
    state: armed_away
  actions:
  - action: alarm_control_panel.alarm_disarm
    metadata: {}
    data: {}
    target:
      entity_id: alarm_control_panel.home_alarm
  mode: single
- id: '1713533768680'
  alias: Arm Alarm-Away when "User home" is off for 10 minutes
  description: Arms the alarm in away mode after nobody has been home for 10 minutes,
    providing a buffer to avoid false triggers.
  triggers:
  - entity_id:
    - binary_sensor.user_home
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 10
      seconds: 0
    trigger: state
  - trigger: state
    entity_id:
    - zone.home
    from:
    to: '0'
    for:
      hours: 0
      minutes: 10
      seconds: 0
  conditions: []
  actions:
  - metadata: {}
    data: {}
    target:
      entity_id: alarm_control_panel.home_alarm
    action: alarm_control_panel.alarm_arm_away
  mode: single
- id: '1713534223873'
  alias: Turn ACs on and Off  depending on house occupancy
  description: Manages air conditioning based on whether anyone is home. Turns AC
    off when house is vacant and back on when someone returns.
  triggers:
  - entity_id:
    - binary_sensor.user_home
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.user_home
        state: 'on'
      sequence:
      - metadata: {}
        data:
          preset_mode: none
        target:
          entity_id:
          - climate.workshop_ac
          - climate.salon_ac
        action: climate.set_preset_mode
    - conditions:
      - condition: state
        entity_id: binary_sensor.user_home
        state: 'off'
      sequence:
      - metadata: {}
        data:
          preset_mode: away
        target:
          entity_id:
          - climate.workshop_ac
          - climate.salon_ac
        action: climate.set_preset_mode
  mode: single
- id: '1713535684569'
  alias: Play Muzak in the bathroom when someone enters
  description: Starts background music in the bathroom when the occupancy sensor detects
    someone, for a more pleasant experience.
  triggers:
  - entity_id:
    - binary_sensor.group_bathroom_motion_occupancy
    to:
    - 'on'
    from:
    - 'off'
    trigger: state
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.mass_bathroom_vpe_speaker
      state: playing
    - condition: state
      entity_id: media_player.mass_kitchen_wiim_speaker
      state: playing
    - condition: state
      entity_id: media_player.mass_workshop_wiim_speaker
      state: playing
    - condition: state
      entity_id: media_player.universal_workshop_chromecast
      state: playing
  - condition: state
    entity_id: binary_sensor.sensor_bathroom_door_contact
    state:
    - 'on'
  actions:
  - action: media_player.shuffle_set
    metadata: {}
    data:
      shuffle: true
    target:
      entity_id: media_player.mass_bathroom_vpe_speaker
  - action: music_assistant.play_media
    metadata: {}
    data:
      media_id: Bathroom Muzak
      media_type: playlist
      enqueue: replace
    target:
      entity_id: media_player.mass_bathroom_vpe_speaker
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.sensor_bathroom_door_contact
        state: 'on'
      sequence:
      - metadata: {}
        data:
          volume_level: 0.1
        target:
          entity_id:
          - media_player.bathroom_speaker
          - media_player.mass_bathroom_vpe_speaker
        action: media_player.volume_set
    - conditions:
      - condition: state
        entity_id: binary_sensor.sensor_bathroom_door_contact
        state: 'off'
      sequence:
      - metadata: {}
        data:
          volume_level: 0.4
        action: media_player.volume_set
        target:
          entity_id:
          - media_player.mass_bathroom_vpe_speaker
  mode: restart
- id: '1713536409397'
  alias: Raise music on the playing speaker when the Bathroom fans goes on
  description: Raises the volume of any currently-playing bathroom speaker when the
    fan turns on, so music is still audible over fan noise.
  triggers:
  - entity_id:
    - switch.bathroom_fan
    from: 'off'
    to: 'on'
    trigger: state
  conditions:
  - condition: state
    entity_id: binary_sensor.sensor_bathroom_door_contact
    state: 'off'
  actions:
  - repeat:
      count: 2
      sequence:
      - action: media_player.volume_up
        metadata: {}
        data: {}
        target:
          entity_id: media_player.mass_bathroom_vpe_speaker
  mode: single
- id: '1713536741103'
  alias: Start bathroom fan when Shower in Usage turns on
  description: Automatically starts the bathroom exhaust fan when the shower usage
    sensor activates, to control humidity.
  triggers:
  - entity_id:
    - binary_sensor.shower_in_usage
    trigger: state
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 30
  conditions: []
  actions:
  - metadata: {}
    data: {}
    target:
      entity_id: switch.bathroom_fan
    action: switch.turn_on
  mode: restart
- id: '1713538197256'
  alias: Control Hallway Tablet charging
  description: Manages the hallway tablet's charging plug to maintain healthy battery
    levels — charges when low, stops when full.
  triggers:
  - entity_id:
    - sensor.hallway_tablet_battery
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.hallway_tablet_battery
        above: 90
      sequence:
      - metadata: {}
        data: {}
        target:
          entity_id: switch.plug_hallway_tablet
        action: switch.turn_off
    - conditions:
      - condition: numeric_state
        entity_id: sensor.hallway_tablet_battery
        below: 15
      sequence:
      - metadata: {}
        data: {}
        target:
          entity_id: switch.plug_hallway_tablet
        action: switch.turn_on
      - action: number.set_value
        metadata: {}
        data:
          value: '25'
        target:
          entity_id: number.hallway_tablet_screen_brightness
    - conditions:
      - condition: numeric_state
        entity_id: sensor.hallway_tablet_battery
        above: 20
      - condition: state
        entity_id: binary_sensor.hallway_tablet_plugged_in
        state: 'on'
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '100'
        target:
          entity_id: number.hallway_tablet_screen_brightness
  mode: single
- id: '1713574201448'
  alias: Turn lights to white when we stop a movie
  description: Resets room lights to white after a Plex movie ends or is stopped,
    restoring normal lighting from movie-mode dimming.
  triggers:
  - entity_id:
    - media_player.universal_salon_chromecast
    - media_player.universal_workshop_chromecast
    to:
    - 'off'
    trigger: state
    from:
    - idle
  - entity_id:
    - media_player.universal_salon_chromecast
    - media_player.universal_workshop_chromecast
    to:
    - 'off'
    trigger: state
    from:
    - paused
  - entity_id:
    - media_player.universal_salon_chromecast
    - media_player.universal_workshop_chromecast
    to:
    - 'off'
    trigger: state
    from:
    - playing
  conditions:
  - condition: template
    value_template: '{{ state_attr(state_attr(trigger.entity_id,''active_child''),''media_library_title'')
      == ''Movies''}}'
    enabled: false
  - condition: template
    value_template: '{{ not trigger.from_state.attributes.media_series_title }}'
  - condition: state
    entity_id: input_boolean.kink_party
    state: 'off'
  - condition: state
    entity_id: input_boolean.party_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.acid_time
    state: 'off'
  - condition: state
    entity_id: input_boolean.live_concert
    state: 'off'
  actions:
  - variables:
      off_lights_in_room: '{{ [area_id(trigger.entity_id)] | map(''area_id'') | map(''area_entities'')
        | sum(start=[]) | select(''match'', ''^light.'') | select(''is_state'',''on'')
        | unique | list }}

        '
      entity_id: '{{ trigger.entity_id }}

        '
      trigger_full: '{{ trigger.to_state.attributes }}

        '
  - repeat:
      sequence:
      - metadata: {}
        data:
          effect: effect_stop
        target:
          entity_id: '{{ repeat.item }}'
        action: light.turn_on
        enabled: true
      - action: adaptive_lighting.apply
        metadata: {}
        data:
          lights: '{{ item.repeat }}

            '
          entity_id: switch.adaptive_lighting_adaptive_lighting
          turn_on_lights: true
          adapt_brightness: true
          adapt_color: true
          transition: '2'
      for_each: '{{off_lights_in_room}}'
    enabled: true
  mode: restart
- id: '1713630060902'
  alias: Raise lights to 60% brightness when a movie is paused and the brightness
    is below 30%
  description: Temporarily raises dim room lights to 60% brightness when a Plex movie
    is paused, so the viewer can see comfortably during the pause.
  triggers:
  - entity_id:
    - media_player.universal_bedroom_chromecast
    - media_player.universal_workshop_chromecast
    - media_player.universal_salon_chromecast
    to: paused
    trigger: state
    for:
      hours: 0
      minutes: 0
      seconds: 0
  conditions:
  - condition: template
    value_template: '{{ state_attr(state_attr(trigger.entity_id,''active_child''),''media_library_title'')
      == ''Movies''}}'
    enabled: true
  - condition: template
    value_template: '{{ not trigger.from_state.attributes.media_series_title }}'
    enabled: true
  actions:
  - variables:
      lights_under_60_percent: '{{ [area_id(trigger.entity_id)] | map(''area_entities'')
        | sum(start=[]) | select(''match'', ''^light.'') | select(''is_state'',''on'')  |
        expand | selectattr(''attributes.brightness'', ''defined'') | rejectattr(''attributes.brightness'',
        ''none'') | selectattr(''attributes.brightness'',''<'',153) | map(attribute=''entity_id'')
        | unique | list }}

        '
      entity_id: '{{ trigger.entity_id }}

        '
      trigger_full: '{{ trigger.to_state.attributes }}

        '
  - repeat:
      sequence:
      - metadata: {}
        data:
          brightness: 153
          transition: 2
        target:
          entity_id: '{{ repeat.item }}'
        action: light.turn_on
      for_each: '{{lights_under_60_percent}}'
    enabled: true
  mode: parallel
  max: 6
- id: '1713631370622'
  alias: Turn off Closet fan after 5 minutes of non occupancy
  description: Saves energy by automatically turning off the closet fan when no occupancy
    is detected for 5 minutes.
  triggers:
  - entity_id:
    - binary_sensor.group_closet_motion_occupancy
    from:
    - 'on'
    to:
    - 'off'
    for:
      hours: 0
      minutes: 10
      seconds: 0
    trigger: state
  conditions: []
  actions:
  - metadata: {}
    data: {}
    target:
      entity_id: switch.plug_closet_fan
    action: switch.turn_off
  mode: single
- id: '1713719722990'
  alias: Conditionally Unmute Speakers when a room is occupied
  description: 'This one uses motion groups '
  triggers:
  - entity_id:
    - binary_sensor.group_closet_motion_occupancy
    - binary_sensor.group_lounge_motion_occupancy
    - binary_sensor.group_bedroom_motion_occupancy
    - binary_sensor.group_hallway_motion_occupancy
    - binary_sensor.group_kitchen_motion_occupancy
    - binary_sensor.group_entrance_motion_occupancy
    - binary_sensor.group_workshop_motion_occupancy
    - binary_sensor.group_salon_motion_occupancy
    - binary_sensor.group_hotbox_motion_occupancy
    for:
      hours: 0
      minutes: 0
      seconds: 0
    to: 'on'
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.following_music
    state: 'on'
  - condition: template
    value_template: '{{ trigger.to_state.state == "on" }}'
    alias: Confirm Motion
  - alias: Make sure no sleeper is present
    condition: template
    value_template: '{{ area_id(trigger.entity_id) | string | lower not in states(''sensor.active_sleeper_rooms'')
      | string | lower }}'
  - alias: Make sure no unmuted TV is present
    condition: template
    value_template: '{{ area_id(trigger.entity_id) | string | lower not in state_attr(''sensor.active_chromecast_rooms'',
      ''unmuted_rooms'') | string | lower }}'
  - alias: Make sure no active microphone is present
    condition: template
    value_template: '{{ area_id(trigger.entity_id) | string | lower not in states(''sensor.active_microphones_rooms'')
      | string | lower }}'
  actions:
  - variables:
      playing_speakers: '{{ [area_id(trigger.entity_id)]   | map(''area_entities'')
