          - action: media_player.volume_mute
            metadata: {}
            target:
              entity_id: media_player.mass_bathroom_vpe_speaker
            data:
              is_volume_muted: true
          alias: If any chromecast is playing
        - conditions:
          - condition: state
            entity_id: media_player.mass_kitchen_wiim_speaker
            state:
            - playing
            - 'on'
            - buffering
          - condition: state
            entity_id: media_player.mass_workshop_wiim_speaker
            state:
            - playing
            - 'on'
            - buffering
            enabled: true
          - condition: state
            entity_id: media_player.mass_hallway_wiim_speaker
            state:
            - playing
            - 'on'
            - buffering
            enabled: true
          sequence:
          - action: media_player.volume_mute
            metadata: {}
            target:
              entity_id: media_player.mass_bathroom_vpe_speaker
            data:
              is_volume_muted: true
          alias: If a nearby speaker is playing
        - conditions:
          - condition: state
            entity_id: sensor.active_chromecast_rooms
            state: '[]'
            alias: If there is no active chromecast
          - condition: state
            entity_id: sensor.active_speakers_rooms
            state:
            - '[''bathroom'']'
            alias: If only the bathroom is an active speaker
          sequence:
          - wait_for_trigger:
            - trigger: state
              entity_id:
              - binary_sensor.group_bathroom_motion_occupancy
              to:
              - 'off'
              for:
                hours: 0
                minutes: 1
                seconds: 0
          - action: media_player.volume_mute
            metadata: {}
            target:
              entity_id: media_player.mass_bathroom_vpe_speaker
            data:
              is_volume_muted: true
          alias: If only the bathroom speaker is playing
        default:
        - sequence:
          - alias: Wait until bathroom occupancy is off
            wait_for_trigger:
            - trigger: state
              entity_id:
              - binary_sensor.group_bathroom_motion_occupancy
              to:
              - 'off'
              from:
              - 'on'
              for:
                hours: 0
                minutes: 0
                seconds: 15
            continue_on_timeout: false
          - action: media_player.volume_mute
            metadata: {}
            data:
              is_volume_muted: true
            target:
              entity_id: media_player.mass_bathroom_vpe_speaker
    - conditions:
      - condition: state
        entity_id: binary_sensor.group_bathroom_motion_occupancy
        state: 'off'
      sequence:
      - action: media_player.volume_mute
        metadata: {}
        data:
          is_volume_muted: true
        target:
          entity_id: media_player.mass_bathroom_vpe_speaker
  mode: parallel
  max: 2
