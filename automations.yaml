  triggers:
  - domain: mqtt
    device_id: 35f630d9a5a8349ddc4a8090a85e3418
    type: action
    subtype: off_press
    trigger: device
    id: off_press
  - domain: mqtt
    device_id: 35f630d9a5a8349ddc4a8090a85e3418
    type: action
    subtype: on_press
    trigger: device
    id: on_press
  - domain: mqtt
    device_id: 35f630d9a5a8349ddc4a8090a85e3418
    type: action
    subtype: down_press
    trigger: device
    id: down_press
  - domain: mqtt
    device_id: 35f630d9a5a8349ddc4a8090a85e3418
    type: action
    subtype: up_press
    trigger: device
    id: up_press
  - domain: mqtt
    device_id: 35f630d9a5a8349ddc4a8090a85e3418
    type: action
    subtype: on_hold
    trigger: device
    id: on_hold
  - domain: mqtt
    device_id: 35f630d9a5a8349ddc4a8090a85e3418
    type: action
    subtype: off_press
    trigger: device
    id: off_press
    enabled: false
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - off_press
      sequence:
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: light.group_hotbox_lights
    - conditions:
      - condition: trigger
        id:
        - on_press
      sequence:
      - action: light.turn_on
        metadata: {}
        data: {}
        target:
          entity_id: light.group_hotbox_lights
    - conditions:
      - condition: trigger
        id:
        - down_press
      sequence:
      - action: light.turn_on
        metadata: {}
        data:
          brightness_step_pct: -10
        target:
          entity_id: light.group_hotbox_lights
    - conditions:
      - condition: trigger
        id:
        - up_press
      sequence:
      - action: light.turn_on
        metadata: {}
        data:
          brightness_step_pct: 10
        target:
          entity_id: light.group_hotbox_lights
    - conditions:
      - condition: trigger
        id:
        - on_hold
      sequence:
      - action: light.turn_on
        metadata: {}
        data:
          brightness_pct: 100
          transition: 2
        target:
          entity_id: light.group_hotbox_lights
  mode: single
