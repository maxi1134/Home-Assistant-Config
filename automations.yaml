      target_width: 1280
      max_tokens: 100
      temperature: 0.1
      expose_images: true
      provider: 01K9337G97H1HC11NBFD4HF7JQ
      model: qwen3-vl:2b-instruct-q4_K_M
      message: Answer only with 'yes' or 'no', is there a police officer or a security
        guard on this image? Only use one word to answer
      image_entity:
      - camera.front_door_camera
    response_variable: answer
  - alias: Lower volume if a cop is present and notify maxi
