        then:
        - action: google_assistant_sdk.send_text_command
          metadata: {}
          data:
            command: power off hotbox tv
      - action: media_player.media_stop
        metadata: {}
        data: {}
        target:
          area_id: hotbox
      - action: media_player.clear_playlist
        metadata: {}
        data: {}
        target:
          area_id: hotbox
      - action: media_player.turn_off
        metadata: {}
        data: {}
        target:
          area_id: hotbox
    - conditions:
      - condition: trigger
        id:
        - button_3_press
      sequence:
      - action: script.change_received_lights_to_random_colors
        metadata: {}
        data:
          light:
          - light.group_hotbox_lights
          saturation: 100
    - conditions:
      - condition: trigger
        id:
        - button_4_press
      sequence:
      - action: light.turn_on
        metadata: {}
        data:
          brightness_pct: 1
        target:
          entity_id: light.group_hotbox_lights
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: light.plug_hotbox_mirror_lamp
    - conditions:
      - condition: trigger
        id:
        - button_2_hold
      sequence: []
    - conditions:
      - condition: trigger
        id:
        - rotate_right_step
        - brightness_step_up
        - rotate_right_slow
        - rotate_right_fast
      sequence:
      - choose:
        - conditions:
          - condition: numeric_state
            entity_id: light.group_hotbox_lights
            attribute: brightness
            enabled: true
            above: 254
          sequence:
          - variables:
              lights_saturated: "{{ expand('light.group_hotbox_lights')    | selectattr('attributes.hs_color',
                'defined') | map(attribute='entity_id') | list }} \n"
          - repeat:
              for_each: '{{lights_saturated}}'
              sequence:
              - action: light.turn_on
                metadata: {}
                data:
                  hs_color: '{% set sat = ((state_attr(repeat.item,''hs_color'') ).1
                    - 7) %}

                    {{[state_attr(repeat.item,''hs_color'').0] +  [([0, sat, 100]|sort)[1]]
                    }}

                    '
                  transition: 1
                target:
                  entity_id: '{{ repeat.item }}

                    '
        default:
        - action: light.turn_on
          metadata: {}
          data:
            brightness_step_pct: 10
            transition: 1
          target:
            entity_id: light.group_hotbox_lights
    - conditions:
      - condition: trigger
        id:
        - rotate_left_step
        - rotate_left_slow
        - brightness_step_down
        - rotate_left_fast
      sequence:
      - action: light.turn_on
        metadata: {}
        data:
          transition: 1
          brightness_step_pct: -15
        target:
          entity_id: light.group_hotbox_lights
    - conditions:
      - condition: trigger
        id:
        - dial_brightness_change
      sequence:
      - action: light.turn_on
        metadata: {}
        data:
          brightness: '{{ states(trigger.entity_id) }}

            '
        target:
          entity_id: light.group_hotbox_lights
  - delay:
      hours: 0
      minutes: 0
      seconds: 0
      milliseconds: 50
    enabled: false
  mode: single
