- id: '1766817510039'
  alias: Vibrating color effect automation
  description: Creates a vibrating color effect on all color-capable lights by oscillating
    each light's hue 25 degrees above and below its current value at a configurable
    speed, then restores adaptive lighting when turned off.
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.vibrating_colors_effect
    from:
    - 'off'
    - 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.trippy_warm_colors_effect
    state:
    - 'off'
  - condition: state
    entity_id: input_boolean.trippy_lights_effect
    state:
    - 'off'
  actions:
  - alias: Trippy Lights Effect Sequence
    sequence:
    - repeat:
        while:
        - condition: state
          entity_id: input_boolean.vibrating_colors_effect
          state:
          - 'on'
        sequence:
        - variables:
            lights: '{{ integration_entities(''group'')| select(''search'', ''light.group_all_lights'')   |
              expand | selectattr("attributes.hs_color", "defined") | selectattr("attributes.supported_features",
              ">", 33)| selectattr("attributes.color_mode", "eq", ''xy'') | selectattr("state",
              "eq", "on") | map(attribute=''entity_id'')  | list }}

              '
        - repeat:
            for_each: '{{lights}}'
            sequence:
            - sequence:
              - variables:
                  light_initial_hue: '{{ state_attr(repeat.item, ''hs_color'').0 }}

                    '
                  light_above_hue: "{% set number_positive = light_initial_hue + 25
                    %}\n  {% if number_positive > 360 %}\n    {% set number_positive
                    = (number - 360) %}\n  {% endif %}\n{{ number_positive | int }}\n"
                  light_below_hue: "{% set number_negative = light_initial_hue - 25
                    %}\n  {% if number_negative < 0 %}\n    {% set number_negative
                    = (number_negative | abs ) %}\n  {% endif %}\n{{ number_negative
                    | int }}\n"
              - action: light.turn_on
                metadata: {}
                data:
                  transition: '{{ states(''input_number.vibrating_color_effect_speed'')}}'
                  hs_color: '{{light_above_hue}},{{states(''input_number.vibrating_color_effect_saturation'')}}'
                target:
                  entity_id: '{{repeat.item}}'
              - delay: 00:00:{{ states('input_number.vibrating_color_effect_speed')
                  | int + 1}}
              - action: light.turn_on
                metadata: {}
                data:
                  transition: '{{ states(''input_number.vibrating_color_effect_speed'')
                    | int * 2}}'
                  hs_color: '{{light_below_hue}},{{states(''input_number.vibrating_color_effect_saturation'')}}'
                target:
                  entity_id: '{{repeat.item}}'
              - delay: 00:00:{{ states('input_number.vibrating_color_effect_speed')
                  | int * 2}}
              - action: light.turn_on
                metadata: {}
                data:
                  transition: '{{ states(''input_number.vibrating_color_effect_speed'')}}'
                  hs_color: '{{light_initial_hue}},{{states(''input_number.vibrating_color_effect_saturation'')}}'
                target:
                  entity_id: '{{repeat.item}}'
              - delay: 00:00:{{ states('input_number.vibrating_color_effect_speed')
                  | int + 1}}
  - alias: Restore Lights Sequence
    sequence:
    - variables:
        lights: '{{ integration_entities(''group'')| select(''search'', ''light.group_all_lights'')   |
          expand | selectattr("attributes.hs_color", "defined") | selectattr("attributes.supported_features",
          ">", 33)| selectattr("attributes.color_mode", "eq", ''xy'') | selectattr("state",
          "eq", "on") | map(attribute=''entity_id'')  | list }}

          '
    - action: adaptive_lighting.apply
      metadata: {}
      data:
        lights: '{{ lights }}

          '
        transition: '3'
        adapt_brightness: true
        adapt_color: true
        turn_on_lights: true
  mode: restart
- id: '1767743397238'
  alias: Mute Bathroom Speaker Muzak v3
  description: Mutes the bathroom speaker when the bathroom door is open and no one
