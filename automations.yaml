- id: '1734911416848'
  alias: Mute bathroom speaker when door opens
  description: Mutes or lowers the bathroom speaker volume when the door opens, depending
    on whether the bathroom is occupied, to avoid disturbing other rooms.
  triggers:
  - entity_id:
    - binary_sensor.sensor_bathroom_door_contact
    to: 'on'
    from: 'off'
    trigger: state
    for:
      hours: 0
      minutes: 0
      seconds: 5
  conditions:
  - condition: state
    entity_id: binary_sensor.all_residents_sleeping
    state: 'off'
    enabled: false
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.group_bathroom_motion_occupancy
        state: 'off'
      sequence:
      - action: media_player.volume_mute
        metadata: {}
        data:
          is_volume_muted: true
        target:
          entity_id: media_player.mass_bathroom_vpe_speaker
    - conditions:
      - condition: state
        entity_id: binary_sensor.group_bathroom_motion_occupancy
        state: 'on'
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: sensor.active_chromecast_rooms
            state: '[]'
          sequence:
          - action: media_player.volume_set
            metadata: {}
            data:
              volume_level: 0.2
            target:
              entity_id: media_player.mass_bathroom_vpe_speaker
        - conditions:
          - condition: not
            conditions:
            - condition: state
              entity_id: sensor.active_chromecast_rooms
              state: '[]'
            - condition: not
              conditions:
              - condition: state
                entity_id: sensor.active_speakers_rooms
                state: '[''bathroom'']'
          sequence:
          - action: media_player.volume_mute
            metadata: {}
            data:
              is_volume_muted: true
            target:
              entity_id: media_player.mass_bathroom_vpe_speaker
        default:
        - sequence:
          - alias: Wait until bathroom occupancy is off
            wait_for_trigger:
            - trigger: state
              entity_id:
              - binary_sensor.group_bathroom_motion_occupancy
              to:
              - 'off'
              from:
              - 'on'
              for:
                hours: 0
                minutes: 0
                seconds: 15
            continue_on_timeout: false
            timeout:
              hours: 1
              minutes: 10
              seconds: 0
              milliseconds: 0
          - action: media_player.volume_mute
            metadata: {}
            data:
              is_volume_muted: true
            target:
              entity_id: media_player.mass_bathroom_vpe_speaker
  mode: restart
