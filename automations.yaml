- id: '1774297006546'
  alias: ' Trippy Light Random Colors Effect automation (Script call)'
  description: Cycles all color-capable lights through random hues at a configurable
    speed and saturation while the trippy lights effect toggle is on, then restores
    adaptive lighting when turned off.
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.trippy_lights_effect
    from:
    - 'off'
    - 'on'
  - trigger: state
    entity_id:
    - input_number.trippy_lights_effect_speed
    for:
      hours: 0
      minutes: 0
      seconds: 2
  conditions:
  - condition: state
    entity_id: input_boolean.trippy_lights_effect
    state:
    - 'on'
  - condition: state
    entity_id: input_boolean.trippy_warm_colors_effect
    state:
    - 'off'
  actions:
  - alias: Trippy Lights Effect Sequence
    sequence:
    - repeat:
        while:
        - condition: state
          entity_id: input_boolean.trippy_lights_effect
          state:
          - 'on'
        sequence:
        - variables:
            lights: '{{ integration_entities(''group'')| select(''search'', ''light.group_all_lights'')   |
              expand | selectattr("attributes.hs_color", "defined") | selectattr("attributes.supported_features",
              ">", 33)| rejectattr("attributes.color_mode", "eq", ''color_temp'')
              | selectattr("state", "eq", "on") | map(attribute=''entity_id'')  |
              list }}

              '
        - repeat:
            for_each: '{{lights}}'
            sequence:
            - action: script.llm_random_dissimilar_colors_script
              metadata: {}
              data:
                saturation: '{{states(''input_number.trippy_lights_color_saturation'')}}'
                transition_speed: '{{ states(''input_number.trippy_lights_effect_speed'')}}'
                light:
                - '{{repeat.item}}'
            - action: light.turn_on
              metadata: {}
              data:
                transition: '{{ states(''input_number.trippy_lights_effect_speed'')}}'
                hs_color: '{{ range(0, 360) | random }},{{ states(''input_number.trippy_lights_color_saturation'')}}'
              target:
                entity_id: '{{repeat.item}}'
              enabled: false
        - delay: 00:00:{{ states('input_number.trippy_lights_effect_speed')}}
  - condition: state
    state:
    - 'off'
    entity_id: input_boolean.trippy_warm_colors_effect
  - alias: Restore Lights Sequence
    sequence:
    - variables:
        lights: '{{ integration_entities(''group'')| select(''search'', ''light.group_all_lights'')   |
          expand | selectattr("attributes.hs_color", "defined") | selectattr("attributes.supported_features",
          ">", 33)| rejectattr("attributes.color_mode", "eq", ''color_temp'') | selectattr("state",
          "eq", "on") | map(attribute=''entity_id'')  | list }}

          '
    - action: adaptive_lighting.apply
      metadata: {}
      data:
        lights: '{{ lights }}

          '
        transition: '3'
        adapt_brightness: true
        adapt_color: true
        turn_on_lights: true
  mode: restart
