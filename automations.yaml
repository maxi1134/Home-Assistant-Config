  description: Unmutes and adjusts the volume of Chromecasts in a room when no unmuted
    speakers are playing in the same room, ensuring at least one audio output is active
    when someone is present and no one is sleeping.
  triggers:
  - alias: Chromecasts
    entity_id:
    - media_player.universal_workshop_chromecast
    - media_player.universal_hotbox_top_chromecast
    - media_player.universal_patio_chromecast
    - media_player.universal_salon_chromecast
