    state: 'off'
  - condition: state
    entity_id: input_boolean.party_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.acid_time
    state: 'off'
  - condition: state
    entity_id: switch.adaptive_lighting_sleep_mode_adaptive_lighting
    state: 'on'
  actions:
  - metadata: {}
    data:
      transition: 60
    action: light.turn_off
    target:
      area_id: '{{ area_id(trigger.entity_id) }}'
