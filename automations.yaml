  description: Prepares the bedroom for sleep by turning off the tablet, fading out
    all lights, playing thunderstorm sounds on the bedroom speaker, turning off the
    TV, and disabling the voice assistant LED ring.
  triggers:
  - entity_id:
    - input_boolean.sleeper_in_bedroom
    to: 'on'
    from: 'off'
    trigger: state
  conditions: []
  actions:
  - parallel:
    - action: switch.turn_off
      metadata: {}
      data: {}
      target:
        entity_id:
        - switch.bedroom_tablet_screen
        - switch.bedroom_tablet_motion_detection
    - action: light.turn_off
      metadata: {}
      data:
        transition: 10
      target:
        area_id: bedroom
    - action: light.turn_off
      metadata: {}
      data: {}
      target:
        entity_id: light.home_assistant_voice_09e4a7_led_ring
    - if:
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ ''thunderstorm'' not in (state_attr(''media_player.mass_bedroom_wiim_speaker'',''media_title'')
            | default('''', true)) }}

            '
        - condition: not
          conditions:
          - condition: state
            entity_id: media_player.mass_bedroom_wiim_speaker
            state:
            - playing
      then:
      - action: media_player.unjoin
        metadata: {}
        data: {}
        target:
          entity_id: media_player.mass_bedroom_wiim_speaker
        continue_on_error: true
      - delay:
          hours: 0
          minutes: 0
          seconds: 1
          milliseconds: 0
      - action: media_player.volume_set
