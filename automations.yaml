- id: merged_speaker_chromecast_mute
  alias: Speaker/Chromecast Mutual Mute Management
  description: Ensures that when both speakers and Chromecasts are active in the same
    room, only one device remains unmuted at a time. Muting occurs unconditionally
    upon playback start or state change; unmuting is triggered only when motion is
    detected and no active sleeper is present in the room, preventing audio conflicts
    and ensuring a consistent listening experience.
  triggers:
  - alias: Chromecasts → playing
    trigger: state
    id: cc_to_playing
    to: playing
    entity_id:
    - media_player.universal_workshop_chromecast
    - media_player.universal_hotbox_top_chromecast
    - media_player.universal_patio_chromecast
    - media_player.universal_salon_chromecast
    - media_player.universal_bedroom_chromecast
    - media_player.universal_kitchen_chromecast
    - media_player.universal_tablet_myriam_s8
  - alias: Chromecasts from off
    trigger: state
    id: cc_from_off
    from: 'off'
    entity_id:
    - media_player.universal_workshop_chromecast
    - media_player.universal_hotbox_top_chromecast
    - media_player.universal_patio_chromecast
    - media_player.universal_salon_chromecast
    - media_player.universal_bedroom_chromecast
  - alias: Chromecasts → idle
    trigger: state
    id: cc_to_idle
    to: idle
    entity_id:
    - media_player.universal_workshop_chromecast
    - media_player.universal_hotbox_top_chromecast
    - media_player.universal_patio_chromecast
    - media_player.universal_salon_chromecast
    - media_player.universal_bedroom_chromecast
  - alias: Chromecasts from playing (1 s)
    trigger: state
    id: cc_from_playing
    from:
    - playing
    for:
      hours: 0
      minutes: 0
      seconds: 1
    entity_id:
    - media_player.universal_workshop_chromecast
    - media_player.universal_patio_chromecast
    - media_player.universal_salon_chromecast
    - media_player.universal_bedroom_chromecast
    - media_player.universal_tablet_myriam_s8
  - alias: Chromecast mute status
    trigger: state
    id: cc_mute_status
    attribute: is_volume_muted
    entity_id:
    - media_player.universal_workshop_chromecast
    - media_player.universal_hotbox_top_chromecast
    - media_player.universal_patio_chromecast
    - media_player.universal_salon_chromecast
    - media_player.universal_bedroom_chromecast
    - media_player.universal_kitchen_chromecast
  - alias: Speakers → playing (1 s)
    trigger: state
    id: spk_to_playing
    to:
    - playing
    for:
      hours: 0
      minutes: 0
      seconds: 1
    entity_id:
    - media_player.mass_workshop_wiim_speaker
    - media_player.mass_salon_wiim_speaker
    - media_player.mass_bedroom_wiim_speaker
    - media_player.mass_kitchen_wiim_speaker
  - alias: Speakers from playing (1 s)
    trigger: state
    id: spk_from_playing
    from:
    - playing
    for:
      hours: 0
      minutes: 0
      seconds: 1
    entity_id:
    - media_player.mass_workshop_wiim_speaker
    - media_player.mass_salon_wiim_speaker
    - media_player.mass_bedroom_wiim_speaker
  - alias: Speakers mute status (1 s)
    trigger: state
    id: spk_mute_status
    attribute: is_volume_muted
    for:
      seconds: 1
    entity_id:
    - media_player.mass_workshop_wiim_speaker
    - media_player.mass_salon_wiim_speaker
    - media_player.mass_bedroom_wiim_speaker
  conditions:
  - condition: template
    value_template: '{{ trigger.to_state.state != ''unavailable'' }}'
  actions:
  - if:
    - condition: template
      value_template: '{{ trigger.id in [''cc_to_playing'', ''spk_to_playing'', ''cc_mute_status'']
        }}

        '
    then:
    - variables:
        playing_speakers: "{{ [area_id(trigger.entity_id)]\n  | map('area_entities')\n
          \ | sum(start=[])\n  | select('search', 'speakers')\n  | select('is_state',
          'playing')\n  | unique\n  | list }}\n"
        unmuted_player_chromecasts: "{{ [area_id(trigger.entity_id)]\n  | map('area_entities')\n
          \ | sum(start=[])\n  | select('search', 'chromecast')\n  | select('search',
          'universal')\n  | expand\n  | rejectattr('state', 'eq', 'off')\n  | rejectattr('state',
          'eq', 'unavailable')\n  | selectattr('attributes.is_volume_muted', 'eq',
          false)\n  | map(attribute='entity_id')\n  | unique\n  | list }}\n"
    - if:
      - condition: template
        value_template: '{{ unmuted_player_chromecasts != [] }}'
      then:
      - action: media_player.volume_mute
        data:
          is_volume_muted: true
        target:
          entity_id: '{{ playing_speakers | list }}'
  - if:
    - condition: template
      value_template: "{{ trigger.id in ['cc_to_playing', 'spk_to_playing', 'spk_mute_status']\n
        \  and (trigger.id != 'spk_mute_status'\n        or trigger.to_state.attributes.is_volume_muted
        == false) }}\n"
    then:
    - variables:
        unmuted_playing_speakers: "{{ [area_id(trigger.entity_id)]\n  | map('area_entities')\n
          \ | sum(start=[])\n  | select('search', 'speakers')\n  | select('is_state',
          'playing')\n  | expand\n  | selectattr('attributes.is_volume_muted', 'eq',
          false)\n  | map(attribute='entity_id')\n  | unique\n  | list }}\n"
        player_chromecasts: "{{ [area_id(trigger.entity_id)]\n  | map('area_entities')\n
          \ | sum(start=[])\n  | select('search', 'chromecast')\n  | select('search',
          'universal')\n  | unique\n  | list }}\n"
    - if:
      - condition: template
        value_template: '{{ unmuted_playing_speakers != [] }}'
      then:
      - action: media_player.volume_mute
        data:
          is_volume_muted: true
        target:
          entity_id: '{{ player_chromecasts | list }}'
  - if:
    - condition: template
      value_template: "{{ trigger.id in ['cc_from_off', 'spk_mute_status',\n                  'spk_from_playing',
        'cc_to_playing', 'cc_to_idle'] }}\n"
    - alias: Time-gate for cc_to_playing / cc_to_idle (60 s)
      condition: template
      value_template: "{% if trigger.id in ['cc_to_playing', 'cc_to_idle'] %}\n  {{
        (now() - trigger.from_state.last_changed) > timedelta(seconds=60) }}\n{% elif
        trigger.id == 'spk_from_playing' %}\n  {{ trigger.to_state.state != 'unavailable'
        }}\n{% else %}\n  true\n{% endif %}\n"
    - alias: No sleeper present
      condition: template
      value_template: "{{ area_id(trigger.entity_id)\n   | replace('_top','') | replace('_down','')\n
        \  not in states('sensor.active_sleeper_rooms') | string }}\n"
    - alias: Motion present
      condition: template
      value_template: "{{ area_id(trigger.entity_id)\n   | replace('_top','') | replace('_down','')\n
        \  | lower in states('sensor.active_motion_rooms') | string | lower }}\n"
    then:
    - variables:
        unmuted_playing_speakers: "{{ [area_id(trigger.entity_id)]\n  | map('area_entities')\n
          \ | sum(start=[])\n  | select('search', 'speakers')\n  | select('search',
          'universal')\n  | select('is_state', 'playing')\n  | expand\n  | selectattr('attributes.is_volume_muted',
          'eq', false)\n  | map(attribute='entity_id')\n  | unique\n  | list }}\n"
        playing_chromecasts: "{{ [area_id(trigger.entity_id)]\n  | map('area_entities')\n
          \ | sum(start=[])\n  | select('search', 'chromecast')\n  | select('search',
          'universal')\n  | select('is_state', 'playing')\n  | unique\n  | list }}\n"
    - if:
      - condition: template
        value_template: '{{ unmuted_playing_speakers == [] }}'
      then:
      - action: media_player.volume_mute
        data:
          is_volume_muted: false
        target:
          entity_id: '{{ playing_chromecasts | list }}'
      - action: script.chromecast_automatic_volume_adjustment_script
        data:
          received_chromecast: '{{ playing_chromecasts | list }}'
  - if:
    - condition: template
      value_template: '{{ trigger.id in [''cc_from_playing'', ''spk_to_playing'',
        ''cc_mute_status''] }}

        '
    - alias: 600 s gate for spk_to_playing trigger
      condition: template
      value_template: "{% if trigger.id == 'spk_to_playing' %}\n  {{ (now() - trigger.from_state.last_changed)
        > timedelta(seconds=600) }}\n{% else %}\n  true\n{% endif %}\n"
    - alias: No sleeper present
      condition: template
      value_template: "{{ area_id(trigger.entity_id) | string | lower\n   not in states('sensor.active_sleeper_rooms')
        | string | lower }}\n"
    - alias: Motion present
      condition: template
      value_template: "{{ area_id(trigger.entity_id)\n   | replace('_top','') | replace('_down','')\n
        \  | lower in states('sensor.active_motion_rooms') | string | lower }}\n"
    then:
    - variables:
        playing_speakers: "{{ [area_id(trigger.entity_id)]\n  | map('area_entities')\n
          \ | sum(start=[])\n  | select('search', 'speakers')\n  | select('search',
          'universal')\n  | select('is_state', 'playing')\n  | unique\n  | list }}\n"
        unmuted_player_chromecasts: "{{ [area_id(trigger.entity_id)]\n  | map('area_entities')\n
          \ | sum(start=[])\n  | select('search', 'chromecast')\n  | select('search',
          'universal')\n  | select('is_state', 'playing')\n  | expand\n  | selectattr('attributes.is_volume_muted',
          'eq', false)\n  | map(attribute='entity_id')\n  | unique\n  | list }}\n"
    - if:
      - condition: template
        value_template: '{{ unmuted_player_chromecasts == [] }}'
      then:
      - action: media_player.volume_mute
        data:
          is_volume_muted: false
        target:
          entity_id: '{{ playing_speakers | list }}'
  mode: restart
