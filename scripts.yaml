chromecast_automatic_volume_adjustment_script:
  sequence:
  - variables:
      chromecast_id: '{{ received_chromecast }}

        '
  - alias: Set volume then mute if empty
    sequence:
    - choose:
      - conditions:
        - condition: time
          after: 08:45:00
          before: '11:30:00'
          weekday:
          - fri
          - thu
          - wed
          - tue
          - mon
          - sat
          - sun
        sequence:
        - metadata: {}
          data:
            volume_level: 0.6
          target:
            entity_id: '{{chromecast_id}}'
          enabled: true
          action: media_player.volume_set
        - metadata: {}
          data:
            is_volume_muted: false
          target:
            entity_id: '{{chromecast_id}}'
          alias: Unmute speaker
          action: media_player.volume_mute
      - conditions:
        - condition: time
          after: '11:30:00'
          before: '21:30:00'
          weekday:
          - fri
          - thu
          - wed
          - tue
          - mon
          - sun
          - sat
        sequence:
        - metadata: {}
          data:
            volume_level: 0.9
          target:
            entity_id: '{{chromecast_id}}'
          enabled: true
          action: media_player.volume_set
        - metadata: {}
          data:
            is_volume_muted: false
          target:
            entity_id: '{{chromecast_id}}'
          alias: Unmute speaker
          action: media_player.volume_mute
      - conditions:
        - condition: time
          after: '21:30:00'
          before: '23:30:00'
          weekday:
          - fri
          - thu
          - wed
          - tue
          - mon
          - sun
          - sat
        sequence:
        - metadata: {}
          data:
            volume_level: 0.65
          target:
            entity_id: '{{chromecast_id}}'
          enabled: true
          action: media_player.volume_set
        - metadata: {}
          data:
            is_volume_muted: false
          target:
            entity_id: '{{chromecast_id}}'
          alias: Unmute speaker
          action: media_player.volume_mute
      - conditions:
        - condition: time
          after: '23:30:00'
          before: 01:00:00
          weekday:
          - fri
          - thu
          - wed
          - tue
          - mon
          - sun
          - sat
        sequence:
        - metadata: {}
          data:
            volume_level: 0.55
          target:
            entity_id: '{{chromecast_id}}'
          enabled: true
          action: media_player.volume_set
        - metadata: {}
          data:
            is_volume_muted: false
          target:
            entity_id: '{{chromecast_id}}'
          alias: Unmute speaker
          action: media_player.volume_mute
      - conditions:
        - condition: time
          after: 01:00:00
          before: 03:00:00
          weekday:
          - fri
          - thu
          - wed
          - tue
          - mon
          - sun
          - sat
        sequence:
        - metadata: {}
          data:
            volume_level: 0.45
          target:
            entity_id: '{{chromecast_id}}'
          enabled: true
          action: media_player.volume_set
        - metadata: {}
          data:
            is_volume_muted: false
          target:
            entity_id: '{{chromecast_id}}'
          alias: Unmute speaker
          action: media_player.volume_mute
      - conditions:
        - condition: time
          after: 03:00:00
          before: 08:45:00
          weekday:
          - fri
          - thu
          - wed
          - tue
          - mon
          - sun
          - sat
        sequence:
        - metadata: {}
          data:
            volume_level: 0.35
          target:
            entity_id: '{{chromecast_id}}'
          enabled: true
          action: media_player.volume_set
        - metadata: {}
          data:
            is_volume_muted: false
          target:
            entity_id: '{{chromecast_id}}'
          alias: Unmute speaker
          action: media_player.volume_mute
      default:
      - metadata: {}
        data:
          volume_level: 0.5
        target:
          entity_id: '{{chromecast_id}}'
        enabled: true
        action: media_player.volume_set
      - metadata: {}
        data:
          is_volume_muted: false
        target:
          entity_id: '{{chromecast_id}}'
        alias: Unmute speaker
        action: media_player.volume_mute
    - alias: Mute if empty
      if:
      - alias: Is the speaker room occupied?
        condition: template
        value_template: '{{ area_id(chromecast_id ) | string | lower not in states(''sensor.active_motion_rooms'')
          | string | lower }}

          '
      - alias: Is the speaker room occupied?
        condition: template
        value_template: '{{ area_id(chromecast_id | first) | string | lower not in
          states(''sensor.active_motion_rooms'') | string | lower }}

          '
        enabled: false
      - condition: state
        entity_id: input_boolean.following_music
        state: 'on'
      then:
      - data:
          is_volume_muted: true
        target:
          entity_id: '{{chromecast_id}}'
        action: media_player.volume_mute
      enabled: true
  alias: Chromecast Automatic Volume Adjustment script
  description: This script will set the volume of the chromecast to a standard volume
    in relation to the time of the day
  mode: parallel
  max: 10
