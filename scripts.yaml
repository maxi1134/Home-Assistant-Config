generate_fake_white_colors:
  alias: Generate fake white colors
  description: Sets all turned-on lights across every light group to low-saturation
    warm hues, creating an effect that approximates white light using colored bulbs.
    Each light gets a random warm hue at 30% saturation, producing a "fake white"
    appearance.
  sequence:
  - variables:
      on_lights: "{% set ns = namespace(lights=[]) %} {% set groups = integration_entities('group')|
        \ select('search', '^light.')   | list %} {% for group in groups %}\n    {%
        set individual_lights = state_attr(group,'entity_id')%}\n    {% for individual_light
        in individual_lights %}\n    {% if \"group\" not in individual_light  and
        state_attr(individual_light, 'rgb_color') and states(individual_light) ==
        'on' %}\n      {% set ns.lights = ns.lights  + [individual_light] %}\n    {%
        endif %}\n    {% endfor %}    \n{% endfor %} {{  ns.lights  }}\n"
  - repeat:
      sequence:
      - service: light.turn_on
        metadata: {}
        data:
          hs_color: "{% set hue_under_20 = range(1, 20) | random | string + ',' +
            30 | string %} {% set hue_over_260 = range(260, 360) | random | string
            + ',' + 30 | string %} {% set random = range(1, 3) | random %}           {%
            if random == 1 %}\n {{hue_under_20 }}\n{% elif random > 1 %}           {{hue_over_260}}
            {%endif%}\n"
        target:
          entity_id: '{{on_lights[repeat.index - 1]}}'
      for_each: '{{ on_lights }}'
  mode: restart
  icon: mdi:sale
  fields: {}
in_home_defense_script:
  alias: All on defense script
  description: 'Activates a full home defense response: stops following music, triggers
    physical horns at front and back doors, plays a civil defense siren at maximum
    volume on all speakers, sends a security notification with the latest Frigate
    camera snapshot, and rings the phone. Automatically stops after occupancy clears
    for 3 minutes or after a 10-minute timeout.'
  sequence:
  - metadata: {}
    action: input_boolean.turn_off
    target:
      entity_id: input_boolean.following_music
    data: {}
    continue_on_error: true
  - metadata: {}
    data: {}
    target:
      entity_id:
      - switch.plug_back_door_horn
      - switch.plug_front_door_horn
    enabled: true
    action: switch.turn_on
    continue_on_error: true
  - action: media_player.volume_set
    metadata: {}
    data:
      volume_level: 1
    target:
      entity_id:
      - media_player.mass_bedroom_aux2_speaker
      - media_player.mass_hallway_wiim_speaker
      - media_player.mass_kitchen_wiim_speaker
      - media_player.mass_workshop_wiim_speaker
      - media_player.mass_salon_wiim_speaker
      - media_player.mass_lounge_wiim_speaker
      - media_player.mass_bathroom_vpe_speaker
      - media_player.group_mass_home_group_speakers
      - media_player.mass_closet_vpe_speaker
    continue_on_error: true
  - data:
      media:
        media_content_id: media-source://media_source/local/burglar_alarm.mp3
        media_content_type: music
        metadata: {}
      enqueue: replace
    action: media_player.play_media
    target:
      entity_id:
      - media_player.mass_bedroom_aux2_speaker
      - media_player.mass_hallway_wiim_speaker
      - media_player.mass_kitchen_wiim_speaker
      - media_player.mass_workshop_wiim_speaker
      - media_player.mass_salon_wiim_speaker
      - media_player.mass_lounge_wiim_speaker
      - media_player.mass_bathroom_vpe_speaker
      - media_player.group_mass_home_group_speakers
      - media_player.mass_closet_vpe_speaker
    continue_on_error: true
  - action: media_player.volume_set
    metadata: {}
    data:
      volume_level: 1
    target:
      entity_id:
      - media_player.mass_bedroom_aux2_speaker
      - media_player.mass_hallway_wiim_speaker
      - media_player.mass_kitchen_wiim_speaker
      - media_player.mass_workshop_wiim_speaker
      - media_player.mass_salon_wiim_speaker
      - media_player.mass_lounge_wiim_speaker
      - media_player.mass_bathroom_vpe_speaker
      - media_player.mass_closet_vpe_speaker
    continue_on_error: true
  - repeat:
      count: 10
      sequence:
      - action: media_player.volume_up
        metadata: {}
        data: {}
        target:
          entity_id:
          - media_player.mass_bedroom_aux2_speaker
          - media_player.mass_hallway_wiim_speaker
          - media_player.mass_kitchen_wiim_speaker
          - media_player.mass_workshop_wiim_speaker
          - media_player.mass_salon_wiim_speaker
          - media_player.mass_lounge_wiim_speaker
          - media_player.mass_bathroom_vpe_speaker
          - media_player.mass_closet_vpe_speaker
        continue_on_error: true
    continue_on_error: true
  - metadata: {}
    data:
      message: 'The all on script has been turned on. '
      title: Intruder Alert
      data:
        image: https://hass.purgatoire.ca/api/frigate/notifications/{{states("sensor.latest_frigate_event_id")}}/snapshot.jpg
        ttl: 0
        priority: high
        channel: security_alerts_notifications
    action: notify.users_notification_group
    continue_on_error: true
  - action: script.find_phone
    metadata: {}
    data: {}
    continue_on_error: true
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.group_security_occupancy_sensors
        state:
        - 'on'
      sequence:
      - wait_for_trigger:
        - entity_id:
          - binary_sensor.group_security_occupancy_sensors
          to:
          - 'off'
          for:
            hours: 0
            minutes: 3
            seconds: 0
          trigger: state
        timeout:
          hours: 0
          minutes: 10
          seconds: 0
          milliseconds: 0
        continue_on_timeout: true
        continue_on_error: true
      - action: media_player.media_stop
        metadata: {}
        data: {}
        target:
          entity_id:
          - media_player.mass_bedroom_aux2_speaker
          - media_player.mass_hallway_wiim_speaker
          - media_player.mass_kitchen_wiim_speaker
          - media_player.mass_workshop_wiim_speaker
          - media_player.mass_salon_wiim_speaker
          - media_player.mass_lounge_wiim_speaker
          - media_player.mass_bathroom_vpe_speaker
          - media_player.group_mass_home_group_speakers
        continue_on_error: true
      - metadata: {}
        action: input_boolean.turn_on
        target:
          entity_id: input_boolean.following_music
