apply_random_existing_effect_to_a_light_entity:
  alias: Apply random existing effect to a light entity
  description: Applies a random effect to lights, ensuring the new effect is different
    from the current one.
  fields:
    light:
      name: light
      description: The light entity (or entities) to apply a random effect to.
      required: true
      selector:
        entity:
          multiple: true
          filter:
            domain: light
  sequence:
  - repeat:
      for_each: '{{ light }}'
      sequence:
      - variables:
          current_eff: '{{ state_attr(repeat.item, ''effect'') | default('''', true)
            }}'
          all_effs: '{{ state_attr(repeat.item, ''effect_list'') | default([], true)
            }}'
          filtered_effs: '{{ all_effs | reject(''eq'', current_eff) | list }}'
      - action: light.turn_on
        target:
          entity_id: '{{ repeat.item }}'
        data:
          effect: "{% if filtered_effs | count > 0 %}\n  {{ filtered_effs | random
            }}\n{% else %}\n  {{ all_effs | random }}\n{% endif %}\n"
