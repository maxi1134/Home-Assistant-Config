  - action: input_boolean.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.following_music
    continue_on_error: true
  mode: restart
  description: Activates an indoor-only defense response by stopping music playback,
    clearing playlists, and playing a burglar alarm sound at maximum volume on all
    home speakers. Waits up to 40 minutes for security occupancy sensors to clear
    for 5 minutes before stopping the alarm and restoring normal music following behavior.
start_plex_media_on_requested_player:
  alias: Start plex media on requested player
  sequence:
  - variables:
      chromecasts: '{{integration_entities(''cast'')  |  select(''search'', ''chromecast'')
        | list}}

        '
  - repeat:
      sequence:
      - if:
        - condition: template
          value_template: '{{states(chromecasts[repeat.index ]) == "off"}}'
        then:
        - variables:
            playlist: 'plex://{"playlist_name":"{{requested_playlist}}","shuffle":"1"}

              '
        - service: media_player.play_media
          data:
            media_content_id: '{{playlist}}'
            media_content_type: playlist
          target:
            entity_id: '{{chromecasts[repeat.index]}}'
        - delay:
            hours: 0
            minutes: 0
            seconds: 15
            milliseconds: 0
      for_each: '{{ chromecasts }}'
