        %} {% set diff = (random_hue - current_hue) | abs %} {% if diff > buffer and
        diff < (360 - buffer) %}\n  {{ random_hue }}\n{% else %}\n  {{ (random_hue
        + 180) % 360 }}\n{% endif %}\n"
  - action: light.turn_on
