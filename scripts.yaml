changes_selected_light_group_to_single_warm_colors:
  sequence:
  - variables:
      on_lights: "{% set ns = namespace()  %}  \n{% set ns.entity_ids = [] %}  \n{%
        if area %}  \n{% for a in area %}  \n{% set ns.entity_ids = [a] | map('area_entities')\n
        \ | sum(start=[])\n  | select('search', 'group_')\n  | select('search', '_lights')\n
        \ | reject('search', 'decorative')\n  | reject('search', 'main')\n  | list
        + ns.entity_ids %} \n {% endfor %}\n{% else %}  {%- set lights = states.light
        | selectattr('entity_id', 'in', \nstate_attr(selected_group, 'entity_id'))
        \ | list -%}\n\n{%- set ns.entity_ids = lights | map(attribute='entity_id')
        | list -%}    \n\n {% endif %}\n {{ ns.entity_ids | expand |  map(attribute='entity_id')
        \ | list }}\n"
  - repeat:
      sequence:
      - metadata: {}
        data:
          hs_color: "{% set hue_under_20 = range(1, 20) | random | string + ',' +
            100 | string %} {% set hue_over_260 = range(260, 360) | random | string
            + ',' + 100 | string %} {% set random = range(1, 3) | random %}           {%
            if random == 1 %}\n {{hue_under_20 }}\n{% elif random > 1 %}           {{hue_over_260}}
            {%endif%}\n"
          transition: 1
        target:
          entity_id: '{{on_lights[repeat.index - 1]}}'
        action: light.turn_on
      for_each: '{{ on_lights }}'
  - set_conversation_response: Lights changed to warm colors!
  alias: 'Changes selected light group to single warm colors '
  mode: restart
  icon: mdi:sale
  fields:
    selected_group:
      selector:
        entity:
          multiple: false
      default: light.group_all_inside_lights
      required: true
      name: The group of lights to change to warm colors
      description: This field should contain a group light entity; The group will
        be expanded and each light will be attributed a random warm color. The format
        of the requested group should be 'light.group_REQUEST_lights'; such as 'light.group_salon_lights'
        where the requested room is preceded by 'light.group' and followed by 'lights'
        with an s
  description: This script can be used by the LLM to set a specific group of lights
    to random warm colors
start_a_random_maxi_playlist:
  sequence:
  - variables:
      maxi_playlists:
      - Maxi's Smart Playlist
      home_group: media_player.group_mass_home_group_speakers
      requested_playlist: '{% if requested_playlist is defined and requested_playlist
        | string | trim -%} {{- requested_playlist | string | trim -}} {%- else -%}
        Maxi''s Smart Playlist {%- endif %}'
      home_group_members: "{% set want = ['salon', 'workshop', 'kitchen', 'lounge',
        'hallway'] -%} {% set ns = namespace(members=[]) -%} {% for aid in areas()
        -%}\n  {% if ((area_name(aid) or '') | lower) in want -%}\n    {% set ns.members
        = ns.members + (area_entities(aid) | select('search', 'media_player.mass.*_speaker')
        | list) -%}\n  {% endif -%}\n{% endfor -%} {{ ns.members | unique | list }}"
      players: "{% set ns = namespace(players=[]) -%} {% if player_entity is defined
        and player_entity is mapping and player_entity.entity_id is defined and player_entity.entity_id
        -%}\n  {% if player_entity.entity_id is string -%}\n    {% set ns.players
        = [player_entity.entity_id | trim] -%}\n  {% else -%}\n    {% set ns.players
        = player_entity.entity_id | map('trim') | list -%}\n  {% endif -%}\n{% elif
        player_entity is defined and player_entity is string and player_entity | trim
        and '{}' not in player_entity -%}\n  {% set ns.players = [player_entity |
        trim] -%}\n{% elif area is defined and area -%}\n  {% set areas = area if
        (area is iterable and area is not string) else [area] -%}\n  {% for a in areas
        -%}\n    {% set ns.players = ns.players + (area_entities(a) | select('search',
        'media_player.mass.*_speaker') | list) -%}\n  {% endfor -%}\n{% endif -%}
        {% set valid = states.media_player | map(attribute='entity_id') | list -%}
        {% set ns.players = ns.players | select('in', valid) | unique | list -%} {%
        if ns.players | length == 0 -%}\n  {% set ns.players = [home_group] -%}\n{%
        endif -%} {{ ns.players }}"
      leader: '{{ players | first }}'
      followers: '{{ players[1:] }}'
  - if:
    - condition: template
      value_template: '{{ leader != home_group }}'
    then:
    - action: media_player.unjoin
      target:
        entity_id: '{{ players }}'
    - delay:
        seconds: 1
  - if:
    - condition: template
      value_template: '{{ leader == home_group and home_group_members | length > 0
        }}'
    then:
    - action: media_player.media_stop
      target:
        entity_id: '{{ home_group_members }}'
    - delay:
        seconds: 1
    - action: media_player.join
      target:
        entity_id: '{{ home_group }}'
      data:
        group_members: '{{ home_group_members }}'
    - delay:
        seconds: 2
  - if:
    - condition: template
      value_template: '{{ players | length > 1 }}'
    then:
    - action: media_player.join
      target:
        entity_id: '{{ leader }}'
      data:
        group_members: '{{ followers }}'
    - delay:
        seconds: 1
  - action: media_player.shuffle_set
    metadata: {}
    data:
      shuffle: true
    target:
      entity_id: '{{ leader }}'
  - target:
      entity_id: '{{ leader }}'
    data:
      media:
        media_content_id: '{% if requested_playlist != ''none'' -%} {{- requested_playlist
          -}} {%- else -%} {{- maxi_playlists | random -}} {%- endif %}'
        media_content_type: playlist
        metadata: {}
    action: media_player.play_media
  fields:
    player_entity:
      selector:
        target: {}
      name: Player entity
      description: The player(s) to play music on. Accepts one or more media players.
        The first one becomes the group leader.
      default:
        entity_id: media_player.group_mass_home_group_speakers
      required: false
    requested_playlist:
      selector:
        text:
      name: Requested Playlist
      description: Use this if a specific playlist is requested
      default: none
    area:
      selector:
        area:
          entity:
            integration: music_assistant
            domain: media_player
          multiple: true
      name: Area
      description: The area or areas for which the music is requested. If the request
        does not mention a target (either an area or a player), use the area the request
        comes from. If the area can not be determined from the request, or the device
        the request comes from, do not use this parameter. Only use both the "area"
        parameter and the "media_player" parameter together if both are specifically
        used in the request.
  alias: Start a random maxi playlist
  description: Starts music playback on one or more players or areas. Plays a specifically
    requested playlist or randomly selects from a curated list of Maxi's favorite
    playlists. Detaches the target player(s) from the home group, and when multiple
    are requested groups them under the first one. When the home group is the target,
    rebuilds its membership (Salon, Workshop, Kitchen, Lounge, Hallway) first so it
    is never empty. Enables shuffle mode.
  mode: restart
change_received_lights_to_random_pastel_colors:
  sequence:
  - variables:
      lights: '[{{selected_group}}]

        '
      saturation: '{{ saturation }}

        '
  - repeat:
      sequence:
      - metadata: {}
        data:
          hs_color: '{{ range(1, 360) | random | string + '','' + 30 | string }}'
        target:
          entity_id: '{{repeat.item}}'
        action: light.turn_on
      for_each: '{{ lights }}'
  alias: Change received lights to random pastel colors
  mode: parallel
  icon: mdi:sale
  fields: {}
  description: Changes the lights in a specified group to random pastel colors by
    setting each light to a random hue with low saturation (30%), producing soft,
    muted tones suitable for a gentle ambient effect.
  max: 10
changes_selected_lights_to_warm_pale_colors:
  sequence:
  - variables:
      lights: "{% set ns = namespace()  %}   {% set ns.entity_ids = [] %}   {% if
        area %}   {% for a in area %}   {% set ns.entity_ids = [a] | map('area_entities')\n
        \ | sum(start=[])\n  | select('search', 'group_')\n  | select('search', '_lights')\n
        \ | reject('search', 'decorative')\n  | reject('search', 'main')\n  | list
        + ns.entity_ids %} \n {% endfor %}\n{% else %}  {%- set lights = states.light
        | selectattr('entity_id', 'in',  state_attr(selected_group, 'entity_id'))
        \ | list -%}\n{%- set ns.entity_ids = lights | map(attribute='entity_id')
        | list -%}    \n\n {% endif %}\n {{ ns.entity_ids | expand |  map(attribute='entity_id')
        \ | list }}"
  - repeat:
      sequence:
      - metadata: {}
        data:
          hs_color: "{% set hue_under_20 = range(1, 20) | random | string + ',' +
            55 | string %} {% set hue_over_260 = range(260, 360) | random | string
            + ',' + 55 | string %} {% set random = range(1, 3) | random %}           {%
            if random == 1 %}\n {{hue_under_20 }}\n{% elif random > 1 %}           {{hue_over_260}}
            {%endif%}\n"
          transition: 1
        target:
          entity_id: '{{lights[repeat.index - 1]}}'
        action: light.turn_on
      for_each: '{{ lights }}'
  alias: Change lights in an area to warm pale colors
  mode: parallel
  icon: mdi:heat-wave
  fields:
    area:
      selector:
        area:
          entity:
            integration: group
            domain: light
          multiple: true
      name: Area
      description: 'The area or areas for which the music is requested. If the request
        does not mention a target (either an area or a player), use the area the request
        comes from.

        If the area can not be determined from the request, or the device the request
        comes from, do not use this parameter.

        Only use both the "area" parameter'
  description: This script allows the LLM to change the lights within an area to warm
    pale colors. Sometimes also referred to as warm pastel colors.
  max: 10
change_lights_in_an_area_to_a_random_fake_white:
  sequence:
  - variables:
      lights: "{% set temp_light = area\n  | map('area_entities')\n  | sum(start=[])\n
        \ | select('search', 'group_')\n  | select('search', '_lights')\n  | reject('search',
        'decorative')\n  | reject('search', 'main')\n  | first | string %}\n{% set
        selected_group = temp_light %} {%- set light_group = states.light | selectattr('entity_id',
        'in', state_attr(selected_group, 'entity_id'))  | list -%} {%- set num_lights
        = light_group | count -%} {%- set h_increment = (360 // num_lights) | int
        -%} {%- set hue_values = namespace(values=[]) %} {%- for i in range(num_lights)
        %}\n  {%- set hue_values.values = hue_values.values + [i * h_increment] %}\n{%-
        endfor %} {%- set ns = namespace(output=[], shuffled_hues=[]) %} {%- for i
        in range(num_lights) %}\n  {%- set rand = (range(hue_values.values | count)
        | random) -%}\n  {%- set h = hue_values.values[rand] -%}\n  {%- set hue_values.values
        = hue_values.values | reject('equalto', h) | list -%}\n  {%- set ns.shuffled_hues
        = ns.shuffled_hues + [h] -%}\n{%- endfor %} {%- for i in range(num_lights)
        %}\n  {%- set light = light_group[i] -%}\n  {%- set h = ns.shuffled_hues[i]
        -%}\n  {%- set s = 100 -%}\n  {%- set hs_color = [h, s] -%}\n  {% set temp_output
        = {\n    \"entity_id\": light.entity_id,\n    \"hs_color\": hs_color\n  }
        %}\n  {% set ns.output = ns.output + [temp_output] %}\n{%- endfor %} {{ ns.output
        }}"
  - repeat:
      sequence:
      - metadata: {}
        data:
          hs_color: "{% set hue_under_20 = range(1, 20) | random | string + ',' +
            55 | string %} {% set hue_over_260 = range(260, 360) | random | string
            + ',' + 55 | string %} {% set random = range(1, 3) | random %}           {%
            if random == 1 %}\n {{hue_under_20 }}\n{% elif random > 1 %}           {{hue_over_260}}
            {%endif%}\n"
          transition: 1
        target:
          entity_id: '{{repeat.item.entity_id}}'
        action: light.turn_on
      for_each: '{{ lights }}'
  alias: Change lights in an area to a random fake white
  mode: parallel
  icon: mdi:white-balance-auto
  fields:
    area:
      selector:
        area:
          entity:
            integration: group
            domain: light
          multiple: true
  description: This script allows the LLM to change the lights within an area to a
    'random fake white' where all colors somewhat equate to white not having a single
    white bulb present
  max: 10
stream_a_specific_security_camera_on_a_specific_tv_chromecast:
  sequence:
  - variables:
      camera: '{{ camera }}

        '
      tv_chromecast: '{{ tv | lower | replace(''universal_'','''') | replace('' '',''_'')
        | replace(''tv'',''chromecast'') | lower }}

        '
      url: 'http://192.168.0.11:1984/stream.html?{% for c in camera %}src={{ state_attr(c,''camera_name'')}}_sub&{%endfor%}

        '
  - if:
    - condition: template
      value_template: '{{ state_attr(tv_chromecast,''app_name'') | lower == ''dashcast''
        }}'
    then:
    - action: media_player.turn_off
      metadata: {}
      data: {}
      target:
        entity_id: '{{tv_chromecast}}'
  - action: dash_cast.load_url
    metadata: {}
    data:
      force: true
      reload_seconds: 0
      url: '{{ url }}'
      entity_id: '{{ tv_chromecast | replace (''universal_'','''') }}'
  fields:
    camera:
      selector:
        entity:
          integration: frigate
          domain: camera
          multiple: true
      name: camera
      description: This field should contain the entity_id of one or multiple cameras.
        An example of such an entity id is 'camera.back_door_camera'
      required: true
      default:
      - camera.back_door_camera
    tv:
      selector:
        entity:
          integration: cast
          domain: media_player
      name: tv
      description: The chromecast or TV where the stream should be sent. This should
        be an entity id starting by 'media_player.' Furthermore, do not use the 'universal'
        media player. This one should be ignored for this script.
      required: true
  alias: Stream a security camera on a Chromecast
  description: This script allows the LLM to start the stream for a security camera
    on a specific chromecast
quickbars_display_notification:
  alias: QuickBars - Show Front door Camera on TVs
  use_blueprint:
    path: Trooped/notification.yaml
    input:
      message: ' Someone is at the door'
      image_url: /api/camera_proxy/camera.front_door_camera
      transparency: 0
      interrupt: true
      length: 120
      sound_url: /config/www/sounds/ding-dong.mp3
      sound_volume_percent: 32
      action_1_id: unlock_door
      action_1_label: Unlock the door
      action_1_action:
      - sequence:
        - action: lock.unlock
          metadata: {}
          data: {}
          target:
            entity_id: lock.lock_front_door
        - wait_for_trigger:
          - trigger: state
            entity_id:
            - lock.lock_front_door
            from:
            to:
            - unlocked
          timeout:
            hours: 0
            minutes: 0
            seconds: 6
            milliseconds: 0
        - action: input_text.set_value
          metadata: {}
          data:
            value: Come in, It's unlocked!
          target:
            entity_id: input_text.front_door_phone_text
        - wait_for_trigger:
          - trigger: state
            entity_id:
            - lock.lock_front_door
            from:
            to:
            - locked
          timeout:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
        - action: input_text.set_value
          metadata: {}
          data:
            value: Empty
          target:
            entity_id: input_text.front_door_phone_text
  description: Displays a front door camera notification on all tablet kiosks using
    QuickBars blueprint, showing a camera feed with a doorbell sound and providing
    an action button to unlock the front door. After unlocking, it displays a welcome
    message and automatically clears it once the door is locked again.
trippy_lights_effect_script:
  sequence:
  - variables:
      lights: '{{ integration_entities(''group'')|  select(''search'', ''light.group_all_lights'')   |
        expand | selectattr("attributes.hs_color", "defined") |  selectattr("state",
        "eq", "on") | map(attribute=''entity_id'')  | list }}

        '
  - repeat:
      while:
      - condition: state
        entity_id: input_boolean.trippy_lights_effect
        state:
        - 'on'
      sequence:
      - repeat:
          for_each: '{{lights}}'
          sequence:
          - action: light.turn_on
            metadata: {}
            data:
              transition: '{{ states(''input_number.trippy_lights_effect_speed'')}}'
              hs_color: '{{ range(0, 360) | random }},{{ states(''input_number.trippy_lights_color_saturation'')}}'
            target:
              entity_id: '{{repeat.item}}'
      - delay: 00:00:{{ states('input_number.trippy_lights_effect_speed') | int}}
  - action: adaptive_lighting.apply
    metadata: {}
    data:
      lights: '{{ lights }}

        '
      transition: '3'
      adapt_brightness: true
      adapt_color: true
      turn_on_lights: true
  alias: Trippy Lights Effect script
  description: Continuously cycles all turned-on lights through random colors at a
    configurable speed and saturation while the trippy lights effect boolean is enabled.
    When the effect is disabled, it restores all affected lights to their adaptive
    lighting settings with a smooth 3-second transition.
