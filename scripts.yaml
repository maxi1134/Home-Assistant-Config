vibrate_one_light:
  alias: Vibrate one light
  description: Randomized shimmer around a light's resting hue, looping while input_boolean.vibrating_colors_effect
    is on AND the light is still on. Fanned out (one parallel instance per light)
    by the Vibrating color effect automation.
  mode: parallel
  max: 100
  icon: mdi:sine-wave
  fields:
    target_light:
      name: Target light
      required: true
      selector:
        entity:
          domain: light
  sequence:
  - variables:
      base_hue: '{{ state_attr(target_light, ''hs_color'')[0] if state_attr(target_light,
        ''hs_color'') else 0 }}'
  - delay:
      seconds: '{{ (range(0, ((states(''input_number.vibrating_color_effect_speed'')
        | float * 2) * 10) | int + 1) | random) / 10 }}'
  - repeat:
      while:
      - condition: state
        entity_id: input_boolean.vibrating_colors_effect
        state: 'on'
      - condition: template
        value_template: '{{ is_state(target_light, ''on'') }}'
      sequence:
      - variables:
          speed: '{{ states(''input_number.vibrating_color_effect_speed'') | float
            }}'
          sat: '{{ states(''input_number.vibrating_color_effect_saturation'') | int
            }}'
          offset: '{{ (range(12, 36) | random) * ([1, -1] | random) }}'
          target_hue: '{{ ((base_hue + offset) % 360) | int }}'
          move_time: '{{ ([0.5, speed * (range(60, 141) | random) / 100] | max) |
            round(1) }}'
          hold_time: '{{ ([0.4, speed * (range(70, 151) | random) / 100] | max) |
            round(1) }}'
      - action: light.turn_on
        target:
          entity_id: '{{ target_light }}'
        data:
          transition: '{{ move_time }}'
          hs_color:
          - '{{ target_hue }}'
          - '{{ sat }}'
      - delay:
          seconds: '{{ hold_time }}'
