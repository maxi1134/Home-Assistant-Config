broadcast_alert_in_the_house:
  alias: important broadcast alert in the house
  description: Orchestrator for important broadcast alerts. Captures chromecast state
    once, then dispatches each delivery channel (lights, TTS, audio URL, phone notifications,
    TV image/URL, chromecast pausing) to a dedicated `broadcast_alert_*` sub-script
    that runs in parallel. Supports Lylou-alone mode for hotbox-specific alerts.
  fields:
    color:
      description: Optional color name used to flash the notification lights.
      example: red
      required: false
      selector:
        text: {}
    message:
      description: Text-to-speech message to announce on speakers.
      required: false
      selector:
        text:
          multiline: true
    broadcast_url:
      description: Audio URL to broadcast on speakers via Music Assistant.
      required: false
      selector:
        text: {}
    phone_data:
      description: Data object forwarded to the user notify groups.
      required: false
      selector:
        object: {}
    image:
      description: Image URL to display on idle Chromecast TVs.
      required: false
      selector:
        text: {}
    url:
      description: Web URL to display on idle Chromecast TVs (takes priority over
        image).
      required: false
      selector:
        text: {}
  sequence:
  - alias: Capture chromecast state in a single pass
    variables:
      cast_entities: "{{ integration_entities('cast')\n   | select('search', 'chromecast')\n
        \  | expand | list }}"
      playing_chromecasts: "{{ cast_entities\n   | selectattr('state', 'eq', 'playing')\n
        \  | map(attribute='entity_id') | list }}"
      non_playing_chromecasts: "{{ cast_entities\n   | rejectattr('state', 'eq', 'playing')\n
        \  | map(attribute='entity_id') | list }}"
      lylou_alone: '{{ is_state(''binary_sensor.lylou_alone'', ''on'') }}'
      has_color: '{{ color is defined and color is not none and (color | string |
        trim) != '''' }}'
      has_message: '{{ message is defined and message is not none and (message | string
        | trim) != '''' }}'
      has_broadcast_url: '{{ broadcast_url is defined and broadcast_url is not none
        and (broadcast_url | string | trim) != '''' }}'
      has_phone_data: '{{ phone_data is defined and phone_data is not none }}'
      has_image: '{{ image is defined and image is not none and (image | string |
        trim) != '''' }}'
      has_url: '{{ url is defined and url is not none and (url | string | trim) !=
        '''' }}'
  - parallel:
    - alias: Flash hotbox lights (Lylou-alone mode)
      if:
      - condition: template
        value_template: '{{ lylou_alone and has_color }}'
      then:
      - action: script.broadcast_alert_flash_hotbox_lights
        data:
          color: '{{ color }}'
        continue_on_error: true
    - alias: Flash whole-house notification lights
      if:
      - condition: template
        value_template: '{{ has_color }}'
      then:
      - action: script.broadcast_alert_flash_notification_lights
        data:
          color: '{{ color }}'
        continue_on_error: true
    - alias: TTS announcement on speakers
      if:
      - condition: template
        value_template: '{{ has_message }}'
      - condition: state
        entity_id: input_boolean.party_mode
        state:
        - 'off'
      then:
      - action: script.broadcast_alert_tts_announce
        data:
          message: '{{ message }}'
        continue_on_error: true
    - alias: Audio URL broadcast on speakers
      if:
      - condition: template
        value_template: '{{ has_broadcast_url }}'
      - condition: state
        entity_id: input_boolean.party_mode
        state:
        - 'off'
      then:
      - action: script.broadcast_alert_play_audio_url
        data:
          broadcast_url: '{{ broadcast_url }}'
          include_hotbox: '{{ lylou_alone }}'
        continue_on_error: true
    - alias: Phone notifications
      if:
      - condition: template
        value_template: '{{ has_phone_data }}'
      then:
      - action: script.broadcast_alert_send_phone_notification
        data:
          phone_data: '{{ phone_data }}'
        continue_on_error: true
    - alias: TV display - image (only when url is not provided)
      if:
      - condition: template
        value_template: '{{ has_image and not has_url }}'
      - condition: state
        entity_id: input_boolean.party_mode
        state:
        - 'off'
        enabled: false
      then:
      - action: script.broadcast_alert_display_image_on_tvs
        data:
          image: '{{ image }}'
          non_playing_chromecasts: '{{ non_playing_chromecasts }}'
        continue_on_error: true
    - alias: TV display - URL
      if:
      - condition: template
        value_template: '{{ has_url }}'
      - condition: state
        entity_id: input_boolean.party_mode
        state:
        - 'off'
        enabled: false
      then:
      - action: script.broadcast_alert_display_url_on_tvs
        data:
          url: '{{ url }}'
          non_playing_chromecasts: '{{ non_playing_chromecasts }}'
        continue_on_error: true
    - alias: Pause playing chromecasts (skip during party mode)
      if:
      - condition: state
        entity_id: input_boolean.party_mode
        state: 'off'
      - condition: template
        value_template: '{{ playing_chromecasts | length > 0 }}'
      then:
      - action: script.broadcast_alert_pause_chromecasts
        data:
          playing_chromecasts: '{{ playing_chromecasts }}'
        continue_on_error: true
  - delay:
      seconds: 5
  mode: queued
  icon: mdi:speaker-message
  max: 5
broadcast_alert_flash_lights:
  alias: Broadcast alert - flash light group (internal impl)
  description: 'INTERNAL flash implementation. Snapshots every member of `light_group`,
    flashes them to `color`, then restores their captured state. Two concurrent calls
    with the same `light_group` will race: the second call can snapshot the first
    call''s flash color and persist it on restore. To stay race-safe, call this only
    via the queued per-group wrappers (`broadcast_alert_flash_hotbox_lights`, `broadcast_alert_flash_notification_lights`)
    -- the orchestrator does.'
  fields:
    light_group:
      description: Group light entity whose members will be flashed.
      required: true
      selector:
        entity:
          domain: light
    color:
      description: Color name to flash the lights to.
      required: true
      selector:
        text: {}
    duration_ms:
      description: How long to hold the flash colour before restoring (milliseconds).
      required: false
      default: 2250
      selector:
        number:
          min: 100
          max: 10000
          unit_of_measurement: ms
  sequence:
  - alias: Snapshot each member's on/off state and rgb_color
    variables:
      lights_state: "{%- set members = state_attr(light_group, 'entity_id') or []
        -%} {%- set ns = namespace(items=[]) -%} {%- for entity_id in members -%}\n
        \ {%- set s = states(entity_id) -%}\n  {%- if s != 'unavailable' -%}\n    {%-
        set rgb = state_attr(entity_id, 'rgb_color') -%}\n    {%- set rgb_list = (rgb
        | list) if rgb else [0, 0, 0] -%}\n    {%- set ns.items = ns.items + [{'entity_id':
        entity_id, 'rgb': rgb_list, 'state': s}] -%}\n  {%- endif -%}\n{%- endfor
        -%} {{ ns.items }}"
      light_ids: "{%- set members = state_attr(light_group, 'entity_id') or [] -%}
        \n{%- set ns  = namespace(items=[]) -%} {%- for entity_id in members -%}\n{%-
        set s = states(entity_id) -%}\n{%- if s != 'unavailable' -%}\n  {%- set rgb
        = state_attr(entity_id, 'rgb_color') -%}\n  {%- set rgb_list = (rgb | list)
        if rgb else [0, 0, 0] -%}\n  {%- set ns.items = ns.items +  [entity_id] -%}\n{%-
        endif -%}\n{%- endfor -%} {{ ns.items }}\n"
  - action: light.turn_on
    target:
      entity_id: '{{ light_ids }}'
    data:
      color_name: '{{ color }}'
    continue_on_error: true
  - alias: Flash all snapshotted lights to the requested colour
    repeat:
      for_each: '{{ lights_state }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: '{{ repeat.item.entity_id }}'
        data:
          color_name: '{{ color }}'
        continue_on_error: true
    enabled: false
  - delay:
      milliseconds: '{{ duration_ms | default(2250) | int }}'
  - alias: Restore each light to its captured state
    repeat:
      for_each: '{{ lights_state }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ repeat.item.state == ''on'' }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: '{{ repeat.item.entity_id }}'
            data:
              rgb_color: '{{ repeat.item.rgb }}'
            continue_on_error: true
        default:
        - action: light.turn_off
          target:
            entity_id: '{{ repeat.item.entity_id }}'
          continue_on_error: true
  mode: queued
  max: 3
  icon: mdi:lightbulb-alert
broadcast_alert_flash_hotbox_lights:
  alias: Broadcast alert - flash hotbox lights (queued)
  description: Queued wrapper around `broadcast_alert_flash_lights` for the hotbox
    group. Rapid calls serialize so each invocation always snapshots the real prior
    state (not another invocation's mid-flash colour). Other light groups are unaffected
    and can flash in parallel.
  fields:
    color:
      description: Color name to flash the hotbox lights to.
      required: true
      selector:
        text: {}
    duration_ms:
      description: How long to hold the flash colour before restoring (milliseconds).
      required: false
      default: 2250
      selector:
        number:
          min: 100
          max: 10000
          unit_of_measurement: ms
  sequence:
  - action: script.broadcast_alert_flash_lights
    data:
      light_group: light.group_hotbox_lights
      color: '{{ color }}'
      duration_ms: '{{ duration_ms | default(2250) | int }}'
  mode: queued
  max: 10
  icon: mdi:lightbulb-alert
broadcast_alert_flash_notification_lights:
  alias: Broadcast alert - flash notification lights (queued)
  description: Queued wrapper around `broadcast_alert_flash_lights` for the house-wide
    notification light group. Rapid calls serialize so each invocation always snapshots
    the real prior state (not another invocation's mid-flash colour). The hotbox wrapper
    has its own queue and can flash in parallel.
  fields:
    color:
      description: Color name to flash the notification lights to.
      required: true
      selector:
        text: {}
    duration_ms:
      selector:
        number:
          min: 100
          max: 10000
          unit_of_measurement: ms
      default: 1000
  sequence:
  - action: script.broadcast_alert_flash_lights
    data:
      light_group: light.group_notifications_light
      color: '{{ color }}'
      duration_ms: '{{ duration_ms | default(2250) | int }}'
  mode: queued
  max: 10
  icon: mdi:lightbulb-alert
broadcast_alert_tts_announce:
  alias: Broadcast alert - TTS announcement
  description: Speaks a TTS message via the Piper engine on the home speaker group,
    the bathroom speaker, and the bedroom speaker (skipped when someone is sleeping
    in the bedroom).
  fields:
    message:
      description: Text-to-speech message.
      required: true
      selector:
        text:
          multiline: true
  sequence:
  - parallel:
    - action: tts.speak
      target:
        entity_id: tts.piper_2
      data:
        cache: true
        media_player_entity_id: media_player.group_mass_home_group_speakers
        message: '{{ message }}'
      continue_on_error: true
    - action: tts.speak
      target:
        entity_id: tts.piper_2
      data:
        cache: true
        media_player_entity_id: media_player.mass_bathroom_vpe_speaker
        message: '{{ message }}'
      continue_on_error: true
    - if:
      - condition: state
        entity_id: input_boolean.sleeper_in_bedroom
        state: 'off'
      then:
      - action: tts.speak
        target:
          entity_id: tts.piper_2
        data:
          cache: true
          media_player_entity_id: media_player.mass_bedroom_aux2_speaker
          message: '{{ message }}'
        continue_on_error: true
  mode: parallel
  max: 10
  icon: mdi:bullhorn
broadcast_alert_play_audio_url:
  alias: Broadcast alert - play audio URL
  description: Plays an audio URL as a Music Assistant announcement on the home speaker
    group plus the bedroom, closet, and bathroom speakers. The hotbox speaker is also
    included when `include_hotbox` is true (Lylou-alone mode).
  fields:
    broadcast_url:
      description: Audio URL to play as an announcement.
      required: true
      selector:
        text: {}
    include_hotbox:
      description: Also announce on the hotbox speaker.
      required: false
      default: false
      selector:
        boolean: {}
    announce_volume:
      description: Announcement volume (Music Assistant scale).
      required: false
      default: 35
      selector:
        number:
          min: 1
          max: 100
  sequence:
  - parallel:
    - action: music_assistant.play_announcement
      data:
        url: '{{ broadcast_url }}'
        announce_volume: '{{ announce_volume | default(35) | int }}'
      target:
        entity_id: media_player.group_mass_home_group_speakers
      continue_on_error: true
    - action: music_assistant.play_announcement
      data:
        url: '{{ broadcast_url }}'
        announce_volume: '{{ announce_volume | default(35) | int }}'
      target:
        entity_id: media_player.mass_bedroom_aux2_speaker
      continue_on_error: true
    - action: music_assistant.play_announcement
      data:
        url: '{{ broadcast_url }}'
        announce_volume: '{{ announce_volume | default(35) | int }}'
      target:
        entity_id: media_player.mass_closet_wiim_speaker
      continue_on_error: true
    - action: music_assistant.play_announcement
      data:
        url: '{{ broadcast_url }}'
        announce_volume: '{{ announce_volume | default(35) | int }}'
      target:
        entity_id: media_player.mass_bathroom_vpe_speaker
      continue_on_error: true
    - if:
      - '{{ include_hotbox | default(false) | bool }}'
      then:
      - action: music_assistant.play_announcement
        data:
          url: '{{ broadcast_url }}'
          announce_volume: '{{ announce_volume | default(35) | int }}'
        target:
          entity_id: media_player.mass_hotbox_wiim_speaker
        continue_on_error: true
  mode: parallel
  max: 10
  icon: mdi:speaker-wireless
broadcast_alert_send_phone_notification:
  alias: Broadcast alert - send phone notification
  description: Forwards a notification payload to the users notification group.
  fields:
    phone_data:
      description: Notification data object (title, message, data, etc.).
      required: true
      selector:
        object: {}
  sequence:
  - action: notify.users_notification_group
    data: '{{ phone_data }}'
    continue_on_error: true
  mode: parallel
  max: 10
  icon: mdi:cellphone-message
broadcast_alert_display_image_on_tvs:
  alias: Broadcast alert - display image on idle TVs
  description: Casts a static image to all idle Chromecasts and the kitchen Google
    Hub. Waits until the front door is locked (already-locked is treated as success)
    before turning the casted TVs off, with a 3-minute safety timeout.
  fields:
    image:
      description: Image URL to cast.
      required: true
      selector:
        text: {}
    non_playing_chromecasts:
      description: Idle chromecasts to receive the image.
      required: true
      selector:
        object: {}
    lock_entity:
      description: Lock entity whose `locked` state ends the display.
      required: false
      default: lock.lock_front_door
      selector:
        entity:
          domain: lock
    hub_entity:
      description: Auxiliary screen (e.g. Google Hub) loaded via dash_cast.
      required: false
      default: media_player.kitchen_google_hub
      selector:
        entity:
          domain: media_player
    timeout_minutes:
      description: Max wait before forcing the display to stop.
      required: false
      default: 3
      selector:
        number:
          min: 1
          max: 10
  sequence:
  - alias: Cast the image to every idle chromecast in parallel
    repeat:
      for_each: '{{ non_playing_chromecasts }}'
      sequence:
      - action: media_player.play_media
        data:
          entity_id: '{{ repeat.item }}'
          media_content_id: '{{ image }}'
          media_content_type: image
        continue_on_error: true
  - alias: Mirror the image on the kitchen hub via dash_cast
    action: dash_cast.load_url
    data:
      force: false
      reload_seconds: 0
      entity_id: '{{ hub_entity | default(''media_player.kitchen_google_hub'') }}'
      url: '{{ image }}'
    continue_on_error: true
  - alias: Wait until the front door becomes (or already is) locked
    wait_template: '{{ is_state(lock_entity | default(''lock.lock_front_door''), ''locked'')
      }}'
    continue_on_timeout: true
    timeout:
      minutes: '{{ timeout_minutes | default(3) | int }}'
  - alias: Power off every chromecast we cast to
    repeat:
      for_each: '{{ non_playing_chromecasts }}'
      sequence:
      - action: media_player.turn_off
        target:
          entity_id: '{{ repeat.item }}'
        continue_on_error: true
  mode: parallel
  max: 5
  icon: mdi:image-broken-variant
broadcast_alert_display_url_on_tvs:
  alias: Broadcast alert - display URL on idle TVs
  description: Loads a URL via dash_cast on every idle Chromecast in parallel plus
    the kitchen Google Hub. Waits once for the front door to be locked (already-locked
    is treated as success) before powering the chromecasts off, with a 3-minute safety
    timeout.
  fields:
    url:
      description: Web URL to load on the TVs.
      required: true
      selector:
        text: {}
    non_playing_chromecasts:
      description: Idle chromecasts to load the URL on.
      required: true
      selector:
        object: {}
    lock_entity:
      description: Lock entity whose `locked` state ends the display.
      required: false
      default: lock.lock_front_door
      selector:
        entity:
          domain: lock
    hub_entity:
      description: Auxiliary screen (e.g. Google Hub) loaded via dash_cast.
      required: false
      default: media_player.kitchen_google_hub
      selector:
        entity:
          domain: media_player
    timeout_minutes:
      description: Max wait before forcing the display to stop.
      required: false
      default: 3
      selector:
        number:
          min: 1
          max: 10
  sequence:
  - alias: Load the URL on every idle chromecast in parallel
    repeat:
      for_each: '{{ non_playing_chromecasts }}'
      sequence:
      - action: dash_cast.load_url
        data:
          force: true
          reload_seconds: 0
          entity_id: '{{ repeat.item }}'
          url: '{{ url }}'
        continue_on_error: true
  - alias: Mirror the URL on the kitchen hub via dash_cast
    action: dash_cast.load_url
    data:
      force: true
      reload_seconds: 0
      entity_id: '{{ hub_entity | default(''media_player.kitchen_google_hub'') }}'
      url: '{{ url }}'
    continue_on_error: true
  - alias: Wait once for the front door to be (or already be) locked
    wait_template: '{{ is_state(lock_entity | default(''lock.lock_front_door''), ''locked'')
      }}'
    continue_on_timeout: true
    timeout:
      minutes: '{{ timeout_minutes | default(3) | int }}'
  - alias: Power off every chromecast we loaded the URL on
    repeat:
      for_each: '{{ non_playing_chromecasts }}'
      sequence:
      - action: media_player.turn_off
        target:
          entity_id: '{{ repeat.item }}'
        continue_on_error: true
  mode: parallel
  max: 5
  icon: mdi:link-box-variant
broadcast_alert_pause_chromecasts:
  alias: Broadcast alert - pause playing chromecasts
  description: Sends a media_pause command to each chromecast in the supplied list.
  fields:
    playing_chromecasts:
      description: Chromecasts currently in the `playing` state.
      required: true
      selector:
        object: {}
  sequence:
  - repeat:
      for_each: '{{ playing_chromecasts }}'
      sequence:
      - action: media_player.media_pause
        target:
          entity_id: '{{ repeat.item }}'
        continue_on_error: true
  mode: parallel
  max: 10
  icon: mdi:pause-circle
change_received_lights_to_random_colors:
  alias: Change received lights or area to dissimilar random color
  description: Changes each light to a random color, ensuring the new hue is at least
    25 degrees away from the current one. Consolidates areas and manual light selections.
    All lights are recolored simultaneously.
  mode: restart
  icon: mdi:palette-swatch
  fields:
    area:
      name: Area
      description: The area(s) to target.
      selector:
        area:
          multiple: true
      required: true
    light:
      name: Light
      description: Specific light entity (or entities) to target.
      selector:
        entity:
          multiple: true
          domain: light
    saturation:
      selector:
        number:
          min: 20
          max: 100
      default: 100
      required: false
    transition_speed:
      selector:
        number:
          min: 2
          max: 200
      default: 1
  sequence:
  - variables:
      lights: "{# 1. Get entities from the selected areas #} {% set area_list = []
        %} {% if area is defined and area %}\n  {% set area_list = area\n    | map('area_entities')\n
        \   | sum(start=[])\n    | select('search', '^light\\.')\n    | list %}\n{%
        endif %} {# 2. Get entities from the manual 'light' field #} {% set manual_list
        = light if light is defined and light else [] %} {# 3. Combine and dedupe
        #} {% set combined = (area_list + manual_list) | unique | list %} {# 4. Expand,
        filter to color-capable lights, drop decorative/main #} {{ expand(combined)\n
        \     | selectattr('domain', 'eq', 'light')\n      | selectattr('attributes.supported_color_modes',
        'defined')\n      | selectattr('attributes.supported_color_modes', 'search',
        'hs|rgb|xy')\n      | rejectattr('attributes.entity_id', 'defined')\n      |
        map(attribute='entity_id')\n      | reject('search', 'decorative')\n      |
        reject('search', 'main')\n      | unique | list }}\n"
  - repeat:
      for_each: '{{ lights }}'
      sequence:
      - action: script.turn_on
        target:
          entity_id: script.set_one_light_to_a_dissimilar_random_color
        data:
          variables:
            target_light: '{{ repeat.item }}'
            saturation: '{{ saturation | default(100) }}'
            transition_speed: '{{ transition_speed | default(1) }}'
start_visual_playlist_on_plex:
  alias: Start requsted Playlist on plex for all unplaying chromecasts
  description: Starts a requested Plex playlist in shuffle mode on all idle Chromecast
    devices (excluding hotbox and bedroom), muting their audio. Skips rooms where
    someone is sleeping and waits for playback to begin before moving to the next
    device.
  sequence:
  - variables:
      chromecasts: '{{(integration_entities(''cast'')  |  select(''search'', ''chromecast'')|
        reject(''search'', ''hotbox'')| reject(''search'', ''bedroom'') | list ) +
        (integration_entities(''cast'')  |  select(''search'', ''hub'')| reject(''search'',
        ''hotbox'')| reject(''search'', ''salon'') | list ) }}

        '
  - repeat:
      sequence:
      - if:
        - condition: template
          value_template: '{{states(chromecasts[repeat.index - 1 ]) == "off"}}'
        - condition: template
          value_template: '{{ area_id(chromecasts[repeat.index - 1 ] | string) | replace(''_top'','''')
            | replace(''_down'','''') not in states(''sensor.active_sleeper_rooms'')
            | string  }}'
        then:
        - variables:
            playlist: 'plex://{"playlist_name":"{{requested_playlist}}","shuffle":"1"}

              '
        - data:
            media_content_id: '{{playlist}}'
            media_content_type: playlist
          target:
            entity_id: '{{chromecasts[repeat.index -1]}}'
          action: media_player.play_media
        - data:
            is_volume_muted: true
          target:
            entity_id: '{{chromecasts[repeat.index -1]}}'
          action: media_player.volume_mute
        - delay:
            hours: 0
            minutes: 0
            seconds: 15
            milliseconds: 0
          enabled: false
        - wait_for_trigger:
          - trigger: template
            value_template: '{{states(chromecasts[repeat.index - 1 ]) == "playing"}}'
          timeout:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
      for_each: '{{ chromecasts }}'
  mode: single
  icon: mdi:led-strip-variant
non_important_broadcast_alert_in_the_house:
  alias: non-important broadcast alert in the house
  description: Sends a low-priority broadcast alert through the house by briefly flashing
    notification lights to an optional color and restoring them, playing TTS announcements
    on speakers (skipping bedrooms with sleepers and suppressing during party mode),
    and optionally displaying images or URLs on idle Chromecast TVs.
  sequence:
  - variables:
      light_entity_ids: "{% set light_group = state_attr('light.group_notifications_light','entity_id')%}
        \  {% set ns = namespace( rgb_dict= [] ) %} {% for entity_id in light_group
        %}\n    {% set light_state = states(entity_id)  %}\n    {% set light_rgb_color
        = state_attr(entity_id, \"rgb_color\") %}\n    {% if light_state == 'on' and
        light_rgb_color %}\n        {%- set rgb_values = light_rgb_color | replace('(','')
        | replace(')','')| replace(' ','')| string  -%}\n        {% set rgb_dict =
        [(entity_id , rgb_values, states(entity_id))] %}\n        {% set ns.rgb_dict
        = ns.rgb_dict + rgb_dict %}\n    {% endif %}    \n{% endfor %}  {{ ns.rgb_dict
        }}\n"
      playing_chromecasts: '{{ integration_entities(''cast'') |  select(''search'',
        ''chromecast'') | expand | selectattr(''state'', ''eq'', ''playing'')| map(attribute=''entity_id'')|
        list }}

        '
      non_playing_chromecasts: '{{ integration_entities(''cast'') |  select(''search'',
        ''chromecast'') | expand | rejectattr(''state'', ''eq'', ''playing'')| map(attribute=''entity_id'')|
        list }}

        '
    alias: Store stuff
  - parallel:
    - alias: Lights
      sequence:
      - if:
        - condition: template
          value_template: '{% if color is defined %}

            true

            {% else %}

            false

            {% endif %}'
        then:
        - alias: Turn all lights to selected color
          repeat:
            sequence:
            - target:
                entity_id: '{{light_entity_ids[repeat.index - 1].0}}'
              data:
                color_name: '{{color}}'
              enabled: true
              action: light.turn_on
            count: '{{ light_entity_ids | length }}'
        alias: Change lights conditionally
      - delay:
          hours: 0
          minutes: 0
          seconds: 1
          milliseconds: 250
      - alias: Restore lights to their initial state
        repeat:
          sequence:
          - if:
            - condition: template
              value_template: '{{ not light_entity_ids[repeat.index - 1].2 | bool
                }}'
            then:
            - target:
                entity_id: '{{light_entity_ids[repeat.index - 1].0}}'
              enabled: true
              alias: Turn back off lights to previous state
              action: light.turn_{{ 'on' if light_entity_ids[repeat.index - 1].2 ==
                'on' else 'off' }}
            alias: Turn off lights back to off
          - if:
            - condition: template
              value_template: '{{ light_entity_ids[repeat.index - 1].2 | bool }}'
            then:
            - target:
                entity_id: '{{light_entity_ids[repeat.index - 1].0}}'
              data:
                rgb_color: '{{light_entity_ids[repeat.index - 1].1}}'
              enabled: true
              alias: Turn back on lights to previous state
              action: light.turn_{{ 'on' if light_entity_ids[repeat.index - 1].2 ==
                'on' else 'off' }}
            alias: Turn on lights back to their original colors
          count: '{{ light_entity_ids | length }}'
    - alias: 'Announcements '
      if:
      - condition: template
        value_template: '{% if message is defined %}

          true

          {% else %}

          false

          {% endif %}'
      - condition: state
        entity_id: input_boolean.party_mode
        state:
        - 'off'
      then:
      - alias: Announcements via Music Assistant
        parallel:
        - alias: Disabled direct Music Assistant announcement; tts.speak handles this
            without media-source URL failures
          action: music_assistant.play_announcement
          data:
            url: media-source://tts/tts.piper_2?message={{ message | urlencode }}&cache=true
            announce_volume: 35
          target:
            entity_id: media_player.group_mass_home_group_speakers
          continue_on_error: true
          enabled: false
        - action: tts.speak
          metadata: {}
          target:
            entity_id: tts.piper_2
          data:
            cache: true
            media_player_entity_id: media_player.group_mass_home_group_speakers
            message: '{{ message }}'
          continue_on_error: true
        - if:
          - condition: state
            entity_id: input_boolean.sleeper_in_bedroom
            state: 'off'
          then:
          - action: tts.speak
            metadata: {}
            target:
              entity_id: tts.piper_2
            data:
              cache: true
              media_player_entity_id: media_player.mass_bedroom_aux2_speaker
              message: '{{ message }}'
            continue_on_error: true
        - action: tts.speak
          metadata: {}
          target:
            entity_id: tts.piper_2
          data:
            cache: true
            media_player_entity_id: media_player.mass_bathroom_vpe_speaker
            message: '{{ message }}'
          continue_on_error: true
      enabled: true
    - alias: TVs
      parallel:
      - alias: Broadcast image to paused TVs if image is present
        if:
        - condition: template
          value_template: '{% if image is defined %}

            true

            {% else %}

            false

            {% endif %}'
        then:
        - alias: Broadcast Image to paused chromecasts
          repeat:
            sequence:
            - data:
                entity_id: '{{non_playing_chromecasts[repeat.index - 1]}}'
                media:
                  media_content_id: '{{image}}'
                  media_content_type: video
                  metadata: {}
              action: media_player.play_media
            for_each: '{{ non_playing_chromecasts }}'
        - delay:
            hours: 0
            minutes: 0
            seconds: 40
            milliseconds: 0
        - alias: Turn off precedent chromecats
          repeat:
            sequence:
            - action: media_player.turn_off
              metadata: {}
              data: {}
              target:
                entity_id: '{{ non_playing_chromecasts }}'
            for_each: '{{ non_playing_chromecasts }}'
        enabled: true
        continue_on_error: true
      - alias: Broadcast image to paused TVs if URL is present
        if:
        - condition: template
          value_template: '{% if url is defined %}

            true

            {% else %}

            false

            {% endif %}'
        then:
        - alias: Broadcast Image to paused chromecasts
          repeat:
            sequence:
            - action: dash_cast.load_url
              data:
                entity_id: '{{non_playing_chromecasts[repeat.index - 1]}}'
                url: '{{url}}'
                force: true
            for_each: '{{ non_playing_chromecasts }}'
        - delay:
            hours: 0
            minutes: 0
            seconds: 40
            milliseconds: 0
          enabled: false
        - wait_for_trigger:
          - trigger: state
            entity_id:
            - lock.lock_front_door
            to: unlocked
          timeout:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
        - alias: Turn off precedent chromecats
          repeat:
            sequence:
            - action: media_player.turn_off
              metadata: {}
              data: {}
              target:
                entity_id: '{{ non_playing_chromecasts }}'
            for_each: '{{ non_playing_chromecasts }}'
        enabled: true
        continue_on_error: true
      enabled: true
  - alias: Restore lights to their initial state
    repeat:
      sequence:
      - alias: Turn off lights back to off
        if:
        - condition: template
          value_template: '{{ not light_entity_ids[repeat.index - 1].2 | bool }}'
        then:
        - target:
            entity_id: '{{light_entity_ids[repeat.index - 1].0}}'
          enabled: true
          alias: Turn back off lights to previous state
          action: light.turn_{{ 'on' if light_entity_ids[repeat.index - 1].2 == 'on'
            else 'off' }}
      - alias: Turn on lights back to their original colors
        if:
        - condition: template
          value_template: '{{ light_entity_ids[repeat.index - 1].2 | bool }}'
        then:
        - target:
            entity_id: '{{light_entity_ids[repeat.index - 1].0}}'
          data:
            rgb_color: '{{light_entity_ids[repeat.index - 1].1}}'
          enabled: true
          alias: Turn back on lights to previous state
          action: light.turn_{{ 'on' if light_entity_ids[repeat.index - 1].2 == 'on'
            else 'off' }}
      count: '{{ light_entity_ids | length }}'
    enabled: false
  mode: queued
  icon: mdi:speaker-message
  max: 3
changes_all_on:
  alias: Changes all on lights to random colors
  mode: restart
  icon: mdi:sale
  description: 'This script can be used to change the lights in the house to random
    colors.

    It can be used by an LLM to trigger this action when requested.

    Do not use this to modify individual lights or bulbs!'
  sequence:
  - variables:
      all_on_lights: "{{ integration_entities('group') | select('search', 'light.group_all_lights')\n
        \  | expand | selectattr(\"attributes.rgb_color\", \"defined\")\n   | selectattr(\"state\",
        \"eq\", \"on\") | map(attribute='entity_id') | list }}"
  - repeat:
      for_each: '{{ all_on_lights }}'
      sequence:
      - action: script.turn_on
        target:
          entity_id: script.set_one_light_to_a_random_color
        data:
          variables:
            target_light: '{{ repeat.item }}'
