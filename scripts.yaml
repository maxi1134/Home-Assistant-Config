join_player_to_music_assistant_group:
  alias: Join player to Music Assistant group
  description: 'Add a Music Assistant speaker to a sync group. Tell it the area/room
    of the speaker to add (e.g. "office") and it finds the Music Assistant speaker
    there automatically. It also auto-detects the group to join: the group currently
    playing, or the home group when more than one group is playing. Use this when
    the user asks to add a room/speaker to the music that is already playing, or to
    group a room with another one.'
  icon: mdi:speaker-multiple
  mode: queued
  max: 10
  fields:
    area:
      name: Area / room of the speaker to add
      description: The room/area that contains the speaker to add (e.g. Office, Kitchen,
        Bedroom). The script automatically finds the Music Assistant speaker in that
        area. This is the easiest and most reliable way to choose a speaker.
      required: true
      selector:
        area:
    player_to_add:
      name: Specific player to add (optional override)
      description: Optional advanced override. A specific Music Assistant media_player
        entity to add (e.g. media_player.kitchen). If set, the area lookup is skipped.
      required: false
      selector:
        entity:
          filter:
          - integration: music_assistant
            domain: media_player
      example: media_player.kitchen
    target_player:
      name: Target group player (optional)
      description: Optional. Any Music Assistant media_player that is already in the
        target group (either the leader or any member). Leave empty to automatically
        use the Music Assistant group that is currently playing (and the home group
        if more than one group is playing).
      required: false
      selector:
        entity:
          filter:
          - integration: music_assistant
            domain: media_player
  sequence:
  - variables:
      area_in: '{{ area | default('''') }}'
      override: '{{ player_to_add | default('''') }}'
      tgt: '{{ target_player | default('''') }}'
      home_group: media_player.group_mass_home_group_speakers
      mass_players: "{{ integration_entities('music_assistant')\n   | select('match',
        '^media_player\\.') | list }}"
      add: "{%- set ns = namespace(add='', first='') -%} {%- if override -%}\n  {%-
        set ns.add = override -%}\n{%- elif area_in -%}\n  {%- set cand = area_entities(area_in)\n
        \        | select('match', '^media_player\\.')\n         | select('in', mass_players)
        | list -%}\n  {%- for e in cand -%}\n    {%- if ns.first == '' -%}{%- set
        ns.first = e -%}{%- endif -%}\n    {%- if ns.add == '' and states(e) not in
        ['unavailable', 'unknown'] -%}\n      {%- set ns.add = e -%}\n    {%- endif
        -%}\n  {%- endfor -%}\n  {%- set ns.add = ns.add if ns.add else ns.first -%}\n{%-
        endif -%} {{ ns.add }}"
      leader: "{%- set ns = namespace(leader='', others=[], solo=[]) -%} {%- if tgt
        -%}\n  {%- set gm = state_attr(tgt, 'group_members') -%}\n  {%- set ns.leader
        = (gm[0] if (gm and (gm | length) > 0) else tgt) -%}\n{%- else -%}\n  {%-
        set home_state = states(home_group) -%}\n  {%- set home_exists = home_state
        not in ['unavailable', 'unknown'] -%}\n  {%- set home_playing = home_exists
        and home_state in ['playing', 'buffering', 'paused'] -%}\n  {%- set home_members
        = state_attr(home_group, 'group_members') or [] -%}\n  {%- for p in mass_players
        -%}\n    {%- if p != home_group and p not in home_members -%}\n      {%- set
        gm = state_attr(p, 'group_members') -%}\n      {%- if gm and (gm | length)
        > 1 and states(p) in ['playing', 'buffering', 'paused'] -%}\n        {%- set
        ns.others = ns.others + [gm[0]] -%}\n      {%- elif states(p) in ['playing',
        'buffering'] -%}\n        {%- set ns.solo = ns.solo + [p] -%}\n      {%- endif
        -%}\n    {%- endif -%}\n  {%- endfor -%}\n  {%- set ns.others = ns.others
        | unique | list -%}\n  {%- set total = (ns.others | length) + (1 if home_playing
        else 0) -%}\n  {%- if total > 1 -%}\n    {%- set ns.leader = home_group if
        home_exists else ns.others[0] -%}\n  {%- elif total == 1 -%}\n    {%- set
        ns.leader = home_group if home_playing else ns.others[0] -%}\n  {%- elif (ns.solo
        | length) > 0 -%}\n    {%- set ns.leader = ns.solo[0] -%}\n  {%- endif -%}\n{%-
        endif -%} {{ ns.leader }}"
      current_members: '{{ (state_attr(leader, ''group_members'') or []) if leader
        else [] }}'
      target_members: '{{ ((current_members | reject(''eq'', leader) | list) + [add])
        | unique | list }}'
      already_member: '{{ add in current_members }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not add }}'
      sequence:
      - variables:
          result:
            success: false
            message: Could not find a Music Assistant speaker to add. No Music Assistant
              media_player was found in area '{{ area_in }}'. Make sure the Music
              Assistant speaker entity (not just the native one) is assigned to that
              area, or pass player_to_add.
      - stop: No speaker resolved from area
        response_variable: result
    - conditions:
      - condition: template
        value_template: '{{ not leader }}'
      sequence:
      - variables:
          result:
            success: false
            added: '{{ add }}'
            message: No Music Assistant group leader could be found. Make sure a Music
              Assistant player is currently playing, or specify a target_player that
              is in the desired group.
      - stop: No Music Assistant leader found
        response_variable: result
    - conditions:
      - condition: template
        value_template: '{{ add == leader }}'
      sequence:
      - variables:
          result:
            success: false
            leader: '{{ leader }}'
            message: '{{ add }} is already the group leader; nothing to join.'
      - stop: Requested player is the leader
        response_variable: result
    - conditions:
      - condition: template
        value_template: '{{ already_member }}'
      sequence:
      - variables:
          result:
            success: true
            leader: '{{ leader }}'
            message: '{{ add }} is already part of the group led by {{ leader }}.'
      - stop: Requested player already in group
        response_variable: result
    default:
    - action: media_player.join
      target:
        entity_id: '{{ leader }}'
      data:
        group_members: '{{ target_members }}'
    - variables:
        result:
          success: true
          leader: '{{ leader }}'
          added: '{{ add }}'
          group_members: '{{ target_members }}'
          message: Added {{ add }} to the Music Assistant group led by {{ leader }}.
    - stop: Joined
      response_variable: result
unjoin_speaker_or_area_from_group:
  alias: Unjoin speaker or area from group
  icon: mdi:speaker-off
  description: Remove Music Assistant speakers from any group / sync group they are
    playing in, so they play on their own again. Provide `area` to unjoin every Music
    Assistant speaker in a room (e.g. the user says "unjoin the patio"), and/or `player`
    to unjoin one specific speaker. Use whenever the user asks to unjoin, ungroup,
    separate, remove, or split off a speaker or a room from a multi-room / synced
    group.
  fields:
    area:
      name: Area
      description: Room/area to unjoin. Every Music Assistant speaker in this area
        is removed from its group. Use this when the user names a room, e.g. "unjoin
        the patio".
      required: false
      selector:
        area:
          entity:
            integration: music_assistant
            domain: media_player
    player:
      name: Speaker
      description: A single Music Assistant speaker to unjoin. Use this when the user
        names a specific speaker instead of (or in addition to) a room.
      required: false
      selector:
        entity:
          filter:
          - integration: music_assistant
            domain: media_player
  mode: parallel
  max: 10
  sequence:
  - variables:
      mass_players: "{%- set mass = integration_entities('music_assistant') -%} {%-
        set ns = namespace(targets=[]) -%} {%- if player is defined and player -%}\n
        \ {%- set ns.targets = ns.targets + ([player] if player is string else player
        | list) -%}\n{%- endif -%} {%- if area is defined and area -%}\n  {%- set
        areas = [area] if area is string else area | list -%}\n  {%- for a in areas
        -%}\n    {%- for e in area_entities(a) -%}\n      {%- if e in mass and e.startswith('media_player.')
        -%}\n        {%- set ns.targets = ns.targets + [e] -%}\n      {%- endif -%}\n
        \   {%- endfor -%}\n  {%- endfor -%}\n{%- endif -%} {{- ns.targets | unique
        | list }}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ mass_players | count > 0 }}'
      sequence:
      - action: media_player.unjoin
        target:
          entity_id: '{{ mass_players }}'
    default:
    - stop: No Music Assistant speakers found for the requested area/speaker.
