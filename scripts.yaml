jellyfin_play_random_episode_of_a_selected_tv_show:
  alias: 'Jellyfin: Play Random Episode'
  description: Searches for a TV show and plays a random episode from the results.
  fields:
    show_name:
      name: Show Name
      description: The title of the TV show (e.g., The Office)
      example: The Office
      required: true
      selector:
        text:
    target_player:
      name: Target Player
      description: The Jellyfin media player entity to play on.
      example: media_player.jellyfin_living_room
      required: true
      selector:
        entity:
          domain: media_player
  sequence:
  - action: media_player.search_media
    target:
      entity_id: '{{ target_player }}'
    data:
      search_query: '{{ show_name }}'
    response_variable: search_results
  - variables:
      episodes: '{{ search_results[target_player].result }}'
      random_episode: '{{ episodes | random }}'
  - if:
    - condition: template
      value_template: '{{ episodes | count > 0 }}'
    then:
    - action: media_player.play_media
      target:
        entity_id: '{{ target_player }}'
      data:
        media:
          media_content_id: '{{ random_episode.media_content_id }}'
          media_content_type: episode
          metadata: {}
    else:
    - action: notify.persistent_notification
      data:
        title: Jellyfin Search Failed
        message: No episodes found for '{{ show_name }}'.
llm_script_to_start_tv_shows_and_movies_on_tvs_duplicate:
  sequence:
  - if:
    - condition: template
      value_template: '{{ is_description | default(false) }}'
    then:
    - alias: Confirm Title through LLM/WebSearch
      action: ai_task.generate_data
      data:
        task_name: media name lookup
        instructions: 'The user has asked to watch "{{ media_id }}", but he is unsure
          about the actual name of the media. Look it up online with a web search
          tool call to make confirm the name. If it does not seem to exist, output
          the most probable match.


          Return the result only in the requested structured field.'
        structure:
          media_id_name:
            description: The confirmed name/title for the requested media ID, or the
              most probable match if no exact result exists.
            required: true
            selector:
              text:
      response_variable: media_lookup
  - if:
    - condition: template
      value_template: '{{ library_name is not defined }}'
    then:
    - alias: Confirm media library through LLM/WebSearch
      action: ai_task.generate_data
      data:
        task_name: media library lookup
        instructions: 'The user has asked to watch "{{ media_lookup.data.media_id_name
          if media_lookup is defined else media_id }}", but he is unsure about the
          actual type of the media that it is. Look that up online with a web search
          tool call to make confirm the type.


          The answer can only be either ''TV Shows'' or ''Movies''!


          Return the result only in the requested structured field.'
        structure:
          media_library_name:
            description: The library where this media is located; The answer can only
              be either 'TV Shows' or 'Movies'!
            required: true
            selector:
              text:
      response_variable: media_lookup_library_name
      enabled: true
  - if:
    - condition: template
      value_template: '{{ media_type is not defined }}'
    then:
    - alias: Confirm media type through LLM/WebSearch
      action: ai_task.generate_data
      data:
        task_name: media type lookup
        instructions: 'The user has asked to watch "{{ media_lookup.data.media_id_name
          if media_lookup is defined else media_id  }}", but he is unsure about the
          actual type of the media. Look that up online with a web search tool call
          to make confirm the type.


          The answer can only be either ''tvshow'' or  ''movie''!


          Return the result only in the requested structured field.'
        structure:
          media_type_name:
            description: The confirmed media typee for the requested media ID, or
              the most probable match if no exact result exists. The answer can only
              be either 'tvshow' or  'movie'!
            required: true
            selector:
              text:
      response_variable: media_lookup_type
  - variables:
      resolved_media_id: '{{ media_lookup.data.media_id_name if media_lookup is defined
        else media_id }}'
      resolved_media_type: '{{ media_lookup_type.data.media_type_name if media_lookup_type
        is defined else media_type }}'
      resolved_media_library_name: "{% if resolved_media_type == 'movie' %}\n  Movies\n{%
        elif resolved_media_type == 'tvshow' %} TV Shows {% else %} {{ media_lookup_library_name.data.media_library_name
        if media_lookup_library_name is defined else library_name }} {% endif %}"
  - variables:
      player_data: "{% if media_player | first %} \n{% set media_player_no_space =
        (media_player | lower).replace('universal_','').replace('universal ','').replace('media_player.','').replace('chromecast','').replace('_chromecast','').replace('tv','').replace('_tv','').split('
        ') | first%}  \n{{integration_entities('universal') \n | expand\n | selectattr('entity_id',
        'search', 'chromecast')\n | selectattr('entity_id', 'search', media_player_no_space
        | lower)\n | map(attribute='entity_id') | list }}\n\n \n{% elif area | first
        %} \n{{ integration_entities('cast') \n | expand\n | selectattr('entity_id',
        'search', 'chromecast')\n | selectattr('entity_id', 'search', area | first
        | lower)\n | map(attribute='entity_id') | list }} \n{% endif %}\n"
      target_data:
        entity_id: '{{ (player_data ) | default(''NA'', true) }}'
      invalid_target:
        response: Unable to find valid target
    enabled: true
  - variables:
      action_data:
        media_content_type: '{{resolved_media_type}}'
        media_content_id: 'plex://{"library_name": "{{resolved_media_library_name}}",
          "title":"{{ resolved_media_id }}", "shuffle": 1, "allow_multiple": 1}'
  - action: media_player.play_media
    data: '{{ dict(action_data.items() | rejectattr(''1'', ''eq'', ''NA'')) }}'
    target: '{{ dict(target_data.items() | rejectattr(''1'', ''eq'', ''NA'')) }}'
  - stop: Playback started!
    response_variable: target_data
    enabled: true
  mode: single
  max_exceeded: silent
  description: This script must be used by the LLM to initiate a Movie or Show playback
    on a TV or a chromecast. The script uses AI tasks to look up the confirmed media
    name and type, then plays the content on the selected Chromecast or TV. This script
    should never be used when Youtube is mentioned.
  fields:
    media_type:
      selector:
        select:
          options:
          - tvshow
          - movie
      name: Media Type
      description: 'This argument is mandatory and must always be provided no matter
        what! "media_type" can only be one of 2 different values: "movie" if the search
        is about a specific movie.- "tvshow" if the search is about a tv show serie.media_type
        is mandatory and must always be provided. In case a request does not match
        any of these types, for example when music from a specific genre is requested,
        then use "tvshow".'
      required: false
      default: tvshow
    library_name:
      selector:
        select:
          options:
          - TV Shows
          - Movies
      name: Library Name
      description: '"library_name" is the library the user wants to play the media
        from. ''Movies'' for movies and ''TV Shows'' for TV series'
      required: false
    is_description:
      selector:
        boolean: {}
      default: false
      required: true
    media_id:
      selector:
        text:
      name: Media ID
      description: "This argument is mandatory and must always be provided no matter
        what! media_id is the queried name- If the search is about a tv show: Then
        media_id is the tv show title - If the search is about a movie: Then media_id
        is the movie title This is a mandatory argument and must always be provided.\n\n
        If the user only gives a description rather than a title, pass the description
        here and set \"is_description\" to true!"
      required: true
    media_player:
      selector:
        entity: {}
      name: Media Player
      required: true
      description: This argument allows the LLM to select the right CHROMECAST  TV
        to use. A speaker should NEVER be used. An entity containing "Speaker" is
        INCORRECT
    area:
      selector:
        area: {}
      name: area
      description: This argument allows the LLM to select the right area to use
  alias: LLM Script to start TV SHOWS and MOVIES on TVs
